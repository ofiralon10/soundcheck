    </div>);
  };
  const autoName=(prefix)=>{ const d=new Date(); const dd=String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getFullYear()).slice(-2); const files=s.files||[]; let maxN=0; files.forEach(f=>{ const m=(f.name||'').match(new RegExp(prefix+'-(\\d+)','i')); if(m) maxN=Math.max(maxN,parseInt(m[1],10)); }); return dd+' '+prefix+'-'+(maxN+1); };
  const pendingBlobRef=useRef(null);
  const pendingMimeRef=useRef('');
  const [recConfirm,setRecConfirm]=useState(false);
  const [recPrompt,setRecPrompt]=useState(false);
  const startRec=async()=>{ setFileMsg('');
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false,sampleRate:48000}});
      const mr=new MediaRecorder(stream,{audioBitsPerSecond:256000});
      chunksRef.current=[];
      mr.ondataavailable=(e)=>{ if(e.data.size>0) chunksRef.current.push(e.data); };
      mr.onstop=()=>{
        stream.getTracks().forEach(t=>t.stop());
        clearInterval(timerRef.current);
        const blob=new Blob(chunksRef.current,{type:mr.mimeType||'audio/webm'});
        if(blob.size<100){ setRecState(null); setRecTime(0); return; }
        pendingBlobRef.current=blob;
        pendingMimeRef.current=mr.mimeType||'audio/webm';
        setRecState(null); setRecConfirm(true);
      };
      mr.start(1000);
      recorderRef.current=mr;
      setRecState('recording');
      setRecTime(0);
      timerRef.current=setInterval(()=>setRecTime(t=>t+1),1000);
    }catch(e){ setFileMsg('Microphone not available — check browser permissions.'); }
  };
  const pauseRec=()=>{ if(recorderRef.current&&recorderRef.current.state==='recording'){ recorderRef.current.pause(); clearInterval(timerRef.current); setRecState('paused'); } };
  const resumeRec=()=>{ if(recorderRef.current&&recorderRef.current.state==='paused'){ recorderRef.current.resume(); timerRef.current=setInterval(()=>setRecTime(t=>t+1),1000); setRecState('recording'); } };
  const stopRec=()=>{ if(recorderRef.current&&recorderRef.current.state!=='inactive') recorderRef.current.stop(); };
  const uploadRec=async()=>{
    const blob=pendingBlobRef.current; const mime=pendingMimeRef.current;
    if(!blob){ setRecConfirm(false); setRecTime(0); return; }
    setBusy('rec'); setRecConfirm(false);
    const fid=uid();
    const ext=mime.includes('mp4')?'m4a':mime.includes('ogg')?'ogg':'webm';
    const name=autoName('recording')+'.'+ext;
    try{
      const path='files/'+BOARD+'/'+fid+'-recording.'+ext;
      const sRef=storage.ref().child(path);
      await sRef.put(blob,{contentType:mime});
      const url=await sRef.getDownloadURL();
      update(st=>{const so=st.songs.find(x=>x.id===s.id);so.files.push({id:fid,name,kind:'upload',url,path,size:blob.size,type:'audio',cat:pickCat||'other'});logAct(st,'saved a recording to "'+so.title+'"');return st;});
    }catch(err){ setFileMsg('Recording upload failed — '+prettyErr(err)); }
    pendingBlobRef.current=null; setBusy(''); setRecTime(0);
  };
  const abandonRec=()=>{ pendingBlobRef.current=null; setRecConfirm(false); setRecTime(0); };
  const [playerFile,setPlayerFile]=useState(null);
  const [playerPlaying,setPlayerPlaying]=useState(false);
  const [playerTime,setPlayerTime]=useState(0);
  const [playerDur,setPlayerDur]=useState(0);
  const [playerVol,setPlayerVol]=useState(1);
  const playerTimerRef=useRef(null);
  // Web Audio playback (waRef) is used for webm/ogg recordings: MediaRecorder
  // blobs are cue-less, so an <audio> element can't seek them (silence after a
  // jump) and reports Infinity duration. Decoding to a buffer gives an accurate
  // duration and perfect seeking. Other files use the <audio> element.
  const waRef=useRef(null);
  const waPos=()=>{ const w=waRef.current; if(!w)return 0; return w.playing?Math.min(w.dur,w.offset+(w.ctx.currentTime-w.startAt)):w.offset; };
  const waStop=()=>{ const w=waRef.current; if(w&&w.source){ try{ w.source._manual=true; w.source.onended=null; w.source.stop(); }catch(_){} w.source=null; } };
  const waStartAt=(off)=>{
    const w=waRef.current; if(!w)return;
    waStop();
    try{ w.ctx.resume(); }catch(_){}
    const src=w.ctx.createBufferSource(); src.buffer=w.buffer; src.connect(w.gain);
    src.onended=()=>{ if(src._manual)return; w.playing=false; w.offset=w.dur; setPlayerPlaying(false); setPlayerTime(w.dur); clearInterval(playerTimerRef.current); };
    const start=Math.max(0,Math.min(off,w.dur-0.01));
    src.start(0,start);
    w.source=src; w.offset=start; w.startAt=w.ctx.currentTime; w.playing=true;
    setPlayerPlaying(true);
    clearInterval(playerTimerRef.current);
    playerTimerRef.current=setInterval(()=>setPlayerTime(waPos()),200);
  };
  const stopAllPlayback=()=>{
    if(audioRef.current){ try{audioRef.current.pause();}catch(_){} audioRef.current=null; }
    if(waRef.current){ waStop(); try{waRef.current.ctx.close();}catch(_){} waRef.current=null; }
    clearInterval(playerTimerRef.current);
  };
  const openPlayer=async(f)=>{
    stopAllPlayback();
    setPlayerFile(f); setPlayerTime(0); setPlayerDur(0); setPlayerPlaying(false);
    if(/\.(webm|ogg)$/i.test(f.name||'')){
      const ctx=new (window.AudioContext||window.webkitAudioContext)();
      try{ ctx.resume(); }catch(_){}
      try{
        const ab=await fetch(f.url).then(r=>{ if(!r.ok) throw new Error('http '+r.status); return r.arrayBuffer(); });
        const buffer=await ctx.decodeAudioData(ab);
        const gain=ctx.createGain(); gain.gain.value=playerVol; gain.connect(ctx.destination);
        waRef.current={ctx,buffer,gain,source:null,offset:0,startAt:0,playing:false,dur:buffer.duration};
        setPlayerDur(buffer.duration);
        waStartAt(0);
      }catch(err){ try{ctx.close();}catch(_){} setFileMsg('Could not play this recording — '+((err&&err.message)||'decode failed')); setPlayerFile(null); }
      return;
    }
    const a=new Audio();
    a.preload='auto';
    a.volume=playerVol;
    let forcedDur=false,started=false;
    const startPlay=()=>{ if(started)return; started=true; a.play().catch(()=>setFileMsg('Playback failed.')); };
    a.onloadedmetadata=()=>{
      if(isFinite(a.duration)&&a.duration>0){ setPlayerDur(a.duration); startPlay(); }
      else if(!forcedDur){ forcedDur=true; try{ a.currentTime=1e101; }catch(_){ startPlay(); } }
    };
    a.ondurationchange=()=>{
      if(isFinite(a.duration)&&a.duration>0){
        setPlayerDur(a.duration);
        if(forcedDur){ forcedDur=false; try{ a.currentTime=0; }catch(_){} setPlayerTime(0); startPlay(); }
      }
    };
    a.onended=()=>{ if(forcedDur)return; setPlayerPlaying(false); setPlayerTime(a.duration||0); clearInterval(playerTimerRef.current); };
    a.onerror=()=>{ setPlayerFile(null); setPlayerPlaying(false); clearInterval(playerTimerRef.current); setFileMsg('Could not play this file.'); };
    a.src=f.url;
    setTimeout(()=>{ if(started)return; if(forcedDur){ forcedDur=false; try{ a.currentTime=0; }catch(_){} setPlayerTime(0); } startPlay(); },2500);
    audioRef.current=a;
    setPlayerPlaying(true);
    clearInterval(playerTimerRef.current);
    playerTimerRef.current=setInterval(()=>{ if(a&&!a.paused&&!forcedDur) setPlayerTime(a.currentTime); },250);
  };
  const togglePlay=()=>{
    if(waRef.current){ const w=waRef.current; if(w.playing){ const p=waPos(); waStop(); w.offset=p; w.playing=false; setPlayerPlaying(false); clearInterval(playerTimerRef.current); } else { waStartAt(w.offset>=w.dur-0.05?0:w.offset); } return; }
    if(!audioRef.current) return;
    if(audioRef.current.paused){ audioRef.current.play(); setPlayerPlaying(true); playerTimerRef.current=setInterval(()=>setPlayerTime(audioRef.current.currentTime),250); }
    else{ audioRef.current.pause(); setPlayerPlaying(false); clearInterval(playerTimerRef.current); }
  };
  const seekTo=(v)=>{
    if(waRef.current){ const w=waRef.current; const wasPlaying=w.playing; waStop(); w.offset=Math.max(0,Math.min(v,w.dur)); w.playing=false; setPlayerTime(w.offset); if(wasPlaying) waStartAt(w.offset); return; }
    if(audioRef.current){ audioRef.current.currentTime=v; setPlayerTime(v); }
  };
  const setVol=(v)=>{ setPlayerVol(v); if(waRef.current) waRef.current.gain.gain.value=v; if(audioRef.current) audioRef.current.volume=v; };
  const closePlayer=()=>{ stopAllPlayback(); setPlayerFile(null); setPlayerPlaying(false); setPlayerTime(0); setPlayerDur(0); };

  const closeFiles=useCallback(()=>{setFilesOpen(false);setPickCat(null);setLinkMode(false);},[]);
  useBackHandler(filesOpen,closeFiles);
  useBackHandler(stemOpen,closeStemPlayer);
  const closeStemRecPrompt=useCallback(()=>setStemRecPrompt(false),[]);
  useBackHandler(stemRecPrompt,closeStemRecPrompt);
  useBackHandler(!!playerFile,closePlayer);

  const fileCount=s.files?s.files.length:0;
  const rehCount=rehearsals?songRehCount(s.id,rehearsals):0;
  const meta=[s.artist, s.songKey&&('Key '+s.songKey), s.tempo&&(s.tempo+' bpm'), s.duration&&(s.duration+'m')].filter(Boolean);

  return (
    <div className={'song'+(selected?' song-sel':'')} ref={rowRef}>

        </span>
        <div style={{minWidth:0,flex:1}}>
          <div style={{display:'flex',alignItems:'center',gap:7,minWidth:0,flexWrap:'wrap'}}>
            <span className="song-title" style={{minWidth:0}}>{s.title}</span>
            {s.encore && <span className="enc-pill">★ Enc</span>}
          </div>
          <div className="song-meta">{meta.join(' · ')||'—'}</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
          <button className="song-icon-btn" data-coach={'files-'+s.id} onClick={e=>{e.stopPropagation();setFilesOpen(true);}} title="Files">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            {fileCount>0 && <span className="song-icon-badge">{fileCount}</span>}
          </button>
          <button className="song-icon-btn" data-coach={'practice-'+s.id} style={{color:stemBtnColor}} onClick={e=>{e.stopPropagation();openStemPlayer();}} title="Practice">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
          </button>
        </div>
      </div>
      <div className="song-prog"><div className="pf" style={{width:(r*100)+'%',background:meterColor(r)}}/></div>
      {stemProg && !filesOpen && <div style={{padding:'4px 14px',display:'flex',alignItems:'center',gap:8}}>
        <div style={{flex:1,background:'rgba(255,255,255,.1)',borderRadius:4,height:4,overflow:'hidden'}}>
          <div style={{height:'100%',borderRadius:4,transition:'width .3s',width:(stemProg.done/stemProg.total*100)+'%',background:stemProg.failed?'var(--drums)':'var(--ok)'}}/>
        </div>
        <span style={{fontSize:10,color:'var(--muted)',whiteSpace:'nowrap'}}>{stemProg.done}/{stemProg.total} stems</span>
      </div>}
      {open && !compact &&
        <div className="song-body">
          {showCover && <div className="cover-edit">
            <CoverThumb src={s.cover} size={88} radius={12}/>
            <div className="cover-btns">
              <label className="btn ghost sm" style={{cursor:'pointer',opacity:busy==='cover'?0.5:1}}><input type="file" accept="image/*" hidden disabled={busy==='cover'} onChange={onCoverPick}/>{busy==='cover'?'Uploading…':(s.cover?'Replace cover':'Add cover art')}</label>
              {s.cover && busy!=='cover' && <button className="btn danger sm" onClick={clearCover}>Remove cover</button>}
            </div>
          </div>}
          {INSTR.map(i=>(
            <div className="editrow" key={i.id} style={!isMyInstr(i.id)?{opacity:.5}:null}>
              <InstrBadge id={i.id} size={26}/>
              <StatusPills value={s.parts[i.id]} color={i.color} onPick={isMyInstr(i.id)?v=>setRole(i.id,v):null}/>
            </div>
          ))}
          <label className="fl" style={{marginTop:15}}>Guests ({s.guests.length}/{MAX_GUESTS})</label>
          {s.guests.map(g=>(
            <div className="guest-edit" key={g.id}>
              <div className="guest-top">
                <input className="inp" dir="auto" value={g.name} onChange={e=>setGuestName(g.id,e.target.value)} placeholder="Sax — Yossi"/>
                <button className="xbtn" onClick={()=>delGuest(g.id)} aria-label="Remove guest">×</button>
              </div>
              <StatusPills value={g.status} color={GUEST_COLOR} onPick={v=>setGuestStatus(g.id,v)}/>
            </div>
          ))}
          {s.guests.length<MAX_GUESTS && <button className="addguest" onClick={addGuest}>+ Add guest player</button>}
          <label className="fl" style={{marginTop:16}}>Details</label>
          <div className="fieldgrid" style={{marginTop:0}}>
            <div className="full"><label className="fl">Artist</label><input className="inp" dir="auto" value={s.artist||''} onChange={e=>setField('artist',e.target.value)} placeholder="Original artist"/></div>
            <div><label className="fl">Key</label><input className="inp" value={s.songKey||''} onChange={e=>setField('songKey',e.target.value)} placeholder="Am"/></div>
            <div><label className="fl">Tempo</label><input className="inp" inputMode="numeric" value={s.tempo||''} onChange={e=>setField('tempo',e.target.value)} placeholder="bpm"/></div>
            <div className="full"><label className="fl">Length (min)</label><input className="inp" inputMode="numeric" value={s.duration||''} onChange={e=>setField('duration',e.target.value)} placeholder="4"/></div>
            <div className="full"><label className="fl">Notes / arrangement</label>
              <textarea className="inp" dir="auto" value={s.notes||''} onChange={e=>setField('notes',e.target.value)} placeholder="Intro repeats x2, key change before last chorus, who solos…"/></div>
          </div>
          <div className="songact">
            <button className="btn ghost" onClick={onToggleEncore} style={s.encore?{color:'var(--guitar)',borderColor:'rgba(244,169,60,.5)'}:null}>{s.encore?'★ Encore on':'Mark as encore'}</button>
            <button className="btn ghost" onClick={onExclude}>Exclude from set</button>
          </div>
          <div className="btnrow">{confirmRemove
            ? <React.Fragment>
                <span style={{fontSize:13,color:'var(--muted)',alignSelf:'center',direction:'ltr'}}>Remove "{s.title}"?</span>
                <button className="btn danger" onClick={()=>{setConfirmRemove(false);del();}}>Yes, remove</button>
                <button className="btn ghost" onClick={()=>setConfirmRemove(false)}>Cancel</button>
              </React.Fragment>
            : <button className="btn danger" onClick={()=>setConfirmRemove(true)}>Remove song</button>}</div>
        </div>}
      {filesOpen && <div className="files-modal" onClick={e=>{if(e.target===e.currentTarget){setFilesOpen(false);setPickCat(null);setLinkMode(false);}}}>
        <div className="files-panel">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <div className="modaltitle" style={{margin:0}}>Files — {s.title}</div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <button className="btn ghost sm" data-coach="files-practice" style={{color:stemBtnColor,borderColor:stemBtnColor,fontSize:16,padding:'6px 14px'}} onClick={()=>{setFilesOpen(false);openStemPlayer();}}>▶ Practice</button>
              <button className="xbtn" style={{fontSize:23,width:46,height:52}} onClick={()=>{setFilesOpen(false);setPickCat(null);setLinkMode(false);}}>×</button>
            </div>
          </div>
          {FILE_CATS.filter(cat=>cat.id==='slide'||(MY_INSTRS.length>0&&cat.instr&&MY_INSTRS.includes(cat.instr))||(MY_INSTRS.length===0&&cat.instr)||(cat.id==='other'&&MY_INSTRS.includes('other'))||(MY_INSTRS.length===0&&cat.id==='other')).map(cat=>{
            const catFiles=(s.files||[]).filter(f=>!f.stem&&(f.cat==='original'?'other':f.cat||'other')===cat.id);
            const recFiles=cat.id==='slide'?(s.files||[]).filter(f=>f.name&&/recording/i.test(f.name)):null;
            return (<React.Fragment key={cat.id}>
              <div className={'files-cat'+(dropCat===cat.id?' drop-over':'')}
                onDragOver={e=>{e.preventDefault();e.dataTransfer.dropEffect='copy';setDropCat(cat.id);}}
                onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget)) setDropCat(null);}}
                onDrop={e=>{e.preventDefault();setDropCat(null);onDropFiles(e.dataTransfer.files,cat.id);}}>
                <div className="files-cat-h" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    {cat.icon==='slide' && <span style={{fontFamily:'var(--mono)',fontWeight:700,fontSize:14,color:cat.color}}>S</span>}
                    {cat.icon==='other' && <InstrIcon id="other" size={14}/>}
                    {cat.instr && <InstrBadge id={cat.instr} size={20}/>}
                    {cat.label}
                  </div>
                  <label className="fbtn" data-coach={'addfile-'+cat.id} style={{cursor:'pointer',fontSize:11,opacity:busy==='file'?.5:1}}>+ Add<input type="file" hidden disabled={busy==='file'} onChange={e=>onUpload(e,cat.id)}/></label>
                </div>
                {catFiles.length===0 && <div className="files-na">N/A</div>}
                {catFiles.map(f=>fileRow(f,ff=>ff.type==='audio'?openPlayer(ff):openFile(ff)))}
              </div>
            {recFiles && <div className="files-cat">
                <div className="files-cat-h" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <span style={{fontFamily:'var(--mono)',fontWeight:700,fontSize:14,color:'var(--drums)'}}>●</span>
                    Recordings
                  </div>
                  {!recState && <button className="fbtn" style={{fontSize:11,color:'var(--drums)'}} onClick={()=>setRecPrompt(true)}>● Record</button>}
                </div>
                {recFiles.length===0 && <div className="files-na">N/A</div>}
                {recFiles.map(f=>fileRow(f,openPlayer))}
              </div>}
            </React.Fragment>);
          })}
          {(()=>{
            const myRecs=(s.files||[]).filter(f=>f.cat==='stem-rec'&&f.by===(MY_NAME||'unknown'));
            return myRecs.length>0 && <div className="files-cat" data-coach="myrec-section">
              <div className="files-cat-h" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <span style={{fontFamily:'var(--mono)',fontWeight:700,fontSize:14,color:'var(--drums)'}}>🎙</span>
                  My Stem Recordings
                </div>
              </div>
              {myRecs.map(f=>fileRow(f,ff=>{setFilesOpen(false);openStemRecPlayback(ff);}))}
            </div>;
          })()}
          <div style={{marginTop:10}}>
            <label className="btn ghost sm" style={{borderColor:stemBtnColor,color:stemBtnColor,cursor:'pointer',display:'inline-flex',alignItems:'center',gap:6,opacity:busy==='stems'?.5:1}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
              {busy==='stems'?'Uploading…':'Get Stems'}<input type="file" hidden multiple accept="audio/*,.mp3,.wav,.ogg,.m4a,.flac,.zip" disabled={busy==='stems'} onChange={onGetStems}/>
            </label>
          </div>
          {stemProg && <div style={{marginTop:8}}>
            <div style={{background:'rgba(255,255,255,.1)',borderRadius:6,height:8,overflow:'hidden'}}>
              <div style={{height:'100%',borderRadius:6,transition:'width .3s',width:(stemProg.done/stemProg.total*100)+'%',background:stemProg.failed?'var(--drums)':'var(--ok)'}}/>
            </div>
            <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>{stemProg.done} / {stemProg.total} stems</div>
          </div>}
          {fileMsg && <div className="filemsg">{fileMsg}</div>}
        </div>
      </div>}
      {recState && !stemOpen && <div className="rec-overlay">
        <div className="rec-panel">
          <div className="rec-dot"></div>
          <div className="rec-label">{recState==='recording'?'Recording':'Paused'}</div>
          <div className="rec-timer">{fmtSecs(recTime)}</div>
          <div style={{fontSize:13,color:'var(--muted)',marginBottom:20}} dir="auto">{s.title}</div>
          <div className="rec-btns">
            {recState==='recording'
              ? <button className="rec-btn pause" onClick={pauseRec}>Pause</button>
              : <button className="rec-btn pause" onClick={resumeRec}>Resume</button>}
            <button className="rec-btn stop" onClick={stopRec}>Stop</button>
          </div>
        </div>
      </div>}
      {recPrompt && <div className="rec-confirm">
        <div className="rec-confirm-panel">
          <div className="modaltitle">Start recording?</div>
          <div style={{fontSize:13,color:'var(--muted)',marginBottom:18}}>Record audio for "{s.title}"</div>
          <div className="btnrow">
            <button className="btn ghost" onClick={()=>setRecPrompt(false)}>Cancel</button>
            <button className="btn" style={{background:'var(--drums)'}} onClick={()=>{setRecPrompt(false);startRec();}}>Start</button>
          </div>
        </div>
      </div>}
      {recConfirm && <div className="rec-confirm">
        <div className="rec-confirm-panel">
          <div className="modaltitle">Save recording?</div>
          <div style={{fontSize:13,color:'var(--muted)',marginBottom:18}}>{fmtSecs(recTime)} recorded for "{s.title}"</div>
          <div className="btnrow">
            <button className="btn danger" onClick={abandonRec}>Discard</button>
            <button className="btn" onClick={uploadRec}>Save</button>
          </div>
        </div>
      </div>}
      {playerFile && <div className="player-overlay" onClick={e=>{if(e.target===e.currentTarget) closePlayer();}}>
        <div className="player-panel">
          <div className="player-title" dir="auto">{playerFile.name}</div>
          <input type="range" className="player-seek" min="0" max={playerDur||1} step="0.1" value={playerTime} onChange={e=>seekTo(+e.target.value)}/>
          <div className="player-time"><span>{fmtSecs(Math.floor(playerTime))}</span><span>{playerDur&&isFinite(playerDur)?fmtSecs(Math.floor(playerDur)):'-:--'}</span></div>
          <div className="player-controls">

function SongForm({onSave,onCancel}){
  const [f,setF]=useState({title:'',artist:'',songKey:'',tempo:'',duration:''});
  const set=(k,v)=>setF({...f,[k]:v});
  return (
    <div className="card" style={{marginTop:14,borderColor:'var(--line-2)'}}>
      <div className="fieldgrid">
        <div className="full"><label className="fl">Song title</label>
          <input className="inp" dir="auto" autoFocus value={f.title} onChange={e=>set('title',e.target.value)} placeholder="Song name"/></div>
        <div className="full"><label className="fl">Artist</label>
          <input className="inp" dir="auto" value={f.artist} onChange={e=>set('artist',e.target.value)} placeholder="Original artist"/></div>
        <div><label className="fl">Key</label><input className="inp" value={f.songKey} onChange={e=>set('songKey',e.target.value)} placeholder="Am"/></div>
        <div><label className="fl">Tempo</label><input className="inp" inputMode="numeric" value={f.tempo} onChange={e=>set('tempo',e.target.value)} placeholder="bpm"/></div>
        <div className="full"><label className="fl">Length (min)</label><input className="inp" inputMode="numeric" value={f.duration} onChange={e=>set('duration',e.target.value)} placeholder="4"/></div>
      </div>
      <div className="banner" style={{marginTop:12}}>You can edit any of these later, and add the album cover, by tapping the song open. </div>
      <div className="btnrow">
        <button className="btn ghost" onClick={onCancel}>Cancel</button>
        <button className="btn" onClick={()=> f.title.trim() && onSave({...f,title:f.title.trim()})}>Add to setlist</button>
      </div>
    </div>
  );
}

// One shared focus-song view, used by both the Rehearsals cards and the Stage
// next-rehearsal card: each group (Practice / Learn) is a rounded box outlined in
// the group's own color, holding its filled title chip and one song per line
// (cover art + name).
function FocusTags({songs,learn,practice,onGoSong}){
  const group=(ids,color,label)=> ids && ids.length? (
    <div className="focus-box" style={{borderColor:color}}>
      <span className="ftag" style={{borderColor:color,color:'#15141B',background:color,fontWeight:700}}>{label}</span>
      <div style={{display:'flex',flexDirection:'column',gap:6,marginTop:7}}>
        {ids.map(id=>{ const other=isOther(id); const s=other?null:songs.find(y=>y.id===id); const name=focusName(id,songs); if(!name) return null;
          const clickable=onGoSong&&!other;
          return <div key={id} onClick={clickable?()=>onGoSong(id):undefined} style={{display:'flex',alignItems:'center',gap:9,cursor:clickable?'pointer':'default'}}>
            <div style={{width:30,height:30,borderRadius:6,flex:'none',overflow:'hidden',background:'var(--surface-3)',border:'1px solid var(--line)',display:'flex',alignItems:'center',justifyContent:'center'}}>
              {s&&s.cover ? <img src={s.cover} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/> : <span style={{fontSize:13,fontWeight:700,color:'var(--muted)'}}>{(name||'?').trim().charAt(0).toUpperCase()}</span>}
            </div>
            <span style={{fontSize:13,direction:'ltr',textAlign:'left',minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} dir="auto">{name}</span>
          </div>;
        })}
      </div>
    </div>
  ):null;
  if((!learn||!learn.length) && (!practice||!practice.length)) return null;
  return <React.Fragment>{group(practice,'var(--warn)','Practice')}{group(learn,'var(--learn)','Learn')}</React.Fragment>;
}
// Missing docs for a rehearsal/plan session: only lists what a focus song is still
// missing (its slide and/or full stem set). Anything already provided is not shown,
// and the whole section disappears once nothing is missing.
function NeededDocs({songs,ids}){
  const catOf=f=>(f.cat==='original'?'other':f.cat||'other');
  const hasSlide=s=>(s.files||[]).some(f=>f.url&&catOf(f)==='slide');
  const stemCount=s=>new Set((s.files||[]).filter(f=>f.stem).map(catOf).filter(c=>['vocals','drums','bass','guitar','keys','other'].includes(c))).size;
  const rows=[];
  [...new Set(ids||[])].forEach(id=>{ if(isOther(id))return; const s=(songs||[]).find(x=>x.id===id); if(!s)return;
    const missing=[]; if(!hasSlide(s)) missing.push('Slide'); if(stemCount(s)<6) missing.push('Stems');
    if(missing.length) rows.push({s,missing}); });
  if(!rows.length) return null;
  return (
    <div className="needdocs">
      <div className="needdocs-h">Missing docs</div>
      {rows.map(({s,missing})=>(
        <div key={s.id} className="needdocs-row">
          <span className="needdocs-name" dir="auto">{s.title||'Untitled'}</span>
          {missing.map(m=><span key={m} className="dchk no">✕ {m}</span>)}
        </div>
      ))}
    </div>
  );
}
function focusSummary(arr,songs){
  const a=arr||[]; if(!a.length) return 'Choose songs…';

  return names.length<=2 ? names.join(', ') : (names.length+' selected');
}

function Rehearsals({state,update,goSong}){
  const [adding,setAdding]=useState(false);
  const list=[...state.rehearsals].sort((a,b)=>new Date(a.date||0)-new Date(b.date||0));
  const upcoming=list.filter(r=>!r.done);
  const past=list.filter(r=>r.done);
  const add=(items)=>{ update(s=>{ (Array.isArray(items)?items:[items]).forEach(data=>{ s.rehearsals.push({id:uid(),done:false,attendance:{},apprReset:true,focusLearn:[],focusPractice:[],proposal:null,...data}); logAct(s,'scheduled a rehearsal'+(data.date?' for '+fmtDate(data.date):'')); }); return s;}); setAdding(false); };
  const patch=(id,fn)=> update(s=>{ const r=s.rehearsals.find(x=>x.id===id); fn(r); return s;});
  const del=(id)=> update(s=>{ const r=s.rehearsals.find(x=>x.id===id); logAct(s,'removed the '+(r&&r.date?fmtDate(r.date)+' ':'')+'rehearsal'); s.rehearsals=s.rehearsals.filter(x=>x.id!==id); return s;});

      {past.length>0 && <React.Fragment>
        <div className="section-h">Done · {past.length}</div>

      </React.Fragment>}
    </div>

// Attendance per player: 'yes' (can attend), 'no' (can't), 'maybe' (unsure), or
// 'none' (not answered yet). Legacy docs stored a plain boolean where true meant
// approved and false/absent meant simply un-answered — normalize both here.
function attState(v){ if(v===true||v==='yes')return 'yes'; if(v==='no')return 'no'; if(v==='maybe')return 'maybe'; return 'none'; }
function attLabel(st){ return st==='yes'?'can attend':st==='no'?"can't attend":st==='maybe'?'might attend':'not answered'; }
// Glyph shown on the corner badge / in buttons for an answered state.
function attGlyph(st){ return st==='yes'?'✓':st==='no'?'✕':st==='maybe'?'?':''; }
function rehAllApproved(r){ const a=(r&&r.attendance)||{}; return INSTR.every(i=>attState(a[i.id])==='yes'); }
function rehAnyDeclined(r){ const a=(r&&r.attendance)||{}; return INSTR.some(i=>attState(a[i.id])==='no'); }
function ApprovalBadge({r}){
  const a=(r&&r.attendance)||{};
  const yes=INSTR.filter(i=>attState(a[i.id])==='yes').length;
  const no=INSTR.filter(i=>attState(a[i.id])==='no');
  const all=yes===INSTR.length;
  const declined=no.length>0;
  const title=all?'All players can attend'
    :declined?(no.map(i=>i.label).join(', ')+" can't attend ("+yes+'/'+INSTR.length+' confirmed)')
    :(yes+'/'+INSTR.length+' confirmed — awaiting the rest');
  return <span title={title}
    style={{display:'inline-flex',alignItems:'center',justifyContent:'center',minWidth:18,height:18,padding:'0 5px',borderRadius:9,fontSize:12,fontWeight:800,marginInlineStart:8,verticalAlign:'middle',background:all?'var(--ok)':'var(--drums)',color:'#fff',lineHeight:1}}>{all?'✓':declined?'✕':'!'}</span>;
}
// Picker shown when a player chip is tapped: ✓ can attend / ? maybe / ✕ can't.

function AttPop({cur,onPick}){

function RehForm({shows,songs,members,guestList:guestListProp,onSave,onCancel}){
  const guestList=guestListProp||[];
  const defaultShow=((shows||[])[0]||{}).id||'';
  const [f,setF]=useState({date:'',duration:'2',location:'',notes:'',learn:[],practice:[],repeat:'none',occurrences:4,showId:defaultShow,attendance:{}});
  const selShow=getShow({shows:shows||[]},f.showId);
  const showEntries=selShow?(selShow.setlist||[]).filter(e=>!e.excluded):[];
  const showSongs=showEntries.map(e=>(songs||[]).find(x=>x.id===e.songId)).filter(Boolean);
  const onToggleFocus=(group,id)=>setF(p=>{const res=toggleFocus(p.learn,p.practice,group,id);return {...p,learn:res.learn,practice:res.practice};});
  const onSetOther=(group,text)=>setF(p=>({...p,[group]:setOtherInArr(p[group],text)}));
  const toggleAtt=id=>setF(p=>{ const a={...p.attendance}; if(attState(a[id])==='yes') delete a[id]; else a[id]='yes'; return {...p,attendance:a}; });
  const occ=Math.max(2,Math.min(12,+f.occurrences||2));
  const buildDates=()=>{ if(!f.date) return ['']; if(f.repeat==='none') return [f.date]; const step=f.repeat==='biweekly'?14:7; const out=[]; for(let k=0;k<occ;k++) out.push(addDaysLocal(f.date,step*k)); return out; };
  const dates=buildDates();
  const multi = f.repeat!=='none' && !!f.date;
  const save=()=>{ const items=dates.map(dt=>({date:dt,duration:f.duration,location:f.location,notes:f.notes,showId:f.showId,focusLearn:[...f.learn],focusPractice:[...f.practice],attendance:{...f.attendance}})); onSave(items); };
  return (
    <div className="card" style={{marginTop:14,borderColor:'var(--line-2)'}}>
      {(shows||[]).length>1 && <React.Fragment>
        <label className="fl">Show</label>

        <div><label className="fl">Duration</label>
          <select className="inp" value={f.duration} onChange={e=>setF({...f,duration:e.target.value})}>
            {['0.5','1','1.5','2','2.5','3','3.5','4','5','6'].map(v=><option key={v} value={v}>{fmtDuration(v)}</option>)}
          </select></div>
        <div><label className="fl">Location</label><input className="inp" dir="auto" value={f.location} onChange={e=>setF({...f,location:e.target.value})} placeholder="Studio, garage…"/></div>
      </div>
      <label className="fl" style={{marginTop:14}}>Repeat — same time & place</label>
      <div className="chip-pick">
        {[['none','Just once'],['weekly','Weekly'],['biweekly','Every 2 weeks']].map(([v,l])=>
          <button key={v} className={'chip'+(f.repeat===v?' on':'')} onClick={()=>setF({...f,repeat:v})}>{l}</button>)}
      </div>
      {f.repeat!=='none' &&
        <div className="stepper">
          <span className="lbl">How many sessions</span>
          <button className="xbtn" onClick={()=>setF({...f,occurrences:Math.max(2,occ-1)})} aria-label="Fewer">−</button>
          <span className="cnt">{occ}</span>
          <button className="xbtn" onClick={()=>setF({...f,occurrences:Math.min(12,occ+1)})} aria-label="More">+</button>
        </div>}

        {INSTR.map(i=><button key={i.id} className={'chip'+(f.attendance[i.id]?' on':'')} style={f.attendance[i.id]?{background:i.color,borderColor:i.color,display:'inline-flex',alignItems:'center',gap:6}:{display:'inline-flex',alignItems:'center',gap:6}} onClick={()=>toggleAtt(i.id)}><InstrIcon id={i.id} size={14}/>{members[i.id].name}</button>)}

      </div>
    </div>
  );

function TelegramCard({state,user}){
  const [tgUser,setTgUser]=useState(null);
  const [tgBusy,setTgBusy]=useState(false);
  const [tgMsg,setTgMsg]=useState('');
  const botUser=((state.telegramBot||TELEGRAM_BOT||'').trim().replace(/^@/,''));
  const refreshTg=useCallback(()=>{ db.collection('telegramChats').doc(BOARD).get().then(s=>{ const users=(s.exists&&Array.isArray(s.data().users))?s.data().users:[]; setTgUser(users.find(u=>u.email===(user&&user.email))||null); }).catch(()=>{}); },[user]);
  useEffect(()=>{ refreshTg(); },[refreshTg]);
  const connectTg=async()=>{
    if(!botUser){ setTgMsg('No bot set for this band yet — ask the band owner.'); return; }
    setTgBusy(true); setTgMsg('');

      window.open('https://t.me/'+botUser+'?start='+code,'_blank');
      setTgMsg('Opening Telegram — tap START there, then come back and tap Refresh.');

  return (<React.Fragment>

      <div style={{fontSize:12.5,color:'var(--muted)',lineHeight:1.55,marginBottom:8}}>Link your Telegram so the band manager can message you directly and you can answer its polls (like confirming a rehearsal). Links only your own account.</div>

let cropDrag=null;
function CropModal({src,onCancel,onDone}){
  const V=Math.min(280,((window.__SIM?window.__SIM.w:window.innerWidth)||360)-64), OUT=220;
  const [nat,setNat]=useState(null);
  const [zoom,setZoom]=useState(1);
  const [off,setOff]=useState({x:0,y:0});
  useEffect(()=>{ const img=new Image(); img.onload=()=>setNat({w:img.naturalWidth,h:img.naturalHeight}); img.src=src; },[src]);
  const base = nat ? V/Math.min(nat.w,nat.h) : 1;
  const s = base*zoom;
  const dispW = nat? nat.w*s : V;
  const dispH = nat? nat.h*s : V;
  const clamp=(o,zz)=>{ if(!nat) return o; const ss=base*zz, w=nat.w*ss, h=nat.h*ss; return { x:Math.min(0,Math.max(V-w,o.x)), y:Math.min(0,Math.max(V-h,o.y)) }; };
  useEffect(()=>{ if(nat){ const w=nat.w*base, h=nat.h*base; setZoom(1); setOff({x:(V-w)/2,y:(V-h)/2}); } },[nat]);
  const onZoom=(z)=>{ if(!nat){ setZoom(z); return; } const sOld=base*zoom, sNew=base*z; const cx=(-off.x+V/2)/sOld, cy=(-off.y+V/2)/sOld; setZoom(z); setOff(clamp({x:V/2-cx*sNew,y:V/2-cy*sNew},z)); };
  const pt=(e)=>{ const t=e.touches?e.touches[0]:e; return {x:t.clientX,y:t.clientY}; };
  const down=(e)=>{ const p=pt(e); cropDrag={px:p.x,py:p.y,ox:off.x,oy:off.y}; try{ e.currentTarget.setPointerCapture && e.currentTarget.setPointerCapture(e.pointerId); }catch(_){} };
  const moveH=(e)=>{ if(!cropDrag)return; const p=pt(e); setOff(clamp({x:cropDrag.ox+(p.x-cropDrag.px),y:cropDrag.oy+(p.y-cropDrag.py)},zoom)); };
  const up=()=>{ cropDrag=null; };
  const done=()=>{ const img=new Image(); img.onload=()=>{ try{ const c=document.createElement('canvas'); c.width=OUT; c.height=OUT; const ctx=c.getContext('2d'); ctx.drawImage(img,(-off.x)/s,(-off.y)/s,V/s,V/s,0,0,OUT,OUT); onDone(c.toDataURL('image/jpeg',0.85)); }catch(err){ onDone(null); } }; img.onerror=()=>onDone(null); img.src=src; };
  return (
    <div className="cropwrap" onPointerUp={up}>
      <div className="cropcard">
        <div className="croptitle">Position the image</div>
        <div className="cropview" style={{width:V,height:V}} onPointerDown={down} onPointerMove={moveH} onPointerUp={up}>
          <img src={src} draggable="false" style={{position:'absolute',left:off.x,top:off.y,width:dispW,height:dispH}}/>
          <div className="cropframe"></div>
        </div>
        <input className="cropzoom" type="range" min="1" max="4" step="0.01" value={zoom} onChange={e=>onZoom(+e.target.value)}/>
        <div className="crophint">Drag to reposition · slide to zoom</div>
        <div className="btnrow">
          <button className="btn ghost" onClick={onCancel}>Cancel</button>
          <button className="btn" onClick={done} disabled={!nat}>Use image</button>
        </div>
      </div>
    </div>
  );
}

// Palette the manager may color text with: {red:...}, {drums:...} etc. Instrument
// names map to that instrument's own color so it can name players in their color.
const CHAT_COLORS={
  red:'#F2545B',green:'#3DD68C',amber:'#E8A33D',orange:'#F4A93C',yellow:'#F5D442',
  blue:'#5B9DF9',purple:'#8B7CF6',pink:'#EC6FA9',teal:'#2DD4BF',grey:'#948FA6',gray:'#948FA6',
  keys:'#8B7CF6',drums:'#F2545B',guitar:'#F4A93C',bass:'#2DD4BF',vocals:'#EC6FA9'
};
// Inline formatter for manager messages. Builds REACT ELEMENTS (never HTML) so
// model output can't inject markup. Supports {color:text}, **bold**, *italic*, `code`.
function richParse(str){
  const out=[]; let last=0,k=0;
  // Emphasis markers must hug non-whitespace (markdown's own rule), otherwise
  // arithmetic like "5 * 3 * 2" or a stray asterisk turns into italics.
  const re=/\{([a-zA-Z]+):([^{}]*)\}|\*\*([^*\s](?:[^*]*[^*\s])?)\*\*|\*([^*\s](?:[^*\n]*[^*\s])?)\*|`([^`]+)`/g;
  let m;
  while((m=re.exec(str))){
    if(m.index>last) out.push(str.slice(last,m.index));
    if(m[1]!==undefined){
      const c=CHAT_COLORS[m[1].toLowerCase()];
      // Unknown color name: leave the text exactly as written rather than eat it.
      if(c) out.push(<span key={k++} style={{color:c,fontWeight:600}}>{richParse(m[2])}</span>);
      else out.push(m[0]);
    }
    else if(m[3]!==undefined) out.push(<b key={k++}>{richParse(m[3])}</b>);
    else if(m[4]!==undefined) out.push(<i key={k++}>{richParse(m[4])}</i>);
    else if(m[5]!==undefined) out.push(<code key={k++} className="mcode">{m[5]}</code>);
    last=re.lastIndex;
  }
  if(last<str.length) out.push(str.slice(last));
  return out;
}
// Block level: headings, bullets, blank-line spacing. Bullets are matched before
// inline italics so a leading "* item" is a bullet, not an unterminated emphasis.
function RichText({text}){
  const lines=String(text==null?'':text).split('\n');
  return <React.Fragment>{lines.map((ln,i)=>{
    const head=/^\s*#{1,3}\s+(.*)$/.exec(ln);
    if(head) return <div key={i} style={{fontWeight:700,fontSize:14,margin:'6px 0 2px'}}>{richParse(head[1])}</div>;
    const bullet=/^\s*[-*•]\s+(.*)$/.exec(ln);
    if(bullet) return <div key={i} style={{display:'flex',gap:6,alignItems:'flex-start'}}><span style={{opacity:.55,flex:'none'}}>•</span><span style={{minWidth:0}}>{richParse(bullet[1])}</span></div>;
    if(!ln.trim()) return <div key={i} style={{height:6}}/>;
    return <div key={i}>{richParse(ln)}</div>;
  })}</React.Fragment>;
}

}

/* ---------- Help tab + guided tours ("Show me how to…") ---------- */
// Each tour is a list of steps. A step points at a live DOM element (found by the
// `sel` CSS selector — some carry a data-coach attribute) on a given tab; the
// Coach overlay dims everything else, arrows at it, and only the tap on that
// element advances. `needEnabled` waits for a disabled control (e.g. Play before
// the audio loads).
function buildTour(id, opts, state){
  if(id==='practice'){
    const song=((state&&state.songs)||[]).find(s=>s.id===opts.songId);
    if(!song) return null;
    const t=song.title||'this song';
    // Count viewable files (slide + the user's instrument charts) — the Files
    // switch step only makes sense when there's more than the slide.
    const catOf=f=>(f.cat==='original'?'other':f.cat||'other');
    const isImg=f=>/\.(jpe?g|png|webp|gif|bmp|svg)$/i.test(f.name||'');
    const isPdf=f=>f.type==='pdf'||/\.pdf$/i.test(f.name||'');
    let views=0;
    ['slide',...(MY_INSTRS||[]).filter(x=>x!=='metronome')].forEach(sec=>{
      (song.files||[]).forEach(f=>{ if(f.url&&catOf(f)===sec&&(isImg(f)||isPdf(f))) views++; });
    });
    const P='.stem-play', D=(k)=>'[data-coach="'+k+'"]';
    const steps=[
      { tab:'setlist', sel:D('practice-'+song.id), text:'Tap the ▶ Practice button on “'+t+'” to open the multi-track player.' },
      { sel:P, needEnabled:true, text:'Tap Play ▶ to start the backing tracks.' },
      { sel:P, text:'Now tap the same button (⏸) to pause.' },
      { sel:P, text:'Tap Play ▶ again to continue from where you paused.' },
      { sel:'.sb-stop', needEnabled:true, text:'Tap Stop ■ to rewind back to the start.' },
      { sel:P, text:'Tap Play ▶ once more — it plays from the beginning.' },
      { sel:'.stem-cfg-btn', text:'Tap ⚙ CONFIG to open the channel mixer.' },
      { sel:D('chmute-metronome'), text:'The metronome starts muted. Tap Mute on the Metronome channel to turn the click ON.' },
      { sel:D('chmute-metronome'), text:'Tap Mute again to silence the metronome.' },
      { sel:D('chmute-drums'), text:'Tap Mute on Drums to silence just that instrument.' },
      { sel:D('chmute-drums'), text:'Tap Mute again to bring the Drums back.' },
      { sel:D('chsolo-guitar'), text:'Tap Solo on Guitar to hear only that instrument.' },
      { sel:D('chsolo-guitar'), text:'Tap Solo again to turn soloing off.' },
      { sel:D('chcustom-vocals'), text:'Tap Custom on Vocals to give it its own volume — a slider appears.' },
      { sel:D('chvol-vocals'), event:'change', text:'Drag the Vocals slider down to about 30%.' },
      { sel:D('reset-chans'), text:'Tap ↺ Reset channels to put every channel back to default.' },
      { sel:'.stem-cfg-btn', text:'Tap ⚙ CONFIG again to close the mixer.' },
    ];
    if(views>1){
      steps.push({ sel:'.sb-files', text:'Tap the Files button to switch the shown document (e.g. your instrument chart).' });
      steps.push({ sel:'.sb-files', text:'Tap Files again to cycle back toward the slide.' });
    }
    steps.push({ sel:D('stem-close'), text:'Finally, tap Close to leave Practice. That’s the whole tour — nicely done! 🎸' });
    return steps;
  }
  if(id==='record'){
    const song=((state&&state.songs)||[]).find(s=>s.id===opts.songId);
    if(!song) return null;
    const t=song.title||'this song';
    const D=(k)=>'[data-coach="'+k+'"]';
    return [
      { tab:'setlist', sel:D('practice-'+song.id), text:'Open “'+t+'” in the player — tap its ▶ Practice button.' },
      { sel:'.sb-rec', needEnabled:true, text:'Tap the 🎙 Record button to record your own part over the backing tracks.' },
      { sel:D('rec-start'), needEnabled:true, text:'Read the note, then tap Start. If Start is greyed out, set your instrument in the header first. Using headphones? Flip 🎧 on above.' },
      { sel:D('rec-go'), text:'Tap 🎙 GO, and allow microphone access if your browser asks.' },
      { sel:D('rec-stop'), text:'You’ll hear 4 beeps — say “Ta” on the next 4 silent beats, then play your part along with the backing. Tap Stop when you’re done.' },
      { sel:D('rec-save'), text:'Tap Save to keep your take (it’s trimmed and lined up automatically).' },
      { sel:D('files-'+song.id), text:'Saved! Now tap the Files icon on “'+t+'” to find your recording.' },
      { sel:D('myrec-section'), text:'Under “My Stem Recordings”, tap your recording to open it in the player.' },
      { sel:'.sb-share', needEnabled:true, text:'Tap Share — it mixes your part together with the backing into a single audio file.' },
      { sel:'.sb-send', text:'Tap Send to share the mix (on a computer it downloads the file instead). All done! 🎧' },
    ];
  }
  if(id==='instrfile'){
    const song=((state&&state.songs)||[]).find(s=>s.id===opts.songId);
    if(!song) return null;
    const t=song.title||'this song';
    const D=(k)=>'[data-coach="'+k+'"]';
    const myCat=(MY_INSTRS.filter(x=>x!=='metronome')[0])||'other';
    const myLabel=(INSTR.find(i=>i.id===myCat)||{label:'Other'}).label;
    return [
      { tab:'setlist', sel:D('files-'+song.id), text:'Open the Files screen for “'+t+'” — tap its Files icon.' },
      { sel:D('addfile-'+myCat), text:'In your '+myLabel+' section, tap + Add. Choose a JPG or PNG (a chart or notes) — images show best in the player.' },
      { info:true, text:'Pick a JPG or PNG in the file dialog, and wait for it to appear in your '+myLabel+' section. Then tap Next.' },
      { sel:D('files-practice'), text:'Now tap ▶ Practice to open the player with your files.' },
      { sel:'.sb-files', needEnabled:true, text:'Tap the Files button to switch the shown document — cycle to your '+myLabel+' image. (This needs the song to have a slide too.)' },
      { info:true, text:'Pinch — or Ctrl+scroll on a computer — to zoom into part of the image, and drag to pan. Set the view how you want, then tap Next.' },
      { sel:'.sb-zoom', needEnabled:true, text:'Tap the ⛶ positions button. (If it’s greyed out, this song has no backing stems — positions need a timeline. Tap Exit and pick a song with stems.)' },
      { sel:D('zoom-set'), text:'Tap Set to save this zoom as a position at the current playhead time.' },
      { info:true, text:'To add more: seek to another point in the song, zoom to a different spot, then ⛶ → Set again. Tap the RIGHT half of the image to jump to the next position and the LEFT half for the previous — during playback they follow the song automatically. Try it, then tap Next.' },
      { sel:'.sb-files', text:'Tap Files to switch back to the Slide.' },
      { sel:'.sb-files', text:'Tap Files again to return to your '+myLabel+' image.' },
      { sel:'.sb-draw', text:'Tap the ✎ pencil to start drawing on your image.' },
      { info:true, text:'Draw a note or comment on the image with your finger or mouse. Use the pen button to pick a color and thickness. Then tap Next.' },
      { sel:D('draw-save'), text:'Tap Save to store your drawing — it reloads on this image next time.' },
      { sel:D('draw-clear'), text:'Finally, tap Clear to wipe all drawings from this image. That’s the whole tour! 🎨' },
    ];
  }
  return null;
}

// The overlay that runs a tour. It locates the current step's target element,
// dims everything with 4 blocker panels that leave ONLY the target exposed, arrows
// at it, and advances when the target fires its real event (click for buttons,
// change for the slider). Taps anywhere else hit a blocker and are ignored.
function Coach({coach,setTab,advance,onExit}){
  const step=coach.steps[coach.step];
  const done=!step;
  const [rect,setRect]=useState(null);
  const [ready,setReady]=useState(false);
  const [infoHidden,setInfoHidden]=useState(false); // info card collapsed to a pill
  useBackHandler(true,onExit);
  useEffect(()=>{ if(step&&step.tab) setTab(step.tab); },[coach.step]);
  useEffect(()=>{ setInfoHidden(false); },[coach.step]); // each step starts with the card shown
  useEffect(()=>{
    if(done||step.info){ setRect(null); return; }
    let alive=true, raf, scrolled=false, boundEl=null, acted=false;
    const evt=step.event||'click';
    const onEvt=()=>{ if(!alive||acted) return; acted=true; setTimeout(()=>{ if(alive) advance(); }, evt==='click'?70:0); };
    setRect(null); setReady(false);
    const loop=()=>{
      if(!alive) return;
      const el=document.querySelector(step.sel);
      if(el){
        if(el!==boundEl){ if(boundEl) boundEl.removeEventListener(evt,onEvt); boundEl=el; el.addEventListener(evt,onEvt); }
        if(!scrolled){ scrolled=true; try{ el.scrollIntoView({block:'center',inline:'nearest'}); }catch(_){} }
        const r=el.getBoundingClientRect();
        setRect({x:r.left,y:r.top,w:r.width,h:r.height});
        setReady(!(step.needEnabled && el.disabled));
      } else { setReady(false); }
      raf=requestAnimationFrame(loop);
    };
    loop();
    return ()=>{ alive=false; cancelAnimationFrame(raf); if(boundEl) boundEl.removeEventListener(evt,onEvt); };
  },[coach.step]);
  if(done){
    return ReactDOM.createPortal((
      <div className="coach-layer">
        <div className="coach-catch coach-dim" onClick={onExit}></div>
        <div className="coach-done" onClick={e=>e.stopPropagation()}>
          <div style={{fontSize:34}}>🎉</div>
          <div style={{fontSize:16,fontWeight:700,margin:'6px 0 4px'}}>You're all set!</div>
          <div style={{fontSize:13,color:'var(--muted)',marginBottom:14,lineHeight:1.5}}>That's the walkthrough — nicely done. You can start any guide again from the Help tab.</div>
          <button className="btn" onClick={onExit}>Done</button>
        </div>
      </div>
    ), document.body);
  }
  // Informational step: a floating card with a Next button. The layer stays
  // pointer-events:none so the app underneath is fully usable — this is how the
  // gesture steps work (pinch to zoom, draw, tap slide halves), then tap Next.
  if(step.info){
    const iw=Math.min(320, window.innerWidth-24);
    return ReactDOM.createPortal((
      <div className="coach-layer">
        {infoHidden
          ? <button className="coach-pill" onClick={()=>setInfoHidden(false)}>▸ Show guide</button>
          : <div className="coach-card coach-info" style={{left:'50%',bottom:100,transform:'translateX(-50%)',width:iw}} onClick={e=>e.stopPropagation()}>
              <button className="coach-hide" onClick={()=>setInfoHidden(true)} title="Hide — use the whole screen, then bring it back">–</button>
              <div style={{fontSize:13,color:'var(--keys)',fontWeight:700,fontFamily:'var(--mono)',marginBottom:5,paddingRight:24}}>Try it 👆</div>
              <div style={{fontSize:13.5,lineHeight:1.5}}>{step.text}</div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:11}}>
                <button className="btn ghost sm" onClick={onExit}>Exit guide</button>
                <button className="btn sm" onClick={advance}>Next ▸</button>
              </div>
            </div>}
      </div>
    ), document.body);
  }
  const vh=window.innerHeight, vw=window.innerWidth;
  const P=6;
  const below=rect ? (rect.y+rect.h/2) < vh*0.5 : true;
  const cardW=Math.min(300, vw-24);
  const cx=rect ? Math.max(12, Math.min(rect.x+rect.w/2-cardW/2, vw-cardW-12)) : 12;
  const cardStyle=rect
    ? (below ? {left:cx, top:Math.min(rect.y+rect.h+34, vh-200)} : {left:cx, bottom:Math.max(vh-rect.y+34, 96)})
    : {left:12, bottom:110};
  const swallow=(e)=>{ e.preventDefault(); e.stopPropagation(); };
  return ReactDOM.createPortal((
    <div className="coach-layer">
      {rect ? (
        <React.Fragment>
          {/* four blockers leave the target rect exposed so its real control works */}
          <div className="coach-block" style={{left:0,top:0,width:vw,height:Math.max(0,rect.y-P)}} onClick={swallow}></div>
          <div className="coach-block" style={{left:0,top:rect.y+rect.h+P,width:vw,height:Math.max(0,vh-rect.y-rect.h-P)}} onClick={swallow}></div>
          <div className="coach-block" style={{left:0,top:Math.max(0,rect.y-P),width:Math.max(0,rect.x-P),height:rect.h+2*P}} onClick={swallow}></div>
          <div className="coach-block" style={{left:rect.x+rect.w+P,top:Math.max(0,rect.y-P),width:Math.max(0,vw-rect.x-rect.w-P),height:rect.h+2*P}} onClick={swallow}></div>
          <div className="coach-ring" style={{left:rect.x-4,top:rect.y-4,width:rect.w+8,height:rect.h+8}}></div>
          <div className={'coach-point '+(below?'down':'up')} style={below?{left:Math.max(14,Math.min(rect.x+rect.w/2-13,vw-38)),top:rect.y+rect.h+6}:{left:Math.max(14,Math.min(rect.x+rect.w/2-13,vw-38)),top:rect.y-32}}>
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--keys)" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">{below?<path d="M12 4v13M6 11l6 6 6-6"/>:<path d="M12 20V7M6 13l6-6 6 6"/>}</svg>
          </div>
        </React.Fragment>
      ) : (
        <div className="coach-catch coach-dim" onClick={swallow}></div>
      )}
      <div className="coach-card" style={{...cardStyle, width:cardW}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:13.5,lineHeight:1.5}}>{step.text}</div>
        {step.needEnabled && !ready && <div style={{fontSize:11,color:'var(--warn)',marginTop:7}}>Waiting for the player to load… if this song has no backing tracks, tap Exit.</div>}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:11}}>
          <span style={{fontSize:11,color:'var(--muted)',fontFamily:'var(--mono)'}}>Step {coach.step+1} / {coach.steps.length}</span>
          <button className="btn ghost sm" onClick={onExit}>Exit guide</button>
        </div>
      </div>
    </div>
  ), document.body);
}
function TabBar({tab,setTab,canAdmin}){
  const items=[['stage','Stage'],['setlist','Setlist'],['rehearse','Rehearsals'],...(canAdmin?[['admin','Admin']]:[]),['shows','Shows'],['album','Gallery'],['setup','Setup'],['help','Help']];
  const wide=useWide(760);
  const [moreOpen,setMoreOpen]=useState(false);
  useBackHandler(moreOpen,()=>setMoreOpen(false));
  // On narrow screens keep the first few tabs inline and fold the rest under "More".
  const PRIMARY=4;
  const primary=wide?items:items.slice(0,PRIMARY);
  const overflow=wide?[]:items.slice(PRIMARY);
  const overflowActive=overflow.some(([id])=>id===tab);
  const tabBtn=([id,label],onClick)=>(
    <button key={id} className={'tab'+(tab===id?' on':'')} onClick={onClick||(()=>setTab(id))}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d={ICONS[id]}/></svg>
      {label}<span className="ind"></span>
    </button>
  );
  return (
    <React.Fragment>
      <nav className="tabbar">
        {primary.map(it=>tabBtn(it))}
        {overflow.length>0 && (
          <button className={'tab'+(overflowActive?' on':'')} onClick={()=>setMoreOpen(true)}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d={ICONS.more}/></svg>
            More<span className="ind"></span>
          </button>
        )}
      </nav>
      {moreOpen && (
        <div className="more-back" onClick={()=>setMoreOpen(false)}>
          <div className="more-sheet" onClick={e=>e.stopPropagation()}>
            <div className="more-grip"></div>
            {overflow.map(([id,label])=>(
              <button key={id} className={'more-item'+(tab===id?' on':'')} onClick={()=>{setTab(id);setMoreOpen(false);}}>
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d={ICONS[id]}/></svg>
                <span>{label}</span>
              </button>
            ))}
          </div>
        </div>
      )}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
