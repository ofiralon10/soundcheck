<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Soundcheck — band prep board</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&family=Heebo:wght@500;700&display=swap');
  :root{
    --bg:#15141B; --surface:#1F1D29; --surface-2:#282633; --surface-3:#322F40;
    --line:rgba(255,255,255,.09); --line-2:rgba(255,255,255,.14);
    --text:#ECEAF2; --muted:#948FA6; --muted-2:#6E697E;
    --keys:#8B7CF6; --drums:#F2545B; --guitar:#F4A93C; --bass:#2DD4BF; --vocals:#EC6FA9;
    --guest:#C9A6FF; --ok:#3DD68C; --warn:#E8A33D; --learn:#5B9DF9;
    --display:'Space Grotesk',system-ui,sans-serif; --mono:'Space Mono',ui-monospace,monospace;
    --body:'Inter',system-ui,sans-serif; --heb:'Heebo','Space Grotesk',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--body);-webkit-font-smoothing:antialiased;line-height:1.45}
  #root{max-width:540px;margin:0 auto;min-height:100vh;position:relative}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit}
  ::selection{background:var(--keys);color:#fff}
  .topbar{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,var(--bg) 72%,rgba(21,20,27,0));padding:18px 18px 12px}
  .wordmark{display:flex;align-items:center;gap:9px}
  .wordmark .dot{width:9px;height:9px;border-radius:50%;background:var(--ok);box-shadow:0 0 10px var(--ok);animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  @media (prefers-reduced-motion:reduce){.wordmark .dot{animation:none}}
  .wordmark h1{font-family:var(--display);font-weight:700;font-size:17px;letter-spacing:.16em;margin:0;color:var(--muted)}
  .topmeta{display:flex;justify-content:space-between;align-items:flex-end;margin-top:11px;gap:12px}
  .band{font-family:var(--heb);font-weight:700;font-size:22px;line-height:1.1}
  .concert-sub{font-size:12px;color:var(--muted);margin-top:3px}
  .countchip{font-family:var(--mono);text-align:right;flex-shrink:0}
  .countchip .num{font-size:22px;font-weight:700;line-height:1}
  .countchip .lbl{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:3px}
  .page{padding:6px 18px 110px;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .section-h{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-2);margin:22px 2px 10px;display:flex;align-items:center;gap:8px}
  .section-h::after{content:"";flex:1;height:1px;background:var(--line)}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px}
  .card+.card{margin-top:10px}
  .master{background:linear-gradient(160deg,var(--surface-2),var(--surface));border:1px solid var(--line);border-radius:16px;padding:16px}
  .master .row{display:flex;justify-content:space-between;align-items:baseline}
  .master .pct{font-family:var(--mono);font-size:34px;font-weight:700;line-height:1}
  .master .cap{font-size:12px;color:var(--muted)}
  .ticks{display:flex;gap:3px;margin-top:14px;height:30px;align-items:flex-end}
  .tick{flex:1;border-radius:2px;background:var(--surface-3);transition:background .5s ease,height .5s ease}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 12px}
  .stat .v{font-family:var(--mono);font-size:19px;font-weight:700}
  .stat .k{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);margin-top:2px}
  .strip{display:flex;align-items:center;gap:11px;padding:9px 0}
  .strip+.strip{border-top:1px solid var(--line)}
  .strip .name{font-family:var(--display);font-weight:600;font-size:13px;width:64px;flex-shrink:0}
  .strip .track{flex:1;height:8px;border-radius:5px;background:var(--surface-3);overflow:hidden}
  .strip .fill{height:100%;border-radius:5px;transition:width .6s cubic-bezier(.2,.7,.2,1)}
  .strip .val{font-family:var(--mono);font-size:12px;color:var(--muted);width:38px;text-align:right;flex-shrink:0}
  .song{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .song+.song{margin-top:10px}
  .song-head{display:flex;align-items:center;gap:12px;padding:13px 14px;width:100%;text-align:left}
  .song-title{font-family:var(--display);font-weight:600;font-size:15px;line-height:1.2}
  .song-meta{font-size:11.5px;color:var(--muted);margin-top:3px}
  .cells{display:flex;gap:5px;margin-left:auto;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;max-width:170px}
  .cell{width:24px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:700;border:1.5px solid;transition:all .2s}
  .cell svg{display:block}
  .song-prog{height:3px;background:var(--surface-3)}
  .song-prog .pf{height:100%;transition:width .5s}
  .cover-thumb{object-fit:cover;border:1px solid var(--line);flex-shrink:0;background:var(--surface-3)}
  .cover-thumb.ph{display:flex;align-items:center;justify-content:center;color:var(--muted-2)}
  .cover-edit{display:flex;gap:13px;align-items:center;padding:2px 0 14px;border-bottom:1px solid var(--line);margin-bottom:4px}
  .cover-btns{display:flex;flex-direction:column;gap:8px;align-items:flex-start}
  .cover-btns .btn{width:auto}
  .cropwrap{position:fixed;inset:0;z-index:60;background:rgba(10,9,14,.8);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .2s ease}
  .cropcard{background:var(--surface);border:1px solid var(--line-2);border-radius:18px;padding:18px;width:100%;max-width:340px}
  .croptitle{font-family:var(--display);font-weight:600;font-size:15px;text-align:center;margin-bottom:14px}
  .cropview{position:relative;margin:0 auto;overflow:hidden;border-radius:12px;background:#000;touch-action:none;cursor:grab;user-select:none;-webkit-user-select:none}
  .cropview:active{cursor:grabbing}
  .cropview img{pointer-events:none;user-select:none;-webkit-user-drag:none;max-width:none}
  .cropframe{position:absolute;inset:0;pointer-events:none;border-radius:12px;box-shadow:inset 0 0 0 2px rgba(255,255,255,.9)}
  .cropzoom{width:100%;margin:16px 0 4px;accent-color:var(--keys)}
  .crophint{font-size:11.5px;color:var(--muted);text-align:center;margin-bottom:4px}
  .btn:disabled{opacity:.45;cursor:default}
  .song-body{padding:8px 14px 16px;border-top:1px solid var(--line)}
  .editrow{display:flex;flex-direction:column;gap:8px;padding:11px 0}
  .editrow+.editrow{border-top:1px solid var(--line)}
  .editrow .ename{font-family:var(--display);font-weight:600;font-size:13px}
  .status-pills{display:flex;gap:5px;width:100%}
  .status-pills .pill{flex:1;text-align:center}
  .pill{font-family:var(--mono);font-size:9.5px;letter-spacing:.03em;text-transform:uppercase;padding:8px 4px;border-radius:7px;border:1px solid var(--line-2);color:var(--muted);white-space:nowrap}
  .pill.on{color:#15141B;font-weight:700;border-color:transparent}
  .guest-edit{padding:11px 0;border-top:1px dashed rgba(201,166,255,.28)}
  .guest-top{display:flex;gap:8px;align-items:center}
  .guest-edit .status-pills{margin-top:9px}
  .xbtn{width:36px;height:40px;border-radius:9px;border:1px solid var(--line);color:var(--muted);flex-shrink:0;font-size:18px}
  .addguest{margin-top:11px;font-size:12.5px;color:var(--guest);background:rgba(201,166,255,.08);border:1px dashed rgba(201,166,255,.4);border-radius:9px;padding:10px;width:100%}
  .fileitem{display:flex;align-items:center;gap:9px;padding:9px 0;border-top:1px solid var(--line)}
  .ftype{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.02em;color:#15141B;padding:5px 0;border-radius:6px;flex-shrink:0;width:38px;text-align:center}
  .fname{flex:1;min-width:0;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fsize{color:var(--muted-2);font-size:11px}
  .fbtn{font-size:12px;color:var(--text);background:var(--surface-2);border:1px solid var(--line);border-radius:7px;padding:6px 11px;flex-shrink:0}
  .xmini{width:30px;height:32px;border-radius:7px;border:1px solid var(--line);color:var(--muted);flex-shrink:0;font-size:16px}
  .fileempty{font-size:12.5px;color:var(--muted-2);padding:9px 0;border-top:1px solid var(--line)}
  .filebtns{display:flex;gap:9px;margin-top:11px}
  .addfile{flex:1;text-align:center;font-size:13px;color:var(--keys);background:rgba(139,124,246,.08);border:1px dashed rgba(139,124,246,.4);border-radius:9px;padding:11px;cursor:pointer;display:block}
  .linkadd{margin-top:11px}
  .filemsg{font-size:11.5px;color:var(--warn);margin-top:10px;line-height:1.45}
  .fieldgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px}
  label.fl{display:block;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0 0 5px 2px}
  .inp{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:10px 11px;color:var(--text);font-size:14px}
  .inp:focus{outline:none;border-color:var(--keys)}
  textarea.inp{resize:vertical;min-height:60px;font-size:13px}
  .full{grid-column:1/-1}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;background:var(--text);color:#15141B;font-weight:600;font-size:14px;padding:12px 16px;border-radius:10px;width:100%}
  .btn.ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--line)}
  .btn.danger{background:none;color:var(--drums);border:1px solid rgba(242,84,91,.4)}
  .btn.sm{padding:9px 13px;font-size:13px;width:auto}
  .btnrow{display:flex;gap:9px;margin-top:14px}
  .add-bar{margin:14px 0 4px}
  .stepper{display:flex;align-items:center;gap:12px;margin-top:11px}
  .stepper .lbl{font-size:13px;color:var(--muted)}
  .stepper .cnt{font-family:var(--mono);font-size:17px;font-weight:700;min-width:22px;text-align:center}
  .reh{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px}
  .reh+.reh{margin-top:10px}
  .reh.done{opacity:.62}
  .reh-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .reh-date{font-family:var(--display);font-weight:600;font-size:15px}
  .reh-time{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:2px}
  .reh-loc{font-size:12.5px;color:var(--muted);margin-top:4px}
  .att{display:flex;gap:6px;margin-top:11px;flex-wrap:wrap}
  .att .a{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700;border:1.5px solid var(--line-2);color:var(--muted-2)}
  .att .a.in{color:#15141B}
  .focus-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
  .ftag{font-size:11px;background:var(--surface-2);border:1px solid var(--line);border-radius:6px;padding:4px 8px;color:var(--muted)}
  .chip-pick{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
  .chip{font-size:12px;padding:7px 11px;border-radius:8px;border:1px solid var(--line-2);color:var(--muted);background:var(--surface-2)}
  .chip.on{background:var(--keys);border-color:var(--keys);color:#fff}
  .filterbar{display:flex;gap:7px;flex-wrap:wrap;margin:2px 0}
  .filterhint{font-size:11.5px;color:var(--muted);margin:8px 2px 4px}
  .empty{text-align:center;padding:46px 24px;color:var(--muted)}
  .empty .big{font-family:var(--display);font-weight:600;font-size:16px;color:var(--text);margin-bottom:6px}
  .empty .sm{font-size:13px;line-height:1.5}
  .legend{display:flex;gap:14px;justify-content:center;margin-top:16px;font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;color:var(--muted-2);text-transform:uppercase;flex-wrap:wrap}
  .legend span{display:flex;align-items:center;gap:5px}
  .lg{width:13px;height:13px;border-radius:4px;border:1.5px solid}
  .banner{font-size:11.5px;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-top:10px;line-height:1.5}
  .savepill{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
  .savepill i{width:7px;height:7px;border-radius:50%}
  .tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:540px;display:flex;background:rgba(26,25,33,.92);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:30}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;color:var(--muted-2);font-size:10px;letter-spacing:.03em;border-radius:10px}
  .tab.on{color:var(--text)}
  .tab svg{width:21px;height:21px}
  .tab .ind{width:4px;height:4px;border-radius:50%;background:var(--ok);margin-top:1px;opacity:0}
  .tab.on .ind{opacity:1}
  .authwrap{min-height:100vh;display:flex;flex-direction:column}
  .authmid{flex:1;display:flex;align-items:center;justify-content:center;padding:6px 18px 40px}
  .authmid>div{width:100%;max-width:380px}
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.10/babel.min.js"></script>

<!-- Firebase (loads from Google's CDN once this file is hosted on your own site) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<script type="text/babel">
const {useState,useEffect,useRef} = React;

/* ============================================================
   ▼▼▼  PASTE YOUR FIREBASE CONFIG HERE  ▼▼▼
   (Firebase console → Project settings → Your apps → Web app)
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyBzC67RTBTHDhUEn0Vxe1FWFrFBwq5UK2Q",
  authDomain: "soundcheck-1f16b.firebaseapp.com",
  projectId: "soundcheck-1f16b",
  storageBucket: "soundcheck-1f16b.firebasestorage.app",
  messagingSenderId: "720440182108",
  appId: "1:720440182108:web:48fd85d99bd4cc7da32d99"
};
/* ============================================================ */

const INSTR = [
  {id:'keys',   label:'Keys',   short:'K', color:'#8B7CF6'},
  {id:'drums',  label:'Drums',  short:'D', color:'#F2545B'},
  {id:'guitar', label:'Guitar', short:'G', color:'#F4A93C'},
  {id:'bass',   label:'Bass',   short:'B', color:'#2DD4BF'},
  {id:'vocals', label:'Vocals', short:'V', color:'#EC6FA9'},
];
const GUEST_COLOR='#C9A6FF';
const STATUS=['todo','learning','practicing','ready'];
const VALID=st=>STATUS.includes(st);
const score = s => s==='ready'?1 : s==='practicing'?0.66 : s==='learning'?0.33 : 0;
const PILL_BG={todo:'var(--muted)',learning:'var(--learn)',practicing:'var(--warn)'};
const PILL_LABEL={todo:'To do',learning:'Learning',practicing:'Practicing',ready:'Ready'};
const MAX_GUESTS=2;
const FILE_CAP = 25*1024*1024;
const uid = () => Math.random().toString(36).slice(2,9);

/* ---------- instrument icons ---------- */
const ICON = {
  keys:(<g><rect x="2.5" y="7" width="19" height="10" rx="1.4"/><path d="M6.5 7v5 M10 7v5 M14 7v5 M17.5 7v5"/></g>),
  drums:(<g><path d="M4.5 2.5 L11 6 M19.5 2.5 L13 6"/><ellipse cx="12" cy="9" rx="6.5" ry="2.2"/><path d="M5.5 9v4.6c0 1.2 2.9 2.2 6.5 2.2s6.5-1 6.5-2.2V9"/></g>),
  guitar:(<g><path d="M12 21 V12.4"/><path d="M9.4 12.4 C7.7 11.9 7.1 9.7 7.9 7.6 C8.8 5.2 11 3.9 13.6 4.1 C16.1 4.3 17.2 6 16.7 8.1 C16.2 10.4 14.9 12 12.8 12.4 Z"/><g fill="currentColor" stroke="none"><circle cx="7.7" cy="6.7" r=".8"/><circle cx="7.2" cy="8.7" r=".8"/><circle cx="7.5" cy="10.5" r=".8"/><circle cx="14.7" cy="5.5" r=".8"/><circle cx="15.7" cy="7.3" r=".8"/><circle cx="15.6" cy="9.3" r=".8"/></g></g>),
  bass:(<g><path d="M12 21 V12.4"/><path d="M9.4 12.4 C7.7 11.9 7.1 9.7 7.9 7.6 C8.8 5.2 11 3.9 13.6 4.1 C16.1 4.3 17.2 6 16.7 8.1 C16.2 10.4 14.9 12 12.8 12.4 Z"/><g fill="currentColor" stroke="none"><circle cx="7.5" cy="7.1" r="1"/><circle cx="7.2" cy="9.7" r="1"/><circle cx="15.1" cy="6.1" r="1"/><circle cx="15.5" cy="8.7" r="1"/></g></g>),
  vocals:(<g><rect x="9" y="2.5" width="6" height="11" rx="3"/><path d="M5.8 11 A6.2 6.2 0 0 0 18.2 11"/><path d="M12 17.2 V21 M8.5 21 H15.5"/></g>),
};
function InstrIcon({id,size=15}){
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round">{ICON[id]}</svg>;
}
function InstrBadge({id,size=28}){
  const it=INSTR.find(x=>x.id===id); const c=it?it.color:'#948FA6';
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" style={{flexShrink:0,display:'block'}}>
      <circle cx="12" cy="12" r="11.3" fill={c}/>
      <circle cx="12" cy="12" r="9.4" fill="none" stroke="#fff" strokeWidth="0.8" opacity="0.85"/>
      <g transform="translate(3.6 3.6) scale(0.70)" fill="none" stroke="#fff" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" style={{color:'#fff'}}>{ICON[id]}</g>
    </svg>
  );
}
const DISC=(<g><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="2" fill="currentColor" stroke="none"/></g>);
function CoverThumb({src,size=46,radius=10}){
  if(src) return <img src={src} alt="" className="cover-thumb" style={{width:size,height:size,borderRadius:radius}}/>;
  return <div className="cover-thumb ph" style={{width:size,height:size,borderRadius:radius}}>
    <svg width={Math.round(size*0.46)} height={Math.round(size*0.46)} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">{DISC}</svg>
  </div>;
}

/* ---------- Firebase layer ---------- */
function configReady(){ return firebaseConfig.apiKey && firebaseConfig.apiKey.indexOf('PASTE')!==0; }
let auth=null, db=null, storage=null, boardRef=null, fbOk=false;
function initFirebase(){
  if(fbOk) return true;
  try{
    firebase.initializeApp(firebaseConfig);
    auth=firebase.auth(); db=firebase.firestore(); storage=firebase.storage();
    boardRef=db.collection('boards').doc('main');
    fbOk=true;
  }catch(e){ fbOk=false; }
  return fbOk;
}
function actionSettings(){ return { url: location.href.split('#')[0].split('?')[0], handleCodeInApp:true }; }
function sendLink(email){
  return auth.sendSignInLinkToEmail(email, actionSettings()).then(()=>{ try{ localStorage.setItem('sc_email', email); }catch(_){} });
}
async function completeLinkIfPresent(){
  try{
    if(!auth.isSignInWithEmailLink(location.href)) return;
    let email=null; try{ email=localStorage.getItem('sc_email'); }catch(_){}
    if(!email) email=window.prompt('Confirm your email to finish signing in');
    if(!email) return;
    await auth.signInWithEmailLink(email, location.href);
    try{ localStorage.removeItem('sc_email'); }catch(_){}
    history.replaceState(null,'',location.pathname);
  }catch(e){ /* surfaced by caller via state if needed */ throw e; }
}
let latestStamp=null, saveT=null, pendingDoc=null;
function saveState(s){
  pendingDoc=s;
  clearTimeout(saveT);
  saveT=setTimeout(()=>{ if(pendingDoc && boardRef){ try{ boardRef.set(JSON.parse(JSON.stringify(pendingDoc))); }catch(e){} } }, 400);
}
function subscribeBoard(onData, onDenied){
  return boardRef.onSnapshot((snap)=>{
    if(snap.metadata.hasPendingWrites) return;     // ignore our own optimistic writes
    onData(snap.exists ? snap.data() : null);
  }, (err)=>{ if(err && (err.code==='permission-denied'||err.code==='unauthenticated')) onDenied(err); else onDenied(err); });
}
async function uploadCover(songId, dataUrl){
  const blob = await (await fetch(dataUrl)).blob();
  const ref = storage.ref().child('covers/'+songId+'.jpg');
  await ref.put(blob, {contentType:'image/jpeg'});

}
async function uploadFileToStorage(id, file){
  const path = 'files/'+id+'-'+file.name.replace(/[^\w.\-]+/g,'_');
  const ref = storage.ref().child(path);
  await ref.put(file);
  const url = await ref.getDownloadURL();

}
function deleteStoragePath(path){ try{ if(storage && path) storage.ref().child(path).delete().catch(()=>{}); }catch(_){} }

/* ---------- state helpers ---------- */
function defaultState(){
  const members={}; INSTR.forEach(i=>members[i.id]={name:i.label});
  return {band:'', concert:{name:'',date:'',venue:''}, members, songs:[], rehearsals:[], _rev:0, _updatedAt:null};
}
function freshParts(){ const p={}; INSTR.forEach(i=>p[i.id]='todo'); return p; }
function deriveFromStatus(st){ return st==='ready'?'ready' : (st==='practicing')?'practicing' : (st==='rehearsing'||st==='learning')?'learning' : 'todo'; }
function migrate(s){
  if(typeof s._rev!=='number') s._rev=0;
  if(s.band===undefined) s.band='';
  if(!s.concert) s.concert={name:'',date:'',venue:''};
  if(!s.members){ s.members={}; INSTR.forEach(i=>s.members[i.id]={name:i.label}); }
  if(!Array.isArray(s.songs)) s.songs=[];
  s.songs.forEach(song=>{
    if(!song.parts || typeof song.parts!=='object') song.parts={};
    INSTR.forEach(i=>{ if(!VALID(song.parts[i.id])) song.parts[i.id]=deriveFromStatus(song.status); });
    delete song.status;
    if(song.cover===undefined) song.cover='';
    if(!Array.isArray(song.guests)) song.guests=[];
    song.guests = song.guests.slice(0,MAX_GUESTS).map(g=>({ id:g.id||uid(), name:g.name||'', status:VALID(g.status)?g.status:'todo' }));
    if(!Array.isArray(song.files)) song.files=[];
  });
  if(!Array.isArray(s.rehearsals)) s.rehearsals=[];
  s.rehearsals.forEach(r=>{
    if(!Array.isArray(r.focusLearn)) r.focusLearn=[];
    if(!Array.isArray(r.focusPractice)) r.focusPractice = Array.isArray(r.focus)? r.focus.slice() : [];
    delete r.focus;
  });
  return s;
}
function toggleFocus(learn,practice,group,id){
  const inL=learn.includes(id), inP=practice.includes(id);
  let L=learn.filter(x=>x!==id), P=practice.filter(x=>x!==id);
  if(group==='learn' && !inL) L=[...L,id];
  if(group==='practice' && !inP) P=[...P,id];
  return {learn:L,practice:P};
}
function fmtDate(iso){ if(!iso) return ''; const d=new Date(iso); return d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'}); }
function fmtTime(iso){ if(!iso) return ''; const d=new Date(iso); return d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'}); }
function daysUntil(iso){ if(!iso) return null; const ms=new Date(iso).setHours(23,59,59)-Date.now(); return Math.ceil(ms/86400000); }
function meterColor(p){ return p>=0.8?'var(--ok)' : p>=0.45?'var(--warn)' : p>0?'var(--drums)':'var(--muted-2)'; }
function timeAgo(iso){ if(!iso) return ''; const s=Math.floor((Date.now()-new Date(iso))/1000);
  if(s<10) return 'just now'; if(s<60) return s+'s ago'; const m=Math.floor(s/60);
  if(m<60) return m+'m ago'; const h=Math.floor(m/60); if(h<24) return h+'h ago'; return Math.floor(h/24)+'d ago'; }
function addDaysLocal(localStr, days){
  const d=new Date(localStr); d.setDate(d.getDate()+days);
  const p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
}
function performers(song){ return [ ...INSTR.map(i=>({status:song.parts[i.id]})), ...song.guests.map(g=>({status:g.status})) ]; }
const songReadiness = song => { const p=performers(song); return p.length? p.reduce((a,x)=>a+score(x.status),0)/p.length : 0; };
function allGuests(songs){ const seen=[]; songs.forEach(s=>s.guests.forEach(g=>{ const n=(g.name||'').trim(); if(n && !seen.includes(n)) seen.push(n); })); return seen; }
const KIND_COLOR={audio:'#EC6FA9',pdf:'#F2545B',slides:'#F4A93C',doc:'#5B9DF9',image:'#2DD4BF',sheet:'#3DD68C',file:'#948FA6',link:'#C9A6FF'};
function fileKind(name){
  const e=((name||'').split('.').pop()||'').toLowerCase();
  if(['mp3','wav','m4a','aac','ogg','flac','aif','aiff'].includes(e)) return 'audio';
  if(e==='pdf') return 'pdf';
  if(['ppt','pptx','key'].includes(e)) return 'slides';
  if(['doc','docx','txt','rtf','md','pages'].includes(e)) return 'doc';
  if(['png','jpg','jpeg','gif','webp','heic','svg'].includes(e)) return 'image';
  if(['xls','xlsx','csv','numbers'].includes(e)) return 'sheet';
  return 'file';
}
function badgeText(f){ const parts=(f.name||'').split('.'); const ext=parts.length>1?parts.pop().toUpperCase():''; if(ext && ext.length<=4) return ext; return f.kind==='link'?'LINK':'FILE'; }
function fmtSize(b){ if(!b) return ''; if(b<1024) return b+' B'; if(b<1048576) return Math.round(b/1024)+' KB'; return (b/1048576).toFixed(1)+' MB'; }
function validEmail(e){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test((e||'').trim()); }

/* ============================== MAIN APP ============================== */
function App(){
  const [phase,setPhase]=useState('loading');   // loading | config | signin | sent | denied | ready
  const [user,setUser]=useState(null);
  const [state,setState]=useState(null);
  const [tab,setTab]=useState('stage');
  const [authMsg,setAuthMsg]=useState('');
  const [sending,setSending]=useState(false);
  const [sentTo,setSentTo]=useState('');
  const inited=useRef(false);

  useEffect(()=>{
    if(!configReady()){ setPhase('config'); return; }
    if(!initFirebase()){ setPhase('config'); return; }
    let unsubBoard=null;
    completeLinkIfPresent().catch(e=>setAuthMsg(prettyErr(e)));
    const unsubAuth=auth.onAuthStateChanged((u)=>{
      if(unsubBoard){ unsubBoard(); unsubBoard=null; }
      inited.current=false; latestStamp=null;
      setUser(u||null);
      if(!u){ setPhase(p=> p==='sent'?'sent':'signin'); setState(null); return; }
      setPhase('loading');
      unsubBoard=subscribeBoard(
        (data)=>{
          if(!data){ if(!inited.current){ inited.current=true; setState(migrate(defaultState())); } setPhase('ready'); return; }
          const stamp=data._updatedAt||null;
          if(!inited.current){ inited.current=true; latestStamp=stamp; setState(migrate(data)); setPhase('ready'); return; }
          if(stamp && (!latestStamp || stamp>latestStamp)){ latestStamp=stamp; setState(migrate(data)); }
          setPhase('ready');
        },
        ()=>{ setPhase('denied'); setState(null); }
      );
    });
    return ()=>{ unsubAuth&&unsubAuth(); unsubBoard&&unsubBoard(); };
  },[]);

  const update=(fn)=> setState(prev=>{
    const next=fn(structuredClone(prev));
    next._updatedAt=new Date().toISOString();
    next._rev=(prev&&prev._rev?prev._rev:0)+1;
    latestStamp=next._updatedAt;
    saveState(next);
    return next;
  });
  const doSend=(email)=>{ setSending(true); setAuthMsg(''); sendLink(email).then(()=>{ setSentTo(email); setPhase('sent'); }).catch(e=>setAuthMsg(prettyErr(e))).finally(()=>setSending(false)); };
  const signOut=()=>{ inited.current=false; latestStamp=null; try{ auth.signOut(); }catch(_){} setPhase('signin'); setUser(null); setState(null); };

  if(phase==='config') return <AuthShell><ConfigScreen/></AuthShell>;
  if(phase==='signin') return <AuthShell><LoginScreen onSend={doSend} msg={authMsg} busy={sending}/></AuthShell>;
  if(phase==='sent')   return <AuthShell><SentScreen email={sentTo||(user&&user.email)} onBack={signOut}/></AuthShell>;
  if(phase==='denied') return <AuthShell><DeniedScreen email={user&&user.email} onSignOut={signOut}/></AuthShell>;
  if(phase==='loading'|| !state) return <AuthShell><Loading label={user?'Loading board…':'Starting…'}/></AuthShell>;

  return (
    <React.Fragment>
      <Header state={state} />
      {tab==='stage'    && <Stage state={state} go={setTab} />}
      {tab==='setlist'  && <Setlist state={state} update={update} />}
      {tab==='rehearse' && <Rehearsals state={state} update={update} />}
      {tab==='setup'    && <Setup state={state} update={update} user={user} onSignOut={signOut} />}
      <TabBar tab={tab} setTab={setTab} />
    </React.Fragment>
  );
}
function prettyErr(e){
  if(!e) return '';
  const c=e.code||'';
  if(c.indexOf('unauthorized-domain')>=0 || (e.message||'').indexOf('domain')>=0) return 'This site\u2019s domain isn\u2019t authorized in Firebase yet. Add it under Authentication → Settings → Authorized domains.';
  if(c.indexOf('invalid-email')>=0) return 'That email doesn\u2019t look right.';
  if(c.indexOf('quota')>=0) return 'Too many requests right now — try again shortly.';
  return e.message || 'Something went wrong. Try again.';
}

function SongRow({s,members,open,toggle,update}){
  const r=songReadiness(s);
  const [linkMode,setLinkMode]=useState(false);

  const [linkName,setLinkName]=useState('');
  const [fileMsg,setFileMsg]=useState('');
  const [cropSrc,setCropSrc]=useState(null);
  const [busy,setBusy]=useState('');   // 'cover' | 'file' | ''
  const setField=(k,v)=>update(st=>{const so=st.songs.find(x=>x.id===s.id);so[k]=v;return st;});
  const setRole=(iid,v)=>update(st=>{const so=st.songs.find(x=>x.id===s.id);so.parts[iid]=v;return st;});
  const addGuest=()=>update(st=>{const so=st.songs.find(x=>x.id===s.id);if(so.guests.length<MAX_GUESTS)so.guests.push({id:uid(),name:'',status:'todo'});return st;});
  const setGuestName=(gid,v)=>update(st=>{const so=st.songs.find(x=>x.id===s.id);const g=so.guests.find(x=>x.id===gid);if(g)g.name=v;return st;});
  const setGuestStatus=(gid,v)=>update(st=>{const so=st.songs.find(x=>x.id===s.id);const g=so.guests.find(x=>x.id===gid);if(g)g.status=v;return st;});
  const delGuest=(gid)=>update(st=>{const so=st.songs.find(x=>x.id===s.id);so.guests=so.guests.filter(x=>x.id!==gid);return st;});
  const del=()=>{ deleteStoragePath('covers/'+s.id+'.jpg'); (s.files||[]).forEach(f=>{ if(f.kind==='upload'&&f.path) deleteStoragePath(f.path); }); update(st=>{st.songs=st.songs.filter(x=>x.id!==s.id);return st;}); };

  const onCoverPick=(e)=>{ setFileMsg(''); const file=e.target.files&&e.target.files[0]; e.target.value=''; if(!file) return;
    const rd=new FileReader(); rd.onload=()=>setCropSrc(rd.result); rd.onerror=()=>setFileMsg('Couldn’t read that image.'); rd.readAsDataURL(file); };
  const onCropDone=async(data)=>{ setCropSrc(null); if(!data){ setFileMsg('Couldn’t process that image.'); return; }
    setBusy('cover'); try{ const url=await uploadCover(s.id,data); setField('cover',url); }catch(err){ setFileMsg('Cover upload failed — '+prettyErr(err)); } setBusy(''); };
  const clearCover=()=>{ deleteStoragePath('covers/'+s.id+'.jpg'); setField('cover',''); };

  const onUpload=(e)=>{ setFileMsg(''); const file=e.target.files&&e.target.files[0]; e.target.value=''; if(!file) return;
    if(file.size>FILE_CAP){ setFileMsg('That file is over 25 MB — add it as a link instead.'); return; }
    setBusy('file');
    const id=uid();
    uploadFileToStorage(id,file).then(({url,path})=>{
      update(st=>{const so=st.songs.find(x=>x.id===s.id);so.files.push({id,name:file.name,kind:'upload',url,path,size:file.size,type:fileKind(file.name)});return st;});
    }).catch(err=>setFileMsg('Upload failed — '+prettyErr(err))).finally(()=>setBusy(''));
  };
  const saveLink=()=>{ const u=linkUrl.trim(); if(!u) return;
    const name=linkName.trim() || u.replace(/^https?:\/\//,'').replace(/\/$/,'').slice(0,42);
    update(st=>{const so=st.songs.find(x=>x.id===s.id);so.files.push({id:uid(),name,kind:'link',url:u,type:fileKind(name)});return st;});
    setLinkUrl('');setLinkName('');setLinkMode(false);
  };
  const openFile=(f)=>{ if(f.url) window.open(f.url,'_blank','noopener'); };
  const removeFile=(f)=>{ if(f.kind==='upload'&&f.path) deleteStoragePath(f.path); update(st=>{const so=st.songs.find(x=>x.id===s.id);so.files=so.files.filter(x=>x.id!==f.id);return st;}); };

  const fileCount=s.files?s.files.length:0;
  const meta=[s.artist, s.songKey&&('Key '+s.songKey), s.tempo&&(s.tempo+' bpm'), s.duration&&(s.duration+'m'), fileCount&&(fileCount+(fileCount>1?' files':' file'))].filter(Boolean);

  return (
    <div className="song">
      <button className="song-head" onClick={toggle}>
        <CoverThumb src={s.cover} size={46} radius={10}/>
        <div style={{minWidth:0,flex:1}}>
          <div className="song-title" dir="auto">{s.title}</div>
          <div className="song-meta" dir="auto">{meta.join(' · ')||'—'}</div>
        </div>
        <Cells song={s}/>
      </button>
      <div className="song-prog"><div className="pf" style={{width:(r*100)+'%',background:meterColor(r)}}/></div>
      {open &&
        <div className="song-body">
          <div className="cover-edit">
            <CoverThumb src={s.cover} size={88} radius={12}/>
            <div className="cover-btns">
              <label className="btn ghost sm" style={{cursor:'pointer',opacity:busy==='cover'?0.5:1}}><input type="file" accept="image/*" hidden disabled={busy==='cover'} onChange={onCoverPick}/>{busy==='cover'?'Uploading…':(s.cover?'Replace cover':'Add cover art')}</label>
              {s.cover && busy!=='cover' && <button className="btn danger sm" onClick={clearCover}>Remove cover</button>}
            </div>
          </div>
          {INSTR.map(i=>(
            <div className="editrow" key={i.id}>
              <InstrBadge id={i.id} size={26}/>
              <StatusPills value={s.parts[i.id]} color={i.color} onPick={v=>setRole(i.id,v)}/>
            </div>
          ))}
          <label className="fl" style={{marginTop:15}}>Guests ({s.guests.length}/{MAX_GUESTS})</label>
          {s.guests.map(g=>(
            <div className="guest-edit" key={g.id}>
              <div className="guest-top">
                <input className="inp" dir="auto" value={g.name} onChange={e=>setGuestName(g.id,e.target.value)} placeholder="Sax — Yossi"/>
                <button className="xbtn" onClick={()=>delGuest(g.id)} aria-label="Remove guest">×</button>
              </div>
              <StatusPills value={g.status} color={GUEST_COLOR} onPick={v=>setGuestStatus(g.id,v)}/>
            </div>
          ))}
          {s.guests.length<MAX_GUESTS && <button className="addguest" onClick={addGuest}>+ Add guest player</button>}
          <label className="fl" style={{marginTop:16}}>Files</label>
          {(s.files||[]).map(f=>(
            <div className="fileitem" key={f.id}>
              <span className="ftype" style={{background:KIND_COLOR[f.type]||'var(--muted)'}}>{badgeText(f)}</span>
              <div className="fname" dir="auto">{f.name}{f.size?<span className="fsize"> · {fmtSize(f.size)}</span>:null}</div>
              <button className="fbtn" onClick={()=>openFile(f)}>Open</button>
              <button className="xmini" onClick={()=>removeFile(f)} aria-label="Remove file">×</button>
            </div>
          ))}
          {(s.files||[]).length===0 && <div className="fileempty">No files yet — add a chart, slides, or a reference track.</div>}
          {linkMode
            ? <div className="linkadd">
                <input className="inp" value={linkUrl} onChange={e=>setLinkUrl(e.target.value)} placeholder="Paste a share link (https://…)" autoFocus/>
                <input className="inp" dir="auto" style={{marginTop:7}} value={linkName} onChange={e=>setLinkName(e.target.value)} placeholder="Label (optional) — e.g. Reference mix"/>
                <div className="btnrow" style={{marginTop:9}}>
                  <button className="btn ghost" onClick={()=>{setLinkMode(false);setLinkUrl('');setLinkName('');}}>Cancel</button>
                  <button className="btn" onClick={saveLink} disabled={!linkUrl.trim()}>Add link</button>
                </div>
              </div>
            : <div className="filebtns">
                <label className="addfile" style={{opacity:busy==='file'?0.5:1}}><input type="file" hidden disabled={busy==='file'} onChange={onUpload}/>{busy==='file'?'Uploading…':'Upload file'}</label>
                <button className="addfile" onClick={()=>setLinkMode(true)}>Add link</button>
              </div>}
          {fileMsg && <div className="filemsg">{fileMsg}</div>}
          <div className="fieldgrid">
            <div className="full"><label className="fl">Notes / arrangement</label>
              <textarea className="inp" dir="auto" value={s.notes||''} onChange={e=>setField('notes',e.target.value)} placeholder="Intro repeats x2, key change before last chorus, who solos…"/></div>
          </div>
          <div className="btnrow"><button className="btn danger" onClick={del}>Remove song</button></div>
        </div>}
      {cropSrc && <CropModal src={cropSrc} onCancel={()=>setCropSrc(null)} onDone={onCropDone}/>}
    </div>
  );
}

function Rehearsals({state,update}){
  const [adding,setAdding]=useState(false);
  const list=[...state.rehearsals].sort((a,b)=>new Date(a.date||0)-new Date(b.date||0));
  const upcoming=list.filter(r=>!r.done);
  const past=list.filter(r=>r.done);
  const add=(items)=>{ update(s=>{ (Array.isArray(items)?items:[items]).forEach(data=>s.rehearsals.push({id:uid(),done:false,attendance:{},focusLearn:[],focusPractice:[],...data})); return s;}); setAdding(false); };
  const patch=(id,fn)=> update(s=>{ const r=s.rehearsals.find(x=>x.id===id); fn(r); return s;});
  const del=(id)=> update(s=>{ s.rehearsals=s.rehearsals.filter(x=>x.id!==id); return s;});
  return (
    <div className="page">
      <div className="section-h">Upcoming · {upcoming.length}</div>
      {adding && <RehForm songs={state.songs} members={state.members} onSave={add} onCancel={()=>setAdding(false)}/>}
      {upcoming.length===0 && !adding &&
        <div className="empty"><div className="big">No rehearsals booked</div><div className="sm">Schedule a session and pick which songs to focus on.</div></div>}
      {upcoming.map(r=><RehCard key={r.id} r={r} state={state} patch={patch} del={del}/>)}
      {!adding && <div className="add-bar"><button className="btn ghost" onClick={()=>{setAdding(true);window.scrollTo({top:0,behavior:'smooth'});}}>+ Schedule rehearsal</button></div>}
      {past.length>0 && <React.Fragment>
        <div className="section-h">Done · {past.length}</div>
        {past.map(r=><RehCard key={r.id} r={r} state={state} patch={patch} del={del}/>)}
      </React.Fragment>}
    </div>
  );
}

function RehForm({songs,members,onSave,onCancel}){
  const guestList=allGuests(songs);
  const [f,setF]=useState({date:'',location:'',notes:'',learn:[],practice:[],repeat:'none',occurrences:4,attendance:Object.fromEntries(INSTR.map(i=>[i.id,true]))});

  const toggleAtt=id=>setF(p=>({...p,attendance:{...p.attendance,[id]:!p.attendance[id]}}));

  const dates=buildDates();
  const multi = f.repeat!=='none' && !!f.date;
  const save=()=>{ const items=dates.map(dt=>({date:dt,location:f.location,notes:f.notes,focusLearn:[...f.learn],focusPractice:[...f.practice],attendance:{...f.attendance}})); onSave(items); };

    <div className="card" style={{marginTop:14,borderColor:'var(--line-2)'}}>

      </div>
      {f.repeat!=='none' &&
        <div className="stepper">
          <span className="lbl">How many sessions</span>
          <button className="xbtn" onClick={()=>setF({...f,occurrences:Math.max(2,occ-1)})} aria-label="Fewer">−</button>
          <span className="cnt">{occ}</span>
          <button className="xbtn" onClick={()=>setF({...f,occurrences:Math.min(12,occ+1)})} aria-label="More">+</button>

      {f.repeat!=='none' && !f.date && <div className="filterhint">Pick a date & time above to schedule the series.</div>}
      {multi && <div className="filterhint">Creates {dates.length} rehearsals · {fmtDate(dates[0])} → {fmtDate(dates[dates.length-1])}</div>}
      <FocusPicker songs={songs} learn={f.learn} practice={f.practice} onToggle={onToggleFocus}/>
      <label className="fl" style={{marginTop:14}}>Who's coming</label>
      <div className="chip-pick">
        {INSTR.map(i=><button key={i.id} className={'chip'+(f.attendance[i.id]?' on':'')} style={f.attendance[i.id]?{background:i.color,borderColor:i.color,display:'inline-flex',alignItems:'center',gap:6}:{display:'inline-flex',alignItems:'center',gap:6}} onClick={()=>toggleAtt(i.id)}><InstrIcon id={i.id} size={14}/>{members[i.id].name}</button>)}
        {guestList.map(n=><button key={n} className={'chip'+(f.attendance['g:'+n]?' on':'')} style={f.attendance['g:'+n]?{background:GUEST_COLOR,borderColor:GUEST_COLOR,color:'#15141B'}:{}} onClick={()=>toggleAtt('g:'+n)} dir="auto">{n}</button>)}
      </div>
      <label className="fl" style={{marginTop:14}}>Notes</label>
      <textarea className="inp" dir="auto" value={f.notes} onChange={e=>setF({...f,notes:e.target.value})} placeholder="Bring the new charts, run the encore…"/>
      <div className="btnrow">
        <button className="btn ghost" onClick={onCancel}>Cancel</button>
        <button className="btn" onClick={save}>{multi?`Save ${dates.length} rehearsals`:'Save rehearsal'}</button>
      </div>
    </div>
  );

/* ---------- crop modal ---------- */
let cropDrag=null;
function CropModal({src,onCancel,onDone}){
  const V=Math.min(280,(window.innerWidth||360)-64), OUT=220;
  const [nat,setNat]=useState(null);
  const [zoom,setZoom]=useState(1);
  const [off,setOff]=useState({x:0,y:0});
  useEffect(()=>{ const img=new Image(); img.onload=()=>setNat({w:img.naturalWidth,h:img.naturalHeight}); img.src=src; },[src]);
  const base = nat ? V/Math.min(nat.w,nat.h) : 1;
  const s = base*zoom;
  const dispW = nat? nat.w*s : V;
  const dispH = nat? nat.h*s : V;
  const clamp=(o,zz)=>{ if(!nat) return o; const ss=base*zz, w=nat.w*ss, h=nat.h*ss; return { x:Math.min(0,Math.max(V-w,o.x)), y:Math.min(0,Math.max(V-h,o.y)) }; };
  useEffect(()=>{ if(nat){ const w=nat.w*base, h=nat.h*base; setZoom(1); setOff({x:(V-w)/2,y:(V-h)/2}); } },[nat]);
  const onZoom=(z)=>{ if(!nat){ setZoom(z); return; } const sOld=base*zoom, sNew=base*z; const cx=(-off.x+V/2)/sOld, cy=(-off.y+V/2)/sOld; setZoom(z); setOff(clamp({x:V/2-cx*sNew,y:V/2-cy*sNew},z)); };
  const pt=(e)=>{ const t=e.touches?e.touches[0]:e; return {x:t.clientX,y:t.clientY}; };
  const down=(e)=>{ const p=pt(e); cropDrag={px:p.x,py:p.y,ox:off.x,oy:off.y}; try{ e.currentTarget.setPointerCapture && e.currentTarget.setPointerCapture(e.pointerId); }catch(_){} };
  const moveH=(e)=>{ if(!cropDrag)return; const p=pt(e); setOff(clamp({x:cropDrag.ox+(p.x-cropDrag.px),y:cropDrag.oy+(p.y-cropDrag.py)},zoom)); };
  const up=()=>{ cropDrag=null; };
  const done=()=>{ const img=new Image(); img.onload=()=>{ try{ const c=document.createElement('canvas'); c.width=OUT; c.height=OUT; const ctx=c.getContext('2d'); ctx.drawImage(img,(-off.x)/s,(-off.y)/s,V/s,V/s,0,0,OUT,OUT); onDone(c.toDataURL('image/jpeg',0.85)); }catch(err){ onDone(null); } }; img.onerror=()=>onDone(null); img.src=src; };
  return (
    <div className="cropwrap" onPointerUp={up}>
      <div className="cropcard">
        <div className="croptitle">Position the cover</div>
        <div className="cropview" style={{width:V,height:V}} onPointerDown={down} onPointerMove={moveH} onPointerUp={up}>
          <img src={src} draggable="false" style={{position:'absolute',left:off.x,top:off.y,width:dispW,height:dispH}}/>
          <div className="cropframe"></div>
        </div>
        <input className="cropzoom" type="range" min="1" max="4" step="0.01" value={zoom} onChange={e=>onZoom(+e.target.value)}/>
        <div className="crophint">Drag to reposition · slide to zoom</div>
        <div className="btnrow">
          <button className="btn ghost" onClick={onCancel}>Cancel</button>
          <button className="btn" onClick={done} disabled={!nat}>Use cover</button>
        </div>
      </div>
    </div>
  );
}

const ICONS={
  stage:'M3 13h2l1.5-6 2.5 12 2-6h2l1.5 4 1.5-4h3',
  setlist:'M4 6h12M4 12h12M4 18h8 M19 5v9 M19 14a2 2 0 1 0 0 4 2 2 0 0 0 0-4z',
  rehearse:'M5 4h14v16l-7-4-7 4z',
  setup:'M10 3h4l.5 3 2 1 3-1.5 2 3.5-2.5 2v2l2.5 2-2 3.5-3-1.5-2 1L14 21h-4l-.5-3-2-1-3 1.5-2-3.5 2.5-2v-2L0 9'
};
function TabBar({tab,setTab}){
  const items=[['stage','Stage'],['setlist','Setlist'],['rehearse','Rehearsals'],['setup','Setup']];
  return (
    <nav className="tabbar">
      {items.map(([id,label])=>(
        <button key={id} className={'tab'+(tab===id?' on':'')} onClick={()=>setTab(id)}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d={ICONS[id]}/></svg>
          {label}<span className="ind"></span>
        </button>
      ))}
    </nav>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
