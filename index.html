<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Soundcheck — band prep board</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&family=Heebo:wght@500;700&display=swap');
  :root{
    --bg:#15141B; --surface:#1F1D29; --surface-2:#282633; --surface-3:#322F40;
    --line:rgba(255,255,255,.09); --line-2:rgba(255,255,255,.14);
    --text:#ECEAF2; --muted:#C2BDD2; --muted-2:#9892AC;
    --keys:#8B7CF6; --drums:#F2545B; --guitar:#F4A93C; --bass:#2DD4BF; --vocals:#EC6FA9;
    --guest:#C9A6FF; --ok:#3DD68C; --warn:#E8A33D; --learn:#5B9DF9;
    --display:'Space Grotesk',system-ui,sans-serif; --mono:'Space Mono',ui-monospace,monospace;
    --body:'Inter',system-ui,sans-serif; --heb:'Heebo','Space Grotesk',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--body);-webkit-font-smoothing:antialiased;line-height:1.45}
  #root{max-width:540px;margin:0 auto;min-height:100vh;position:relative}
  @media(min-width:900px){#root{max-width:1200px}}
  /* Tablet simulation on PC: ?tablet=1 (portrait 800x1280) / ?tablet=land (1280x800) */
  body.simbody{overflow:hidden;background:#000;display:flex;align-items:center;justify-content:center;height:100vh}
  .simframe{flex:none;position:relative;transform-origin:center center;border:3px solid #3a3745;border-radius:18px;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.85);background:var(--bg)}
  #root.siminner{width:100%!important;height:100%;max-width:none!important;margin:0;min-height:0;overflow-y:auto;overflow-x:hidden}
  body.simport .stem-channels{grid-template-columns:1fr 1fr!important}
  .md{display:flex;gap:16px;height:calc(100vh - 200px);min-height:400px}
  .md-list{width:380px;flex-shrink:0;overflow-y:auto;padding-right:4px}
  .md-detail{flex:1;overflow-y:auto;min-width:0;padding:0 4px}
  .md-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted-2);font-size:15px;font-family:var(--display)}
  .song-sel{outline:2px solid var(--keys);outline-offset:-2px}
  .song-sel .song-head{background:rgba(139,124,246,.06)}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit}
  ::selection{background:var(--keys);color:#fff}
  .topbar{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,var(--bg) 72%,rgba(21,20,27,0));padding:18px 18px 12px}
  .wordmark{display:flex;align-items:center;gap:9px}
  .wordmark .dot{width:9px;height:9px;border-radius:50%;background:var(--ok);box-shadow:0 0 10px var(--ok);animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  @media (prefers-reduced-motion:reduce){.wordmark .dot{animation:none}}
  .wordmark h1{font-family:var(--display);font-weight:700;font-size:17px;letter-spacing:.16em;margin:0;color:var(--muted)}
  .wordmark .ver{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--muted-2);letter-spacing:.04em;align-self:center}
  .topline{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .bell{position:relative;width:38px;height:38px;border-radius:10px;border:1px solid var(--line-2);background:var(--surface-2);color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .bell-dot{position:absolute;top:7px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--drums);border:2px solid var(--surface-2)}
  .modalwrap{position:fixed;inset:0;background:rgba(8,7,12,.66);display:flex;align-items:flex-end;justify-content:center;z-index:50;padding:0}
  .modalcard{background:var(--surface);border:1px solid var(--line-2);border-radius:18px 18px 0 0;width:100%;max-width:560px;max-height:82vh;overflow:auto;padding:20px 18px calc(20px + env(safe-area-inset-bottom))}
  .modaltitle{font-family:var(--display);font-weight:700;font-size:16px;letter-spacing:.02em;margin-bottom:14px}
  .actrow{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:baseline;padding:10px 2px;border-bottom:1px solid var(--line)}
  .actrow:last-child{border-bottom:none}
  .actwho{font-family:var(--display);font-weight:700;font-size:13px;color:var(--text);white-space:nowrap}
  .acttext{font-size:13px;color:var(--muted);min-width:0;line-height:1.35}
  .actwhen{font-family:var(--mono);font-size:10px;color:var(--muted-2);white-space:nowrap}
  /* proposal block is intentionally compact (~80% of normal) */
  .prop{margin-top:10px;border-top:1px solid var(--line);padding-top:9px}
  .prop-h{font-family:var(--mono);font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--warn);margin-bottom:4px}
  .prop-new{font-family:var(--display);font-weight:700;font-size:11.5px;color:var(--text)}
  .prop-by{font-size:9.5px;color:var(--muted);margin-top:1px}
  .prop .att{gap:4px;margin-top:5px}
  .prop .att .a{width:26px;height:26px}
  .prop .att .a svg{width:13px;height:13px}
  .prop .att-badge{width:12px;height:12px;font-size:7px;border-width:1px}
  .prop-act{display:flex;gap:6px;margin-top:8px}
  .prop-act .btn{flex:1;padding:6px 10px;font-size:11px}
  .propform{margin-top:11px;display:flex;flex-direction:column;gap:9px}
  .propform .row2{display:flex;gap:9px}
  .propform .row2 .inp{flex:1}
  .topmeta{display:flex;justify-content:space-between;align-items:center;margin-top:11px;gap:12px}
  .topleft{display:flex;align-items:center;gap:12px;min-width:0}
  .band{font-family:var(--heb);font-weight:700;font-size:22px;line-height:1.1}
  .concert-sub{font-size:12px;color:var(--muted);margin-top:3px}
  .countchip{font-family:var(--mono);text-align:right;flex-shrink:0}
  .countchip .num{font-size:22px;font-weight:700;line-height:1}
  .countchip .lbl{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:3px}
  .bandart{cursor:pointer;position:relative;flex-shrink:0;line-height:0}
  .bandart .edithint{position:absolute;right:-3px;bottom:-3px;width:18px;height:18px;border-radius:50%;background:var(--keys);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;border:2px solid var(--bg)}
  .page{padding:6px 18px 110px;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .section-h{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-2);margin:22px 2px 10px;display:flex;align-items:center;gap:8px}
  .section-h::after{content:"";flex:1;height:1px;background:var(--line)}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px}
  .card+.card{margin-top:10px}
  .master{background:linear-gradient(160deg,var(--surface-2),var(--surface));border:1px solid var(--line);border-radius:16px;padding:16px}
  .master .row{display:flex;justify-content:space-between;align-items:baseline}
  .master .pct{font-family:var(--mono);font-size:34px;font-weight:700;line-height:1}
  .master .cap{font-size:12px;color:var(--muted)}
  .ticks{display:flex;gap:3px;margin-top:14px;height:30px;align-items:flex-end}
  .tick{flex:1;border-radius:2px;background:var(--surface-3);transition:background .5s ease,height .5s ease}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 12px}
  .stat .v{font-family:var(--mono);font-size:19px;font-weight:700}
  .stat .k{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);margin-top:2px}
  .strip{display:flex;align-items:center;gap:11px;padding:9px 0}
  .strip+.strip{border-top:1px solid var(--line)}
  .strip .name{font-family:var(--display);font-weight:600;font-size:13px;width:64px;flex-shrink:0}
  .strip .track{flex:1;height:8px;border-radius:5px;background:var(--surface-3);overflow:hidden}
  .strip .fill{height:100%;border-radius:5px;transition:width .6s cubic-bezier(.2,.7,.2,1)}
  .strip .val{font-family:var(--mono);font-size:12px;color:var(--muted);width:38px;text-align:right;flex-shrink:0}
  .song{background:var(--surface);border:2px solid rgba(255,255,255,.18);border-radius:14px;overflow:hidden;scroll-margin-top:70px}
  .song+.song{margin-top:10px}
  .song-head{display:flex;align-items:center;gap:12px;padding:13px 14px;width:100%;text-align:left;cursor:pointer}
  .song-title{font-family:var(--display);font-weight:600;font-size:15px;line-height:1.2;direction:ltr}
  .song-meta{font-size:11.5px;color:var(--muted);margin-top:3px;direction:ltr}
  .cells{display:flex;gap:5px;margin-left:auto;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;max-width:170px}
  .cell{width:24px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:700;border:1.5px solid;transition:all .2s}
  .cell svg{display:block}
  .song-prog{height:5px;background:var(--surface-3)}
  .song-prog .pf{height:100%;transition:width .5s}
  .songnum{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--muted);min-width:22px;height:22px;text-align:center;flex-shrink:0;font-variant-numeric:tabular-nums;background:var(--surface-2);border-radius:6px;display:flex;align-items:center;justify-content:center;line-height:1}
  .songnum.enc{color:var(--guitar);background:rgba(244,169,60,.12)}
  .enc-pill{display:inline-flex;align-items:center;font-family:var(--mono);font-size:8.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--guitar);border:1px solid rgba(244,169,60,.5);border-radius:5px;padding:2px 5px;flex-shrink:0}
  .show-sel-bar{position:relative;margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .show-sel-btn{display:flex;align-items:center;gap:8px;width:100%;padding:10px 14px;background:var(--surface);border:2px solid rgba(255,255,255,.18);border-radius:12px;cursor:pointer;text-align:left;color:var(--text)}
  .show-sel-name{font-family:var(--display);font-weight:600;font-size:14px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .show-sel-date{font-family:var(--mono);font-size:11px;color:var(--muted);flex-shrink:0}
  .show-sel-arrow{font-size:10px;color:var(--muted);flex-shrink:0}
  .show-sel-empty{font-size:13px;color:var(--muted);padding:8px 0}
  .show-sel-drop{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:var(--surface);border:1px solid var(--line-2);border-radius:12px;padding:4px;z-index:25;box-shadow:0 8px 24px rgba(0,0,0,.4)}
  .show-sel-item{display:flex;align-items:center;gap:8px;width:100%;padding:10px 12px;border-radius:8px;cursor:pointer;text-align:left;font-family:var(--display);font-weight:600;font-size:13px;color:var(--text);background:none;border:none}
  .show-sel-item:hover{background:var(--surface-2)}
  .show-sel-item.on{background:var(--surface-3)}
  .setlist-ctrl{background:var(--surface);border:2px solid rgba(255,255,255,.18);border-radius:14px;padding:12px 14px;margin-bottom:10px}
  .setlist-tools{display:flex;align-items:center;gap:9px;margin:2px 0;flex-wrap:wrap}
  .reorder-btn{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:var(--surface-2);border:1px solid var(--line-2);border-radius:8px;padding:8px 12px;display:inline-flex;align-items:center;gap:6px}
  .reorder-btn.on{color:#15141B;background:var(--text);border-color:transparent;font-weight:700}
  .ro-hint{font-size:11.5px;color:var(--muted);line-height:1.4}
  .ro-row{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:9px 11px;margin-bottom:8px;transition:opacity .15s}
  .ro-row[draggable]{cursor:grab}
  .ro-row.dragging{opacity:.3}
  .ro-row.drop-above{box-shadow:0 -3px 0 0 var(--keys);border-top-color:var(--keys)}
  .ro-row.drop-below{box-shadow:0 3px 0 0 var(--keys);border-bottom-color:var(--keys)}
  .ro-grip{color:var(--muted-2);font-size:18px;flex-shrink:0;line-height:1;user-select:none}
  .ro-num{font-family:var(--mono);font-size:12.5px;font-weight:700;color:var(--muted);min-width:20px;text-align:center;font-variant-numeric:tabular-nums;flex-shrink:0}
  .ro-num.enc{color:var(--guitar)}
  .ro-title{flex:1;min-width:0;font-family:var(--display);font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;direction:ltr}
  .ro-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--line-2);background:var(--surface-2);color:var(--text);font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .ro-btn:disabled{opacity:.28}
  .ro-btn.enc{color:var(--muted-2)}
  .ro-btn.enc.on{color:var(--guitar);border-color:rgba(244,169,60,.55)}
  .ro-btn.excl{color:var(--muted)}
  .excl-h{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted-2);margin:26px 2px 11px;display:flex;align-items:center;gap:8px}
  .excl-h::after{content:"";flex:1;height:1px;background:var(--line)}
  .excl-row{display:flex;align-items:center;gap:11px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:9px 12px;margin-bottom:8px}
  .excl-row .cover-thumb{opacity:.6}
  .ex-title{flex:1;min-width:0;font-family:var(--display);font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted);direction:ltr}
  .incl-btn{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--ok);background:rgba(61,214,140,.08);border:1px solid rgba(61,214,140,.4);border-radius:8px;padding:8px 13px;flex-shrink:0}
  .songact{display:flex;gap:9px;margin-top:14px}
  .songact .btn{flex:1}
  .cover-thumb{object-fit:cover;border:1px solid var(--line);flex-shrink:0;background:var(--surface-3)}
  .cover-thumb.ph{display:flex;align-items:center;justify-content:center;color:var(--muted-2)}
  .cover-edit{display:flex;gap:13px;align-items:center;padding:2px 0 14px;border-bottom:1px solid var(--line);margin-bottom:4px}
  .cover-btns{display:flex;flex-direction:column;gap:8px;align-items:flex-start}
  .cover-btns .btn{width:auto}
  .cropwrap,.modalwrap{position:fixed;inset:0;z-index:60;background:rgba(10,9,14,.8);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .2s ease}
  .cropcard{background:var(--surface);border:1px solid var(--line-2);border-radius:18px;padding:18px;width:100%;max-width:340px}
  .croptitle{font-family:var(--display);font-weight:600;font-size:15px;text-align:center;margin-bottom:14px}
  .cropview{position:relative;margin:0 auto;overflow:hidden;border-radius:12px;background:#000;touch-action:none;cursor:grab;user-select:none;-webkit-user-select:none}
  .cropview:active{cursor:grabbing}
  .cropview img{pointer-events:none;user-select:none;-webkit-user-drag:none;max-width:none}
  .cropframe{position:absolute;inset:0;pointer-events:none;border-radius:12px;box-shadow:inset 0 0 0 2px rgba(255,255,255,.9)}
  .cropzoom{width:100%;margin:16px 0 4px;accent-color:var(--keys)}
  .crophint{font-size:11.5px;color:var(--muted);text-align:center;margin-bottom:4px}
  .btn:disabled{opacity:.45;cursor:default}
  .modalcard{background:var(--surface);border:1px solid var(--line-2);border-radius:18px;padding:16px;width:100%;max-width:360px;max-height:80vh;display:flex;flex-direction:column}
  .modaltitle{font-family:var(--display);font-weight:600;font-size:15px;margin-bottom:8px}
  .checklist{overflow-y:auto;flex:1;margin:0 -4px}
  .checkrow{display:flex;align-items:center;gap:11px;padding:11px 4px;border-top:1px solid var(--line);font-size:14px;cursor:pointer}
  .checkrow:first-child{border-top:none}
  .checkrow input{width:20px;height:20px;accent-color:var(--keys);flex-shrink:0}
  .song-body{padding:8px 14px 16px;border-top:1px solid var(--line)}
  .editrow{display:flex;align-items:center;gap:10px;padding:9px 0}
  .editrow+.editrow{border-top:1px solid var(--line)}
  .editrow .ename{font-family:var(--display);font-weight:600;font-size:13px}
  .status-pills{display:flex;gap:5px;width:100%}
  .status-pills .pill{flex:1;text-align:center}
  .pill{font-family:var(--mono);font-size:9px;letter-spacing:.03em;text-transform:uppercase;padding:7px 3px;border-radius:7px;border:1px solid var(--line-2);color:var(--muted);white-space:nowrap}
  .pill.on{color:#15141B;font-weight:700;border-color:transparent}
  .guest-edit{padding:11px 0;border-top:1px dashed rgba(201,166,255,.28)}
  .guest-top{display:flex;gap:8px;align-items:center}
  .guest-edit .status-pills{margin-top:9px}
  .xbtn{width:36px;height:40px;border-radius:9px;border:1px solid var(--line);color:var(--muted);flex-shrink:0;font-size:18px}
  .addguest{margin-top:11px;font-size:12.5px;color:var(--guest);background:rgba(201,166,255,.08);border:1px dashed rgba(201,166,255,.4);border-radius:9px;padding:10px;width:100%}
  .fileblock{position:relative}
  .fileitem{display:flex;align-items:center;gap:9px;padding:9px 0;border-top:1px solid var(--line)}
  .file-open{flex:1;min-width:0;display:flex;align-items:center;gap:9px;background:none;border:none;color:var(--text);text-align:left;cursor:pointer;padding:0;font:inherit}
  .fbtn.kebab{font-size:18px;line-height:1;padding:2px 10px;color:var(--muted);letter-spacing:0}
  .file-menu{display:flex;flex-wrap:wrap;gap:6px;padding:0 0 10px;justify-content:flex-end;align-items:center}
  .file-menu button{font-size:12px;color:var(--text);background:var(--surface-2);border:1px solid var(--line);border-radius:7px;padding:7px 13px;cursor:pointer}
  .file-menu button.danger{color:var(--drums);border-color:rgba(242,84,91,.4)}
  .plan-card{background:var(--surface-2);border:1px solid var(--line-2);border-radius:12px;padding:11px 13px;margin-bottom:10px}
  .plan-h{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
  .plan-tag{font-family:var(--mono);font-size:10px;font-weight:700;color:#15141B;padding:2px 8px;border-radius:6px}
  .plan-chips{display:inline-flex;flex-wrap:wrap;gap:5px;vertical-align:middle}
  .plan-chip{font-size:12px;padding:3px 9px;border-radius:999px;border:1px solid;background:transparent;direction:ltr;display:inline-block}
  .ftype{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.02em;color:#15141B;padding:5px 0;border-radius:6px;flex-shrink:0;width:38px;text-align:center}
  .fver{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--muted);flex-shrink:0;letter-spacing:.02em}
  .fname{flex:1;min-width:0;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fsize{color:var(--muted-2);font-size:11px}
  .fbtn{font-size:12px;color:var(--text);background:var(--surface-2);border:1px solid var(--line);border-radius:7px;padding:6px 11px;flex-shrink:0}
  .xmini{width:30px;height:32px;border-radius:7px;border:1px solid var(--line);color:var(--muted);flex-shrink:0;font-size:16px}
  .fileempty{font-size:12.5px;color:var(--muted-2);padding:9px 0;border-top:1px solid var(--line)}
  .filebtns{display:flex;gap:9px;margin-top:11px}
  .addfile{flex:1;text-align:center;font-size:13px;color:var(--keys);background:rgba(139,124,246,.08);border:1px dashed rgba(139,124,246,.4);border-radius:9px;padding:11px;cursor:pointer;display:block}
  .linkadd{margin-top:11px}
  .filemsg{font-size:11.5px;color:var(--warn);margin-top:10px;line-height:1.45}
  .fieldgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px}
  label.fl{display:block;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0 0 5px 2px}

let latestStamp=null, saveT=null, pendingDoc=null;
function saveState(s){
  const today=new Date().toISOString().slice(0,10);
  (s.shows||[]).forEach(show=>{
    const active=(show.setlist||[]).filter(e=>!e.excluded);
    if(active.length>0){
      const overall=active.reduce((a,e)=>a+entryReadiness(e),0)/active.length;
      if(!Array.isArray(show.readinessHistory)) show.readinessHistory=[];
      const last=show.readinessHistory[show.readinessHistory.length-1];
      if(!last||last.d!==today) show.readinessHistory.push({d:today,v:Math.round(overall*100)});
      else last.v=Math.round(overall*100);
      if(show.readinessHistory.length>365) show.readinessHistory=show.readinessHistory.slice(-365);
    }
  });
  pendingDoc=s;
  clearTimeout(saveT);

}

function sfuNorm(s){return (s||'').toLowerCase().replace(/[\[\]\(\)_\-–—.,:;'"`!?/\\|]+/g,' ').replace(/\s+/g,' ').trim();}
function sfuTokens(s){return sfuNorm(s).split(' ').filter(t=>t.length>1);}
function sfuLev(a,b){const m=a.length,n=b.length;if(!m)return n;if(!n)return m;let prev=Array.from({length:n+1},(_,j)=>j),cur=new Array(n+1);for(let i=1;i<=m;i++){cur[0]=i;for(let j=1;j<=n;j++){cur[j]=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+(a[i-1]===b[j-1]?0:1));}const t=prev;prev=cur;cur=t;}return prev[n];}
function sfuTokMatch(t,ft){return ft.some(x=>x===t||(x.length>=3&&t.length>=3&&(x.includes(t)||t.includes(x)))||(t.length>=4&&sfuLev(t,x)<=1)||(t.length>=7&&sfuLev(t,x)<=2));}
function sfuScore(title,artist,folderName){
  const tt=sfuTokens(title);if(!tt.length)return 0;
  // whole-title containment (handles titles run together without separators)
  const tj=sfuNorm(title).replace(/ /g,''),fj=sfuNorm(folderName).replace(/ /g,'');
  if(tj.length>=4&&fj.includes(tj))return 1;
  const ft=sfuTokens(folderName);if(!ft.length)return 0;
  let matched=0;tt.forEach(t=>{if(sfuTokMatch(t,ft))matched++;});
  let score=matched/tt.length;
  const at=sfuTokens(artist);if(at.length){const am=at.filter(t=>sfuTokMatch(t,ft)).length;if(am)score+=0.08*(am/at.length);}
  return score;
}
// Category is taken from a leading [Tag] prefix in the file name:
// [Slide] [Bass] [Vocals] [Guitar] [Keys] [Drums] (also [Other]).
// [Ignore] -> 'ignore' (skip file). No/unknown tag -> null (skip file).
function sfuCatFromName(name){
  const m=(name||'').match(/^\s*\[\s*([a-zA-Z]+)\s*\]/);
  if(!m) return null;
  const tag=m[1].toLowerCase();
  if(tag==='ignore') return 'ignore';
  return ['slide','bass','vocals','guitar','keys','drums','other'].includes(tag)?tag:null;
}
async function sfuImageToJpeg(file){
  const url=URL.createObjectURL(file);
  try{
    const img=await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=()=>rej(new Error('image decode failed'));i.src=url;});
    const c=document.createElement('canvas');c.width=img.naturalWidth||img.width;c.height=img.naturalHeight||img.height;
    c.getContext('2d').drawImage(img,0,0);
    return await new Promise(r=>c.toBlob(r,'image/jpeg',0.9));
  } finally { URL.revokeObjectURL(url); }
}
async function sfuStackCanvases(canvases){
  const w=Math.max(...canvases.map(c=>c.width));
  const heights=canvases.map(c=>Math.round(c.height*(w/c.width)));
  const h=heights.reduce((a,b)=>a+b,0);
  const out=document.createElement('canvas');out.width=w;out.height=h;
  const ctx=out.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);
  let y=0;canvases.forEach((c,i)=>{ctx.drawImage(c,0,y,w,heights[i]);y+=heights[i];});
  return await new Promise(r=>out.toBlob(r,'image/jpeg',0.85));
}
async function sfuPdfToTallJpeg(arrayBuffer){
  await sfuLoadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
  const lib=window.pdfjsLib;
  lib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const pdf=await lib.getDocument({data:arrayBuffer}).promise;
  const canvases=[];
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const vp=page.getViewport({scale:2});
    const c=document.createElement('canvas');c.width=vp.width;c.height=vp.height;
    await page.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
    canvases.push(c);
  }
  return {blob:await sfuStackCanvases(canvases),pages:pdf.numPages};
}
// Returns {blob,ext,mime,type,note} or null (unsupported / skip)
async function sfuFileToBlob(file){
  const name=file.name||'';
  const ext=(name.split('.').pop()||'').toLowerCase();
  if(ext==='jpg'||ext==='jpeg') return {blob:file,ext:'jpg',mime:'image/jpeg',type:'image',note:''};
  if(['png','webp','gif','bmp'].includes(ext)){ const b=await sfuImageToJpeg(file); return {blob:b,ext:'jpg',mime:'image/jpeg',type:'image',note:ext+'→jpg'}; }
  if(ext==='pdf'){ const r=await sfuPdfToTallJpeg(await file.arrayBuffer()); return {blob:r.blob,ext:'jpg',mime:'image/jpeg',type:'image',note:'pdf→jpg '+r.pages+'p'}; }
  if(ext==='ppt'||ext==='pptx') return null; // convert to PDF first (tools/pptx2pdf.py)
  if(['mp3','wav','m4a','ogg','webm','aac','flac','aif','aiff'].includes(ext)) return {blob:file,ext,mime:file.type||'audio/mpeg',type:'audio',note:''};
  return null;
}

function encodeMp3(audioBuffer,kbps){
  const nc=Math.min(2,audioBuffer.numberOfChannels);
  const sr=audioBuffer.sampleRate;
  const enc=new lamejs.Mp3Encoder(nc,sr,kbps||128);
  const toI16=(f)=>{const o=new Int16Array(f.length);for(let i=0;i<f.length;i++){const v=Math.max(-1,Math.min(1,f[i]));o[i]=v<0?v*0x8000:v*0x7FFF;}return o;};
  const L=toI16(audioBuffer.getChannelData(0));
  const R=nc>1?toI16(audioBuffer.getChannelData(1)):null;
  const chunks=[];const block=1152;
  for(let i=0;i<L.length;i+=block){
    const mb=nc>1?enc.encodeBuffer(L.subarray(i,i+block),R.subarray(i,i+block)):enc.encodeBuffer(L.subarray(i,i+block));
    if(mb.length)chunks.push(new Int8Array(mb));
  }
  const end=enc.flush();if(end.length)chunks.push(new Int8Array(end));
  return new Blob(chunks,{type:'audio/mpeg'});
}
function detectSyncClick(buffer,searchSecs){
  // Locate the 1kHz calibration click in the first searchSecs of a recording.
  // Demodulation at 1kHz (I/Q) makes the match phase-insensitive.
  try{
    const sr=buffer.sampleRate,d=buffer.getChannelData(0);
    const ds=8000,step=sr/ds;
    const n=Math.min(Math.floor(searchSecs*ds),Math.floor(d.length/step));
    if(n<ds*0.5)return null;
    const x=new Float32Array(n);
    for(let i=0;i<n;i++)x[i]=d[Math.floor(i*step)];
    const m=Math.floor(0.04*ds);
    const cs=new Float32Array(m),sn=new Float32Array(m);
    for(let j=0;j<m;j++){const w=2*Math.PI*1000*j/ds;cs[j]=Math.cos(w);sn[j]=Math.sin(w);}
    const mags=[],tonal=[];let best=0;
    for(let i=0;i+m<n;i+=2){
      let I=0,Q=0,e=0;
      for(let j=0;j<m;j++){const v=x[i+j];I+=v*cs[j];Q+=v*sn[j];e+=v*v;}
      const mag=Math.sqrt(I*I+Q*Q);
      mags.push(mag);
      // fraction of window energy sitting at 1kHz — a beep is a pure tone
      // (~1), a voiced "Ta" or noise burst is broadband (low)
      tonal.push(e>1e-12?(2*mag*mag/m)/e:0);
      if(mag>best&&tonal[tonal.length-1]>0.5)best=mag;
    }
    if(!best)return null;
    const sorted=[...mags].sort((a,b)=>a-b);
    const med=sorted[Math.floor(sorted.length/2)]||0;
    if(best<med*4+1e-6)return null;
    // several beeps may be present — take the earliest strong tonal one,
    // then climb to its correlation peak (= beep start, full window overlap)
    const thr=Math.max(best*0.45,med*4);
    for(let j=0;j<mags.length;j++){
      if(mags[j]>=thr&&tonal[j]>0.5){
        while(j+1<mags.length&&mags[j+1]>mags[j])j++;
        return Math.max(0,(j*2)/ds);
      }
    }
    return null;
  }catch(_){return null;}
}
function detectTaOnsets(buffer,dEst,beats){
  // Collect the user's "Ta" voice onsets in the whole Ta region (recording
  // time). The caller aligns them to the expected grid with a global shift
  // search — per-beat windows alias when the delay nears one beat spacing.
  try{
    const sr=buffer.sampleRate,d=buffer.getChannelData(0);
    const hopS=0.01,hop=Math.floor(sr*hopS);
    const nH=Math.floor(d.length/hop);
    if(nH<10)return null;
    const env=new Float32Array(nH);
    for(let i=0;i<nH;i++){let sum=0;const off=i*hop;for(let j=0;j<hop;j++){const v=d[off+j]||0;sum+=v*v;}env[i]=Math.sqrt(sum/hop);}
    // noise floor from the count-in region only — the rest of the take is
    // full of singing, which would inflate a whole-take percentile
    const preEnd=Math.max(10,Math.min(nH,Math.floor((dEst+beats[0]-0.4)/hopS)));
    const pre=[...env.slice(0,preEnd)].sort((a,b)=>a-b);
    const noise=pre[Math.floor(pre.length*0.3)]||1e-6;
    const thr=Math.max(noise*4,1e-4);
    const from=Math.max(0,Math.floor((dEst+beats[0]-0.35)/hopS));
    const to=Math.min(nH-2,Math.floor((dEst+beats[beats.length-1]+0.9)/hopS));
    const onsets=[];
    let loud=false;
    for(let i=from;i<=to;i++){
      const isLoud=env[i]>thr;
      if(isLoud&&!loud&&env[i+1]>thr){
        const t=i*hopS;
        if(!onsets.length||t-onsets[onsets.length-1]>0.25) onsets.push(t);
      }
      loud=env[i]>thr*0.7;
    }
    return onsets.length?onsets:null;
  }catch(_){return null;}
}

function App(){
  const [phase,setPhase]=useState('loading');
  const [user,setUser]=useState(null);
  const [state,setState]=useState(null);
  const [tab,setTab]=useState('stage');
  // Guided-tour ("Show me how to…") state. `coach` = {id, step, steps, opts} or null.
  const [coach,setCoach]=useState(null);
  const startCoach=(id,opts={})=>{ const steps=buildTour(id,opts,state); if(steps&&steps.length){ setCoach({id,opts,step:0,steps}); } };
  const coachAdvance=()=>setCoach(c=>c?{...c,step:c.step+1}:c);
  const coachExit=()=>setCoach(null);
  const [selectedShowId,setSelectedShowId]=useState(getSavedShow);
  const pickShow=(id)=>{ setSelectedShowId(id); setSavedShow(id); };
  const [goSongId,setGoSongId]=useState(null);
  const [authMsg,setAuthMsg]=useState('');
  const [sending,setSending]=useState(false);
  const [sentTo,setSentTo]=useState('');
  const [bands,setBands]=useState(null);
  const [showChangelog,setShowChangelog]=useState(()=>{try{const seen=localStorage.getItem('sc_seen_ver');return seen!==VERSION;}catch(_){return false;}});
  const [showInstrPrompt,setShowInstrPrompt]=useState(false);
  const [promptInstrs,setPromptInstrs]=useState([]);
  const closeChangelog=useCallback(()=>{try{localStorage.setItem('sc_seen_ver',VERSION);}catch(_){} setShowChangelog(false);},[]);
  useBackHandler(showChangelog,closeChangelog);
  const closeInstrPrompt=useCallback(()=>setShowInstrPrompt(false),[]);
  useBackHandler(showInstrPrompt,closeInstrPrompt);
  const inited=useRef(false);
  const startBoardFn=useRef(null);
  useEffect(()=>{
    if(!configReady()){ setPhase('config'); return; }
    if(!initFirebase()){ setPhase('config'); return; }
    let unsubBoard=null;
    let linkHandled=false;
    function startBoard(id){
      if(unsubBoard){ unsubBoard(); unsubBoard=null; }
      inited.current=false; latestStamp=null;
      selectBoard(id);
      setTab('stage');
      setPhase('loading'); setState(null);
      unsubBoard=subscribeBoard(
        (data)=>{
          if(!data){ if(!inited.current){ inited.current=true; setState(migrate(defaultState())); } setPhase('ready'); return; }
          const stamp=data._updatedAt||null;
          if(!inited.current){ inited.current=true; latestStamp=stamp; setState(migrate(data)); setPhase('ready'); return; }
          if(stamp && (!latestStamp || stamp>latestStamp)){ latestStamp=stamp; setState(migrate(data)); }
          setPhase('ready');
        },
        ()=>{ setPhase('denied'); setState(null); }
      );
    }
    startBoardFn.current=startBoard;
    const unsubAuth=auth.onAuthStateChanged(async(u)=>{
      if(!linkHandled){
        linkHandled=true;
        if(!u && auth.isSignInWithEmailLink(location.href)){
          try{ await completeLinkIfPresent(); }catch(e){ setAuthMsg(prettyErr(e)); }
          return;
        }
        if(u && auth.isSignInWithEmailLink(location.href)){
          history.replaceState(null,'',location.pathname);
        }
      }
      if(unsubBoard){ unsubBoard(); unsubBoard=null; }
      inited.current=false; latestStamp=null;
      setUser(u||null); setState(null); setBands(null);
      if(!u){ setPhase(p=> p==='sent'?'sent':'signin'); return; }
      const forced=urlBoard();
      if(forced){ startBoard(forced); return; }
      setPhase('loading');
      queryMyBands(u.email).then(list=>{
        setBands(list);
        if(list.length===1){ startBoard(list[0].id); return; }
        let last=null; try{ last=localStorage.getItem('sc_board'); }catch(_){}
        if(last!=='staging' && last && list.find(b=>b.id===last)){ startBoard(last); return; }
        setPhase('pickband');
      }).catch(()=>{ setBands([]); setPhase('pickband'); });
    });
    return ()=>{ unsubAuth&&unsubAuth(); unsubBoard&&unsubBoard(); };
  },[]);

  const pickBoard=(id)=>{ if(startBoardFn.current) startBoardFn.current(id); };
  const switchBoard=()=>{
    inited.current=false; latestStamp=null; setState(null);
    if(user){
      setPhase('loading');
      queryMyBands(user.email).then(list=>{ setBands(list); setPhase('pickband'); })
        .catch(()=>{ setBands([]); setPhase('pickband'); });
    }
  };
  const update=(fn)=> setState(prev=>{
    const next=fn(structuredClone(prev));
    next._updatedAt=new Date().toISOString();
    next._rev=(prev&&prev._rev?prev._rev:0)+1;
    latestStamp=next._updatedAt;
    saveState(next);
    return next;
  });
  const doSend=(email)=>{ setSending(true); setAuthMsg(''); sendLink(email).then(()=>{ setSentTo(email); setPhase('sent'); }).catch(e=>setAuthMsg(prettyErr(e))).finally(()=>setSending(false)); };

function prettyErr(e){
  if(!e) return '';
  const c=e.code||'';
  if(c.indexOf('unauthorized-domain')>=0 || (e.message||'').indexOf('domain')>=0) return 'This site\u2019s domain isn\u2019t authorized in Firebase yet. Add it under Authentication → Settings → Authorized domains.';
  if(c.indexOf('invalid-email')>=0) return 'That email doesn\u2019t look right.';
  if(c.indexOf('quota')>=0) return 'Too many requests right now — try again shortly.';
  return e.message || 'Something went wrong. Try again.';
}

// Shared time-change proposal UI — used in Rehearsals and on Stage for the next rehearsal.
// Answer your OWN attendance straight from the Stage card, without going to the
// Rehearsals tab. Marks whichever instrument(s) you play (MY_INSTRS) — if you
// haven't picked an instrument yet there's nothing we could mark, so it hides.
// Reuses AttPop, the same ✓/?/✕ picker as the Rehearsals attendance chips.
function AttendanceAnswer({r,update}){
  const [open,setOpen]=useState(false);
  const mine=INSTR.filter(i=>(MY_INSTRS||[]).includes(i.id));
  if(!mine.length) return null;
  const sts=mine.map(i=>attState(((r&&r.attendance)||{})[i.id]));
  const cur=sts.every(s=>s==='yes')?'yes':sts.every(s=>s==='no')?'no':sts.every(s=>s==='maybe')?'maybe':'none';
  const set=(v)=>{
    update(s=>{ const rr=(s.rehearsals||[]).find(x=>x.id===r.id); if(!rr) return s;
      rr.attendance=rr.attendance||{};
      mine.forEach(i=>{ if(v) rr.attendance[i.id]=v; else delete rr.attendance[i.id]; });
      return s; });
    setOpen(false);
  };
  const label=cur==='yes'?"✓ I'm in":cur==='no'?"✕ Can't make it":cur==='maybe'?'? Maybe':'Answer attendance';
  const tone=cur==='yes'?{borderColor:'var(--ok)',color:'var(--ok)'}:cur==='no'?{borderColor:'var(--drums)',color:'var(--drums)'}:cur==='maybe'?{borderColor:'var(--warn)',color:'var(--warn)'}:null;
  return <span style={{position:'relative',display:'inline-flex'}}>
    <button className="btn ghost" style={{width:'auto',...(tone||{})}} onClick={()=>setOpen(o=>!o)}
      title={'Your attendance ('+mine.map(i=>i.label).join(', ')+') — '+attLabel(cur)}>{label}</button>
    {open && <React.Fragment>
      <span onClick={()=>setOpen(false)} style={{position:'fixed',left:0,top:0,right:0,bottom:0,zIndex:40}}/>
      <AttPop cur={cur} onPick={set}/>
    </React.Fragment>}
  </span>;
}

// Interactive four-state attendance chips (tap a player → AttPop ✓/?/✕/—).
// You can only edit chips for your OWN instrument(s) (MY_INSTRS) — everyone else's
// is shown read-only. Guests aren't tied to an instrument, so anyone can set them.
// `onSet(key, value)` is called with an instrument id or 'g:Name' and a state.
function AttendanceChips({state,attendance,guestList,onSet}){
  const [pick,setPick]=useState(null);
  const a=attendance||{};
  const canEdit=(key)=> key.indexOf('g:')===0 ? true : (MY_INSTRS||[]).includes(key);
  const chip=(key,color,content,name)=>{ const stt=attState(a[key]); const editable=canEdit(key);
    return (
      <span key={key} className="att-slot">
        <button className={'a'+(stt==='yes'?' in':'')+(stt==='no'?' out':'')+(stt==='maybe'?' maybe':'')+(editable?'':' ro')} title={name+' — '+attLabel(stt)+(editable?'':' (only they set this)')} style={stt==='yes'?{background:color,borderColor:color}:null} onClick={editable?()=>setPick(p=>p===key?null:key):undefined}>{content}</button>
        {stt!=='none' && <span className={'att-badge '+stt}>{attGlyph(stt)}</span>}
        {editable && pick===key && <AttPop cur={stt} onPick={v=>{ setPick(null); onSet(key,v); }}/>}
      </span>
    );
  };
  return (
    <div className="att">
      {pick && <span onClick={()=>setPick(null)} style={{position:'fixed',left:0,top:0,right:0,bottom:0,zIndex:40}}/>}
      {INSTR.map(i=>chip(i.id,i.color,<InstrIcon id={i.id} size={16}/>,((state&&state.members&&state.members[i.id]&&state.members[i.id].name)||i.label)))}
      {(guestList||[]).map(n=>chip('g:'+n,GUEST_COLOR,n.trim()[0].toUpperCase(),n))}
    </div>
  );
}
function RehearsalProposal({r,update,extra,state}){
  const [proposing,setProposing]=useState(false);
  const init=r.date?r.date.slice(0,16):'';
  const [day,setDay]=useState(init?init.slice(0,10):'');
  const [time,setTime]=useState(init?init.slice(11,16):'');
  const p=r.proposal;
  const guestList=state?allShowGuests(state.shows):[];

  const submit=()=>{
    if(!day||!time) return;
    const newDate=day+'T'+time;
    update(s=>{ const rr=s.rehearsals.find(x=>x.id===r.id); if(!rr) return s;
      rr.proposal={ id:uid(), by:actorName(), date:newDate, attendance:{}, ts:new Date().toISOString() };
      logAct(s,'proposed moving the '+(r.date?fmtDate(r.date)+' ':'')+'rehearsal to '+fmtDate(newDate)+' '+fmtTime(newDate));
      return s; });
    setProposing(false);
  };
  // Members mark their availability for the proposed time (same as the main card).
  const setProposalAtt=(key,v)=>update(s=>{ const rr=s.rehearsals.find(x=>x.id===r.id); if(!rr||!rr.proposal) return s;
    rr.proposal.attendance=rr.proposal.attendance||{}; if(v) rr.proposal.attendance[key]=v; else delete rr.proposal.attendance[key]; return s; });
  // Apply: move the rehearsal to the proposed time, carry the proposal's approvals
  // over as the rehearsal's approvals, and clear the proposal.
  const apply=()=>update(s=>{ const rr=s.rehearsals.find(x=>x.id===r.id); if(!rr||!rr.proposal) return s;
    const nd=rr.proposal.date; rr.date=nd; rr.attendance=Object.assign({},rr.proposal.attendance||{}); rr.proposal=null;
    logAct(s,'moved the rehearsal to '+fmtDate(nd)+' '+fmtTime(nd)); return s; });
  const dismiss=()=>update(s=>{ const rr=s.rehearsals.find(x=>x.id===r.id); if(rr) rr.proposal=null; return s; });

  if(p){
    return (
      <div className="prop">
        <div className="prop-h">Proposed new time</div>
        <div className="prop-new">{fmtDate(p.date)} · {fmtTime(p.date)}</div>
        <div className="prop-by">by {p.by} · was {fmtDate(r.date)} {fmtTime(r.date)}</div>
        {state && <React.Fragment>
          <div style={{fontSize:11,color:'var(--muted)',marginTop:9,marginBottom:1}}>Can you make the new time? (tap your player)</div>
          <AttendanceChips state={state} attendance={p.attendance} guestList={guestList} onSet={setProposalAtt}/>
        </React.Fragment>}
        <div className="prop-act">
          <button className="btn" onClick={apply}>Apply as new time</button>
          <button className="btn ghost" onClick={dismiss}>Delete</button>
        </div>
        {extra && <div style={{marginTop:10}}>{extra}</div>}
      </div>
    );
  }
  return (
    <div className="prop">
      {!proposing
        ? <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
            <button className="btn ghost" style={{width:'auto'}} onClick={()=>setProposing(true)}>Propose new time</button>
            {extra}
          </div>
        : <div className="propform">
            <div className="prop-h">New day & time</div>
            <div className="row2">
              <input className="inp" type="date" value={day} onChange={e=>setDay(e.target.value)}/>
              <input className="inp" type="time" value={time} onChange={e=>setTime(e.target.value)}/>
            </div>
            <div className="prop-act">
              <button className="btn" disabled={!day||!time} onClick={submit}>Propose</button>
              <button className="btn ghost" onClick={()=>setProposing(false)}>Cancel</button>
            </div>
          </div>}
    </div>
  );
}

function songFileFlags(song){

function ReadinessGraph({history}){
  const W=500,H=160,PAD=30,PADR=10,PADT=10,PADB=28;
  const now=new Date(); const yearAgo=new Date(now); yearAgo.setDate(yearAgo.getDate()-365);
  const pts=history.filter(p=>new Date(p.d)>=yearAgo).sort((a,b)=>a.d.localeCompare(b.d));
  if(pts.length===0) return null;
  const minD=yearAgo.getTime(), maxD=now.getTime(), rangeD=maxD-minD;
  const toX=d=>PAD+(new Date(d).getTime()-minD)/rangeD*(W-PAD-PADR);
  const toY=v=>PADT+(100-v)/100*(H-PADT-PADB);
  const line=pts.length>1?pts.map((p,i)=>(i===0?'M':'L')+toX(p.d).toFixed(1)+','+toY(p.v).toFixed(1)).join(' '):'';
  const area=pts.length>1?line+' L'+toX(pts[pts.length-1].d).toFixed(1)+','+(H-PADB)+' L'+toX(pts[0].d).toFixed(1)+','+(H-PADB)+' Z':'';
  const months=[]; for(let m=0;m<12;m++){ const d=new Date(now); d.setMonth(d.getMonth()-11+m); d.setDate(1); if(d>=yearAgo) months.push(d); }
  return (
    <div className="card" style={{padding:'14px 8px 8px'}}>
      <svg viewBox={'0 0 '+W+' '+H} style={{width:'100%',height:'auto'}}>
        <defs><linearGradient id="rg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="var(--ok)" stopOpacity=".25"/><stop offset="100%" stopColor="var(--ok)" stopOpacity="0"/></linearGradient></defs>
        {[0,25,50,75,100].map(v=><g key={v}>
          <line x1={PAD} x2={W-PADR} y1={toY(v)} y2={toY(v)} stroke="var(--line)" strokeWidth=".7"/>
          <text x={PAD-5} y={toY(v)+3.5} textAnchor="end" fill="var(--muted-2)" fontSize="9" fontFamily="var(--mono)">{v}%</text>
        </g>)}
        {months.map((d,i)=><text key={i} x={toX(d.toISOString().slice(0,10))} y={H-8} textAnchor="middle" fill="var(--muted-2)" fontSize="8" fontFamily="var(--mono)">{d.toLocaleDateString(undefined,{month:'short'})}</text>)}
        {area && <path d={area} fill="url(#rg)"/>}
        {line && <path d={line} fill="none" stroke="var(--ok)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>}
        <circle cx={toX(pts[pts.length-1].d)} cy={toY(pts[pts.length-1].v)} r="4" fill="var(--ok)"/>
      </svg>
    </div>
  );
}

function Setlist({state,update,goSongId,clearGoSong,showId,pickShow}){
  const wide=useWide();
  const [open,setOpen]=useState(null);
  const [adding,setAdding]=useState(false);
  const [addExisting,setAddExisting]=useState(false);
  const closeAddExisting=useCallback(()=>setAddExisting(false),[]);
  useBackHandler(addExisting,closeAddExisting);
  const [roleFilter,setRoleFilter]=useState(null);
  const [reorder,setReorder]=useState(false);
  const [dragId,setDragId]=useState(null);
  const [dropPos,setDropPos]=useState(null);
  const show = getShow(state,showId);
  const allEntries = show ? (show.setlist||[]) : [];
  const activeEntries = allEntries.filter(e=>!e.excluded);
  const excludedEntries = allEntries.filter(e=>e.excluded);
  const active = activeEntries.map(e=>{ const s=state.songs.find(x=>x.id===e.songId); return s?mergeSongEntry(s,e):null; }).filter(Boolean);
  const excluded = excludedEntries.map(e=>{ const s=state.songs.find(x=>x.id===e.songId); return s?mergeSongEntry(s,e):null; }).filter(Boolean);
  const numberOf={}; active.forEach((s,i)=>{ numberOf[s.id]=i+1; });
  const showRehearsals = state.rehearsals.filter(r=>r.showId===showId);
  useEffect(()=>{ if(goSongId){ setOpen(goSongId); if(clearGoSong) clearGoSong(); } },[goSongId]);

  /* ----- Setlist Files Update (removable feature, see helpers block) ----- */
  const sfuInputRef=useRef(null);
  const [sfuOpen,setSfuOpen]=useState(false);
  const [sfuBusy,setSfuBusy]=useState(false);
  const [sfuLog,setSfuLog]=useState([]);
  const closeSfu=useCallback(()=>{ if(!sfuBusy) setSfuOpen(false); },[sfuBusy]);
  useBackHandler(sfuOpen,closeSfu);
  const runSetlistFilesUpdate=async(files)=>{
    if(!files||!files.length) return;
    const catCol={slide:'#F4A93C',vocals:'#EC6FA9',drums:'#F2545B',bass:'#2DD4BF',guitar:'#F4A93C',keys:'#8B7CF6',other:'#5BC0EB'};
    const catLabel=(c)=>({slide:'Slide',vocals:'Vocals',drums:'Drums',bass:'Bass',guitar:'Guitar',keys:'Keys',other:'Other'}[c]||c);
    setSfuOpen(true);setSfuBusy(true);
    const log=[]; const push=(e)=>{ log.push(e); setSfuLog(log.slice()); };
    push({t:'info',m:'Reading folder…'});
    // group files by the per-song subfolder (root/song/file)
    const groups={};
    files.forEach(f=>{ const parts=(f.webkitRelativePath||f.name).split('/'); if(parts.length<3) return; const key=parts[1]; if(sfuNormTitle(key)==='ignore') return; (groups[key]=groups[key]||[]).push({f,depth:parts.length}); });
    const folderKeys=Object.keys(groups);
    push({t:'info',m:folderKeys.length+' song folder(s) found · '+active.length+' song(s) in setlist'});
    // Greedy best-match: score every song/folder pair, assign highest first,
    // each folder and song used at most once.
    const pairs=[];
    active.forEach(song=>{ folderKeys.forEach(fk=>{ const sc=sfuScore(song.title,song.artist,fk); if(sc>=0.6) pairs.push({songId:song.id,fk,sc}); }); });
    pairs.sort((a,b)=>b.sc-a.sc);
    const songToFolder={},usedFolder={};
    pairs.forEach(p=>{ if(songToFolder[p.songId]!==undefined||usedFolder[p.fk])return; songToFolder[p.songId]=p.fk; usedFolder[p.fk]=true; });
    let changed=0,skipped=0,errors=0;
    for(const song of active){
      const fk=songToFolder[song.id];
      if(!fk){ push({t:'skipsong',song:song.title,m:'no matching folder'}); continue; }
      if(sfuNormTitle(fk)!==sfuNormTitle(song.title)) push({t:'info',song:song.title,m:'matched folder "'+fk+'"'});
      const direct=groups[fk].filter(x=>x.depth===3).map(x=>x.f); // files directly in the song folder
      push({t:'song',song:song.title,m:direct.length+' file(s)'});
      // one file per category (first wins)
      const byCat={};
      direct.forEach(f=>{
        const c=sfuCatFromName(f.name);
        if(c==='ignore'){ push({t:'skipfile',song:song.title,file:f.name,m:'[Ignore] — skipped'}); return; }
        if(!c){ push({t:'skipfile',song:song.title,file:f.name,m:'no [Tag] prefix — skipped'}); return; }
        if(byCat[c]) push({t:'skipfile',song:song.title,file:f.name,m:'extra '+catLabel(c)+' file — ignored'}); else byCat[c]=f;
      });
      for(const cat of Object.keys(byCat)){
        const f=byCat[cat];
        try{
          const conv=await sfuFileToBlob(f);
          if(!conv){ skipped++; push({t:'skipfile',song:song.title,file:f.name,m:/\.pptx?$/i.test(f.name)?'PowerPoint — convert to PDF first (tools/pptx2pdf.py)':'unsupported file type'}); continue; }
          const so=state.songs.find(x=>x.id===song.id);
          // NEVER include stems here — replacing a category's doc must not touch the
          // instrument's stem audio (they share the cat but are separate files).
          const inCat=(so.files||[]).filter(x=>!x.stem&&(x.cat==='original'?'other':x.cat||'other')===cat);
          if(inCat.some(x=>x.size===conv.blob.size)){ skipped++; push({t:'same',song:song.title,file:f.name,cat,m:catLabel(cat)+' unchanged (same size) — kept'}); continue; }
          // version: same source filename replacing -> bump; different name -> restart at 0
          const prev=inCat[0];
          const ver=(prev && (prev.srcName||'')===f.name) ? ((prev.ver||0)+1) : 0;
          const fid=uid();
          const nm=song.title+' '+catLabel(cat)+'.'+conv.ext;
          const path='files/'+BOARD+'/'+fid+'-sfu.'+conv.ext;
          const ref=storage.ref().child(path);
          await ref.put(conv.blob,{contentType:conv.mime});
          const url=await ref.getDownloadURL();
          const wasThere=inCat.length>0;
          update(st=>{ const s2=st.songs.find(x=>x.id===song.id); if(!s2)return st;
            // Replace only the non-stem doc(s) in this category; keep stems intact.
            const old=(s2.files||[]).filter(x=>!x.stem&&(x.cat==='original'?'other':x.cat||'other')===cat);
            old.forEach(x=>{ if(x.kind==='upload'&&x.path) deleteStoragePath(x.path); });
            s2.files=(s2.files||[]).filter(x=>x.stem||(x.cat==='original'?'other':x.cat||'other')!==cat);
            s2.files.push({id:fid,name:nm,kind:'upload',url,path,size:conv.blob.size,type:conv.type,cat,ver,srcName:f.name});
            return st; });
          changed++;
          push({t:'ok',song:song.title,file:f.name,cat,m:(wasThere?'replaced':'added')+' → '+catLabel(cat)+' · v'+String(ver).padStart(2,'0')+(conv.note?' · '+conv.note:'')});
        }catch(err){ errors++; push({t:'err',song:song.title,file:f.name,m:(err&&err.message)||'error'}); }
      }
    }
    push({t:'done',m:changed+' changed · '+skipped+' skipped · '+errors+' error(s)'});
    setSfuBusy(false);
  };

  const addSong=(data)=>{ update(s=>{
    const song={id:uid(),files:[],cover:'',notes:'',...data};
    s.songs.push(song);
    const sh=getShow(s,showId);
    if(sh){ sh.setlist.push({songId:song.id,parts:freshParts(),guests:[],encore:false,excluded:false}); }
    logAct(s,'added "'+(song.title||'a song')+'"'); return s; }); setAdding(false); };

  const addExistingSong=(songId)=>update(s=>{
    const sh=getShow(s,showId); if(!sh) return s;
    if(sh.setlist.some(e=>e.songId===songId)) return s;
    const song=s.songs.find(x=>x.id===songId);
    sh.setlist.push({songId,parts:freshParts(),guests:[],encore:false,excluded:false});
    if(song) logAct(s,'added "'+song.title+'" to '+sh.name);
    return s;
  });

  const moveActive=(id,dir)=>update(s=>{
    const sh=getShow(s,showId); if(!sh) return s;
    const act=sh.setlist.filter(e=>!e.excluded), exc=sh.setlist.filter(e=>e.excluded);
    const i=act.findIndex(e=>e.songId===id), j=i+dir;
    if(i<0||j<0||j>=act.length) return s;
    const t=act[i]; act[i]=act[j]; act[j]=t;
    sh.setlist=[...act,...exc]; return s; });

  const moveTo=(fromId,targetId,before)=>update(s=>{
    const sh=getShow(s,showId); if(!sh) return s;
    const act=sh.setlist.filter(e=>!e.excluded), exc=sh.setlist.filter(e=>e.excluded);
    const fi=act.findIndex(e=>e.songId===fromId); if(fi<0) return s;
    const [item]=act.splice(fi,1);
    let ti=act.findIndex(e=>e.songId===targetId); if(ti<0) return s;
    if(!before) ti++;
    act.splice(ti,0,item);
    sh.setlist=[...act,...exc]; return s; });
  const onDragStart=(e,id)=>{ e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain',id); setDragId(id); };
  const onDragOver=(e,id)=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; const r=e.currentTarget.getBoundingClientRect(); const half=(e.clientY-r.top)<r.height/2?'top':'bottom'; setDropPos({id,half}); };
  const onDrop=(e)=>{ e.preventDefault(); if(dragId&&dropPos&&dragId!==dropPos.id) moveTo(dragId,dropPos.id,dropPos.half==='top'); setDragId(null); setDropPos(null); };
  const onDragEnd=()=>{ setDragId(null); setDropPos(null); };

  const excludeSong=(id)=>update(s=>{
    const sh=getShow(s,showId); if(!sh) return s;
    const entry=getEntry(sh,id); if(entry){ entry.excluded=true; entry.encore=false; const song=s.songs.find(x=>x.id===id); logAct(s,'took "'+(song?song.title:'a song')+'" out of the set'); }
    sh.setlist=(function(sl){var act=sl.filter(function(e){return !e.excluded;}),exc=sl.filter(function(e){return e.excluded;});return act.concat(exc);})(sh.setlist);
    return s; });

  const includeSong=(id)=>update(s=>{
    const sh=getShow(s,showId); if(!sh) return s;
    const entry=getEntry(sh,id); if(!entry) return s; entry.excluded=false;
    const song=s.songs.find(x=>x.id===id); logAct(s,'put "'+(song?song.title:'a song')+'" back in the set');
    const others=sh.setlist.filter(e=>e.songId!==id);
    var act=others.filter(function(e){return !e.excluded;}), exc=others.filter(function(e){return e.excluded;});
    sh.setlist=[...act,entry,...exc]; return s; });

  const toggleEncore=(id)=>update(s=>{
    const sh=getShow(s,showId); if(!sh) return s;
    const entry=getEntry(sh,id); if(entry&&!entry.excluded){ entry.encore=!entry.encore; const song=s.songs.find(x=>x.id===id); logAct(s,(entry.encore?'marked':'unmarked')+' "'+(song?song.title:'a song')+'" as encore'); }
    return s; });

  const shown = roleFilter ? active.filter(s=>s.parts[roleFilter]!=='ready') : active;
  const roleLabel = roleFilter ? state.members[roleFilter].name : null;
  const selSong = open ? active.concat(excluded).find(x=>x.id===open) : null;
  const poolSongsNotInShow = state.songs.filter(ps=>!allEntries.some(e=>e.songId===ps.id));

  const toolbar = (active.length>0 && !adding) ? (
    <div className="setlist-ctrl">
      <div className="setlist-tools" style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
        {active.length>1 &&
          <button className={'reorder-btn'+(reorder?' on':'')} onClick={()=>{ setReorder(v=>!v); setRoleFilter(null); setOpen(null); }}>
            {reorder?'✓ Done':'⇅ Reorder'}
          </button>}
        {reorder && <span className="ro-hint">↑ ↓ set play order · ★ marks an encore · ⊘ moves a song out</span>}
        {SFU_ENABLED && !reorder && <button className="reorder-btn" style={{marginLeft:'auto'}} disabled={sfuBusy} onClick={()=>sfuInputRef.current&&sfuInputRef.current.click()} title="Bulk-update files from a folder (one subfolder per song)">⤓ Setlist Files</button>}
        {SFU_ENABLED && <input ref={el=>{if(el){el.webkitdirectory=true;el.directory=true;sfuInputRef.current=el;}}} type="file" multiple style={{display:'none'}} onChange={e=>{const fl=Array.from(e.target.files||[]);e.target.value='';runSetlistFilesUpdate(fl);}}/>}
      </div>
      {!reorder &&
        <div className="filterbar">
          <button className={'chip'+(roleFilter===null?' on':'')} onClick={()=>setRoleFilter(null)}>All songs</button>
          {INSTR.map(i=>(
            <button key={i.id} className="chip" title={i.label} aria-label={i.label}
              style={{padding:4,border:'none',background:'transparent',borderRadius:999,boxShadow:roleFilter===i.id?'0 0 0 2px var(--text)':'none',opacity:roleFilter===i.id?1:0.62}}
              onClick={()=>setRoleFilter(i.id)}><InstrBadge id={i.id} size={26}/></button>
          ))}
        </div>}
      {!reorder && roleFilter && <div className="filterhint">Songs where {roleLabel} still needs work · {shown.length}</div>}
    </div>
  ) : null;

  const sfuColor=(t)=>({ok:'var(--ok)',err:'var(--drums)',skipsong:'var(--warn)',skipfile:'var(--warn)',same:'var(--muted)',song:'var(--text)',done:'var(--text)'}[t]||'var(--muted)');
  const sfuModal = SFU_ENABLED && sfuOpen ? (
    <div className="files-modal" onClick={e=>{if(e.target===e.currentTarget)closeSfu();}}>
      <div className="files-panel" onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
          <div className="modaltitle" style={{margin:0}}>Setlist Files Update{sfuBusy?' — working…':''}</div>
          <button onClick={closeSfu} disabled={sfuBusy} style={{background:'none',border:'none',color:'var(--muted)',fontSize:22,cursor:sfuBusy?'default':'pointer',opacity:sfuBusy?0.4:1,padding:'0 4px'}}>×</button>
        </div>
        <div style={{maxHeight:'60vh',overflowY:'auto',padding:'4px 2px',fontFamily:'var(--mono)',fontSize:12,lineHeight:1.5}}>
          {sfuLog.map((e,i)=>(
            <div key={i} style={{padding:'3px 6px',borderBottom:'1px solid var(--line)',color:sfuColor(e.t),fontWeight:(e.t==='song'||e.t==='done')?700:400}} dir="auto">
              {e.t==='ok'?'✓ ':e.t==='err'?'✕ ':e.t==='same'?'= ':(e.t==='skipfile'||e.t==='skipsong')?'⤫ ':e.t==='song'?'▸ ':''}
              {e.song?<b style={{direction:'ltr',display:'inline-block'}}>{e.song}</b>:''}{e.file?' · '+e.file:''}{(e.song||e.file)?' — ':''}{e.m}
            </div>
          ))}
          {sfuBusy && <div style={{padding:'8px 6px',color:'var(--muted)'}}>…</div>}
        </div>
        <div className="btnrow"><button className="btn" onClick={closeSfu} disabled={sfuBusy}>{sfuBusy?'Working…':'Close'}</button></div>
      </div>
    </div>
  ) : null;

  const emptyStates = (
    <React.Fragment>
      {active.length===0 && excluded.length===0 && !adding &&
        <div className="empty"><div className="big">No songs yet</div><div className="sm">Add the first track you're working up for the show.</div></div>}
      {active.length>0 && roleFilter && shown.length===0 &&
        <div className="empty"><div className="big">{roleLabel} is all set</div><div className="sm">Every song on the list is marked ready for this part.</div></div>}
    </React.Fragment>
  );

  const reorderList = active.map(s=>(
    <div className={'ro-row'+(dragId===s.id?' dragging':'')+(dropPos&&dropPos.id===s.id&&dragId!==s.id?(dropPos.half==='top'?' drop-above':' drop-below'):'')}
      key={s.id} draggable
      onDragStart={e=>onDragStart(e,s.id)} onDragOver={e=>onDragOver(e,s.id)}
      onDrop={onDrop} onDragEnd={onDragEnd}>
      <span className="ro-grip">⠿</span>
      <span className={'ro-num'+(s.encore?' enc':'')}>{numberOf[s.id]}</span>
      <span className="ro-title">{s.title}</span>
      <button className={'ro-btn enc'+(s.encore?' on':'')} onClick={()=>toggleEncore(s.id)} aria-label="Toggle encore">★</button>
      <button className="ro-btn excl" onClick={()=>excludeSong(s.id)} aria-label="Exclude from set">⊘</button>
      <button className="ro-btn" disabled={numberOf[s.id]===1} onClick={()=>moveActive(s.id,-1)} aria-label="Move up">↑</button>
      <button className="ro-btn" disabled={numberOf[s.id]===active.length} onClick={()=>moveActive(s.id,1)} aria-label="Move down">↓</button>
    </div>
  ));

  const excludedSection = (!reorder && excluded.length>0 &&
    <React.Fragment>
      <div className="excl-h">Excluded · {excluded.length}</div>
      {excluded.map(s=>(
        <div className="excl-row" key={s.id}>
          <CoverThumb src={s.cover} size={38} radius={9}/>
          <span className="ex-title">{s.title}</span>
          <button className="incl-btn" onClick={()=>includeSong(s.id)}>＋ Include</button>
        </div>
      ))}
    </React.Fragment>);

  const addBar = (!reorder && !adding && show && <div className="add-bar" style={{display:'flex',gap:8,flexWrap:'wrap'}}>
    <button className="btn ghost" onClick={()=>{setAdding(true);scScrollTop();}}>+ New song</button>
    {poolSongsNotInShow.length>0 && <button className="btn ghost" onClick={()=>setAddExisting(true)}>+ Add existing</button>}
  </div>);

  if(!show) return <div className="page"><ShowSelector shows={state.shows} showId={showId} pickShow={pickShow}/><div className="empty"><div className="big">No show selected</div><div className="sm">Create a show in the Shows tab first.</div></div></div>;

  if(wide && !reorder){
    return (
      <div className="page">
        <ShowSelector shows={state.shows} showId={showId} pickShow={pickShow}/>
        <div className="section-h">Setlist · {active.length}{excluded.length?(' · '+excluded.length+' out'):''}</div>
        {adding && <SongForm onSave={addSong} onCancel={()=>setAdding(false)}/>}
        {toolbar}
        {emptyStates}
        <div className="md">
          <div className="md-list">
            {shown.map(s=>(
              <SongRow key={s.id} s={s} num={numberOf[s.id]} members={state.members} rehearsals={showRehearsals} showId={showId}
                open={false} compact selected={open===s.id}
                toggle={()=>setOpen(s.id)} update={update}
                onExclude={()=>excludeSong(s.id)} onToggleEncore={()=>toggleEncore(s.id)}/>
            ))}
            {excludedSection}
            {addBar}
          </div>
          <div className="md-detail">
            {selSong
              ? <SongRow key={'detail-'+selSong.id} s={selSong} num={numberOf[selSong.id]} members={state.members} rehearsals={showRehearsals} showId={showId}
                  open={true} toggle={()=>{}} update={update}
                  onExclude={()=>{excludeSong(selSong.id);setOpen(null);}} onToggleEncore={()=>toggleEncore(selSong.id)}/>
              : <div className="md-empty">Select a song to view details</div>}
          </div>
        </div>
        {addExisting && <div className="modalwrap" onClick={()=>setAddExisting(false)}>
          <div className="modalcard" onClick={e=>e.stopPropagation()}>
            <div className="modaltitle">Add existing song</div>
            {poolSongsNotInShow.length===0?<div style={{fontSize:13,color:'var(--muted)'}}>All songs are already in this show.</div>
              :<div className="checklist">{poolSongsNotInShow.map(ps=>(
                <button key={ps.id} className="checkrow" style={{cursor:'pointer',width:'100%',textAlign:'left',background:'none',border:'none',color:'var(--text)',padding:'8px 4px',borderBottom:'1px solid var(--line)'}} onClick={()=>{addExistingSong(ps.id);}} dir="auto">{ps.title}{ps.artist?' · '+ps.artist:''}</button>
              ))}</div>}
            <div className="btnrow"><button className="btn" onClick={()=>setAddExisting(false)}>Done</button></div>
          </div>
        </div>}
        {sfuModal}
      </div>
    );
  }

  return (
    <div className="page">
      <ShowSelector shows={state.shows} showId={showId} pickShow={pickShow}/>
      <div className="section-h">Setlist · {active.length}{excluded.length?(' · '+excluded.length+' out'):''}</div>
      {adding && <SongForm onSave={addSong} onCancel={()=>setAdding(false)}/>}
      {toolbar}
      {emptyStates}

      {reorder
        ? reorderList
        : shown.map(s=>(
            <SongRow key={s.id} s={s} num={numberOf[s.id]} members={state.members} rehearsals={showRehearsals} showId={showId}
              open={open===s.id} scrollInto={open===s.id} toggle={()=>setOpen(open===s.id?null:s.id)} update={update}
              onExclude={()=>excludeSong(s.id)} onToggleEncore={()=>toggleEncore(s.id)}/>
          ))}

      {excludedSection}
      {addBar}
      {addExisting && <div className="modalwrap" onClick={()=>setAddExisting(false)}>
        <div className="modalcard" onClick={e=>e.stopPropagation()}>
          <div className="modaltitle">Add existing song</div>
          {poolSongsNotInShow.length===0?<div style={{fontSize:13,color:'var(--muted)'}}>All songs are already in this show.</div>
            :<div className="checklist">{poolSongsNotInShow.map(ps=>(
              <button key={ps.id} className="checkrow" style={{cursor:'pointer',width:'100%',textAlign:'left',background:'none',border:'none',color:'var(--text)',padding:'8px 4px',borderBottom:'1px solid var(--line)'}} onClick={()=>{addExistingSong(ps.id);}} dir="auto">{ps.title}{ps.artist?' · '+ps.artist:''}</button>
            ))}</div>}
          <div className="btnrow"><button className="btn" onClick={()=>setAddExisting(false)}>Done</button></div>
        </div>
      </div>}
      {sfuModal}
      {active.length>0 && !reorder &&
        <div className="legend">
          <span><i className="lg" style={{borderColor:'var(--line-2)'}}></i>to do</span>
          <span><i className="lg" style={{borderColor:'var(--keys)'}}></i>learning</span>
          <span><i className="lg" style={{background:'rgba(139,124,246,.28)',borderColor:'var(--keys)'}}></i>practicing</span>
          <span><i className="lg" style={{background:'var(--keys)',borderColor:'var(--keys)'}}></i>ready</span>
        </div>}
    </div>
  );
}

function SongRow({s,num,members,open,toggle,update,onExclude,onToggleEncore,compact,selected,scrollInto,rehearsals,showId}){
  const r=entryReadiness(s);
  const [linkMode,setLinkMode]=useState(false);
  const [linkUrl,setLinkUrl]=useState('');
  const [linkName,setLinkName]=useState('');
  const [fileMsg,setFileMsg]=useState('');
  const [cropSrc,setCropSrc]=useState(null);
  const [busy,setBusy]=useState('');
  const [confirmDel,setConfirmDel]=useState(null);
  const [fileMenu,setFileMenu]=useState(null);
  const [confirmRemove,setConfirmRemove]=useState(false);
  const [renameId,setRenameId]=useState(null);
  const [renameTxt,setRenameTxt]=useState('');
  const [recState,setRecState]=useState(null);
  const [recTime,setRecTime]=useState(0);
  const [showCover,setShowCover]=useState(false);
  const [filesOpen,setFilesOpen]=useState(false);
  const [pickCat,setPickCat]=useState(null);
  const [dropCat,setDropCat]=useState(null);
  const STEM_CATS=[{id:'vocals',label:'Vocals',color:'var(--vocals)'},{id:'drums',label:'Drums',color:'var(--drums)'},{id:'bass',label:'Bass',color:'var(--bass)'},{id:'keys',label:'Keys',color:'var(--keys)'},{id:'guitar',label:'Guitar',color:'var(--guitar)'},{id:'other',label:'Other',color:'#5BC0EB'},{id:'metronome',label:'Metronome',color:'#948FA6'}];
  const [stemOpen,setStemOpen]=useState(false);
  const [stemRecPlayback,setStemRecPlayback]=useState(false);
  const wide=useWide();
  const [stemCfg,setStemCfg]=useState(false);
  const [stemBarH,setStemBarH]=useState(150);
  const stemBarRef=useRef(null);
  const viewCapRef=useRef(null);
  const zoomApplyRef=useRef(null);
  const [zoomMsg,setZoomMsg]=useState('');
  const [zoomMenu,setZoomMenu]=useState(false);
  const [zoomIdx,setZoomIdx]=useState(-1);
  const [viewIdx,setViewIdx]=useState(0);
  // Freehand drawing on the practice slide (image files only).
  const [drawOn,setDrawOn]=useState(false);
  const [penColor,setPenColor]=useState('#F2545B');
  const [penWidth,setPenWidth]=useState(5);
  const [penDlg,setPenDlg]=useState(false);
  const [drawBusy,setDrawBusy]=useState(false);
  const [drawTick,setDrawTick]=useState(0); // bump to re-render Undo/Clear enabled state
  const drawCtlRef=useRef(null);
  const PEN_COLORS=['#F2545B','#F4A93C','#F5D442','#3DD68C','#3B82F6','#111111'];
  const [stemPlaying,setStemPlaying]=useState(false);
  const [stemTime,setStemTime]=useState(0);
  const [stemDur,setStemDur]=useState(0);
  const stemDefaultChans=()=>STEM_CATS.map(c=>({id:c.id,label:c.label,color:c.color,vol:80,defVol:80,custom:false,muted:c.id==='metronome',soloed:false,loaded:false,fileName:null}));
  const stemRecDefaultChans=()=>[
    {id:'mystem',label:'My Stem',color:'var(--drums)',vol:100,defVol:100,custom:false,muted:false,soloed:false,loaded:false,fileName:null},
    {id:'backing',label:'Backing',color:'#5BC0EB',vol:70,defVol:70,custom:false,muted:false,soloed:false,loaded:false,fileName:null}
  ];
  const stemStorageKey='sc_stem_'+s.id;
  const stemRecStorageKey='sc_stemrec_'+s.id;
  const [stemChans,setStemChans]=useState(()=>{
    try{const saved=JSON.parse(localStorage.getItem(stemStorageKey));if(saved&&saved.length)return stemDefaultChans().map(d=>{const sv=saved.find(x=>x.id===d.id);return sv?{...d,vol:sv.vol,muted:sv.muted,soloed:sv.soloed,custom:!!sv.custom}:d;});}catch(_){}
    return stemDefaultChans();
  });
  const stemAudiosRef=useRef({});
  const stemChansRef=useRef(stemChans);
  const stemRafRef=useRef(null);
  const stemPlayingRef=useRef(false);
  const stemGetMaxDur=()=>{let m=0;Object.entries(stemAudiosRef.current).forEach(([k,a])=>{if(a&&isFinite(a.duration))m=Math.max(m,a.duration-stemOff(k));});return m;};
  const stemSyncRef=useRef({});
  const stemOff=(k)=>stemSyncRef.current[k]||0;
  const stemRecFileRef=useRef(null);
  const stemSyncValRef=useRef(0);
  const stemSyncSaveTRef=useRef(null);
  const [stemSyncMs,setStemSyncMs]=useState(0);
  const stemSyncMap=(sy)=>{const o={};if(sy>=0)o.mystem=sy;else STEM_CATS.forEach(c=>{o[c.id]=-sy;});return o;};
  const stemNudgeSync=(dMs)=>{
    const f=stemRecFileRef.current;if(!f)return;
    const sy=Math.round((stemSyncValRef.current*1000+dMs))/1000;
    stemSyncValRef.current=sy;
    stemSyncRef.current=stemSyncMap(sy);
    const t=stemTime;
    Object.entries(stemAudiosRef.current).forEach(([k,a])=>{if(a)a.currentTime=t+stemOff(k);});
    setStemSyncMs(Math.round(sy*1000));
    clearTimeout(stemSyncSaveTRef.current);
    stemSyncSaveTRef.current=setTimeout(()=>{
      update(st=>{const so=st.songs.find(x=>x.id===s.id);if(!so)return st;const ff=(so.files||[]).find(x=>x.id===f.id);if(ff)ff.sync=sy;return st;});
    },800);
  };
  const stemChanAudioKeys=(chId)=>{
    if(chId==='backing') return Object.keys(stemAudiosRef.current).filter(k=>k!=='mystem');
    return stemAudiosRef.current[chId]?[chId]:[];
  };
  const stemApplyMix=(chans)=>{
    const cc=chans||stemChansRef.current;
    const anySolo=cc.some(c=>c.soloed&&stemChanAudioKeys(c.id).length);
    cc.forEach(c=>{
      const keys=stemChanAudioKeys(c.id);if(!keys.length)return;
      const base=(c.custom?c.vol:(c.defVol!=null?c.defVol:80))/100;
      let v=base;
      if(anySolo) v=c.soloed?base:0;
      else if(c.muted) v=0;
      keys.forEach(k=>{const a=stemAudiosRef.current[k];if(a)a.volume=v;});
    });
  };
  const stemTick=()=>{
    const ent=Object.entries(stemAudiosRef.current).find(([k,a])=>a&&!a.paused);
    if(ent) setStemTime(Math.max(0,ent[1].currentTime-stemOff(ent[0])));
    if(stemPlayingRef.current) stemRafRef.current=requestAnimationFrame(stemTick);
  };
  const stemPlay=async()=>{
    if(stemPlayingRef.current)return;
    const md=stemGetMaxDur();if(!md)return;
    const audios=Object.values(stemAudiosRef.current).filter(Boolean);
    if(!audios.length)return;
    Object.entries(stemAudiosRef.current).forEach(([k,a])=>{if(a&&(a.currentTime-stemOff(k))>=md) a.currentTime=stemOff(k);});
    stemApplyMix();
    const results=await Promise.all(audios.map(a=>a.play().then(()=>true).catch(()=>false)));
    if(results.every(r=>!r)){setFileMsg('Browser blocked audio playback. Try tapping Play again.');return;}
    stemPlayingRef.current=true;setStemPlaying(true);setStemDur(md);
    stemRafRef.current=requestAnimationFrame(stemTick);
  };
  const stemPause=()=>{
    if(!stemPlayingRef.current)return;
    Object.values(stemAudiosRef.current).forEach(a=>{if(a)a.pause();});
    stemPlayingRef.current=false;setStemPlaying(false);cancelAnimationFrame(stemRafRef.current);
  };
  const lastPauseTapRef=useRef(0);
  const stemPauseOrStop=()=>{
    const now=Date.now();
    if((now-lastPauseTapRef.current)<400){ stemStop(); lastPauseTapRef.current=0; return; }
    lastPauseTapRef.current=now;
    if(stemPlayingRef.current) stemPause(); else stemPlay();
  };
  const stemStop=()=>{
    Object.entries(stemAudiosRef.current).forEach(([k,a])=>{if(a){a.pause();a.currentTime=stemOff(k);}});
    stemPlayingRef.current=false;setStemPlaying(false);setStemTime(0);cancelAnimationFrame(stemRafRef.current);
  };
  const stemSeek=(v)=>{
    setStemTime(v);
    Object.entries(stemAudiosRef.current).forEach(([k,a])=>{if(a)a.currentTime=v+stemOff(k);});
  };
  const stemLoadUrl=(catId,url,name,chanId)=>{
    const cid=chanId||catId;
    setStemChans(prev=>prev.map(c=>c.id===cid&&!c.loaded?{...c,fileName:'loading…'}:c));
    const a=new Audio();
    a.preload='auto';
    a.volume=1.0;
    const onReady=()=>{
      a.removeEventListener('loadedmetadata',onReady);
      a.removeEventListener('canplaythrough',onReady);
      stemAudiosRef.current[catId]=a;
      if(stemOff(catId)) try{a.currentTime=stemOff(catId);}catch(_){}
      setStemChans(prev=>{const n=prev.map(c=>c.id===cid?{...c,loaded:true,fileName:name||'loaded'}:c);stemApplyMix(n);return n;});
      setStemDur(prev=>Math.max(prev,isFinite(a.duration)?a.duration-stemOff(catId):0));
    };
    a.addEventListener('loadedmetadata',onReady);
    a.addEventListener('canplaythrough',onReady);
    a.onerror=()=>setStemChans(prev=>prev.map(c=>c.id===cid&&!c.loaded?{...c,loaded:false,fileName:'load failed'}:c));
    a.src=url;
  };
  const openStemPlayer=()=>{
    stemStop();
    Object.values(stemAudiosRef.current).forEach(a=>{if(a){a.pause();a.src='';}});
    stemAudiosRef.current={};
    stemSyncRef.current={};
    setStemRecPlayback(false);
    setStemChans(prev=>{
      try{const saved=JSON.parse(localStorage.getItem(stemStorageKey));if(saved&&saved.length)return stemDefaultChans().map(d=>{const sv=saved.find(x=>x.id===d.id);return sv?{...d,vol:sv.vol,muted:sv.muted,soloed:sv.soloed,custom:!!sv.custom}:d;});}catch(_){}
      return stemDefaultChans();
    });
    setStemDur(0);setStemTime(0);setStemCfg(false);setZoomIdx(-1);setViewIdx(0);setStemOpen(true);
    const files=s.files||[];
    STEM_CATS.forEach(cat=>{
      const af=files.filter(f=>f.stem&&(f.cat==='original'?'other':f.cat||'other')===cat.id&&f.type==='audio');
      if(af.length>0) stemLoadUrl(cat.id,af[0].url,af[0].name);
    });
  };
  const openStemRecPlayback=(recFile)=>{
    stemStop();
    Object.values(stemAudiosRef.current).forEach(a=>{if(a){a.pause();a.src='';}});
    stemAudiosRef.current={};
    stemRecFileRef.current=recFile;
    stemSyncValRef.current=recFile.sync||0;
    setStemSyncMs(Math.round((recFile.sync||0)*1000));
    stemSyncRef.current=stemSyncMap(recFile.sync||0);
    setStemRecPlayback(true);
    setStemChans(()=>{
      try{const saved=JSON.parse(localStorage.getItem(stemRecStorageKey));if(saved&&saved.length)return stemRecDefaultChans().map(d=>{const sv=saved.find(x=>x.id===d.id);return sv?{...d,vol:sv.vol,muted:sv.muted,soloed:sv.soloed,custom:!!sv.custom}:d;});}catch(_){}
      return stemRecDefaultChans();
    });
    setStemDur(0);setStemTime(0);setStemCfg(false);setZoomIdx(-1);setViewIdx(0);setStemOpen(true);
    stemLoadUrl('mystem',recFile.url,recFile.name);
    const files=s.files||[];
    const otherCats=STEM_CATS.filter(c=>!MY_INSTRS.includes(c.id)&&c.id!=='metronome');
    otherCats.forEach(cat=>{
      const af=files.filter(f=>f.stem&&(f.cat==='original'?'other':f.cat||'other')===cat.id&&f.type==='audio');
      if(af.length>0) stemLoadUrl(cat.id,af[0].url,'backing stems','backing');
    });
  };
  const closeStemPlayer=()=>{
    stemStop();
    Object.values(stemAudiosRef.current).forEach(a=>{if(a){a.pause();a.src='';}});
    stemAudiosRef.current={};
