<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Soundcheck — band prep board</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&family=Heebo:wght@500;700&display=swap');
  :root{
    --bg:#15141B; --surface:#1F1D29; --surface-2:#282633; --surface-3:#322F40;
    --line:rgba(255,255,255,.09); --line-2:rgba(255,255,255,.14);
    --text:#ECEAF2; --muted:#C2BDD2; --muted-2:#9892AC;
    --keys:#8B7CF6; --drums:#F2545B; --guitar:#F4A93C; --bass:#2DD4BF; --vocals:#EC6FA9;
    --guest:#C9A6FF; --ok:#3DD68C; --warn:#E8A33D; --learn:#5B9DF9;
    --display:'Space Grotesk',system-ui,sans-serif; --mono:'Space Mono',ui-monospace,monospace;
    --body:'Inter',system-ui,sans-serif; --heb:'Heebo','Space Grotesk',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--body);-webkit-font-smoothing:antialiased;line-height:1.45}
  #root{max-width:540px;margin:0 auto;min-height:100vh;position:relative}
  @media(min-width:900px){#root{max-width:1200px}}
  .md{display:flex;gap:16px;height:calc(100vh - 200px);min-height:400px}
  .md-list{width:380px;flex-shrink:0;overflow-y:auto;padding-right:4px}
  .md-detail{flex:1;overflow-y:auto;min-width:0;padding:0 4px}
  .md-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted-2);font-size:15px;font-family:var(--display)}
  .song-sel{outline:2px solid var(--keys);outline-offset:-2px}
  .song-sel .song-head{background:rgba(139,124,246,.06)}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit}
  ::selection{background:var(--keys);color:#fff}
  .topbar{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,var(--bg) 72%,rgba(21,20,27,0));padding:18px 18px 12px}
  .wordmark{display:flex;align-items:center;gap:9px}
  .wordmark .dot{width:9px;height:9px;border-radius:50%;background:var(--ok);box-shadow:0 0 10px var(--ok);animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  @media (prefers-reduced-motion:reduce){.wordmark .dot{animation:none}}
  .wordmark h1{font-family:var(--display);font-weight:700;font-size:17px;letter-spacing:.16em;margin:0;color:var(--muted)}
  .wordmark .ver{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--muted-2);letter-spacing:.04em;align-self:center}
  .topline{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .bell{position:relative;width:38px;height:38px;border-radius:10px;border:1px solid var(--line-2);background:var(--surface-2);color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .bell-dot{position:absolute;top:7px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--drums);border:2px solid var(--surface-2)}
  .modalwrap{position:fixed;inset:0;background:rgba(8,7,12,.66);display:flex;align-items:flex-end;justify-content:center;z-index:50;padding:0}
  .modalcard{background:var(--surface);border:1px solid var(--line-2);border-radius:18px 18px 0 0;width:100%;max-width:560px;max-height:82vh;overflow:auto;padding:20px 18px calc(20px + env(safe-area-inset-bottom))}
  .modaltitle{font-family:var(--display);font-weight:700;font-size:16px;letter-spacing:.02em;margin-bottom:14px}
  .actrow{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:baseline;padding:10px 2px;border-bottom:1px solid var(--line)}
  .actrow:last-child{border-bottom:none}
  .actwho{font-family:var(--display);font-weight:700;font-size:13px;color:var(--text);white-space:nowrap}
  .acttext{font-size:13px;color:var(--muted);min-width:0;line-height:1.35}
  .actwhen{font-family:var(--mono);font-size:10px;color:var(--muted-2);white-space:nowrap}
  .prop{margin-top:13px;border-top:1px solid var(--line);padding-top:13px}
  .prop-h{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--warn);margin-bottom:7px}
  .prop-new{font-family:var(--display);font-weight:700;font-size:14.5px;color:var(--text)}
  .prop-by{font-size:11.5px;color:var(--muted);margin-top:2px}
  .prop-votes{display:flex;align-items:center;gap:9px;margin-top:11px;flex-wrap:wrap}
  .vbtn{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:12px;font-weight:700;border-radius:9px;padding:8px 12px;border:1px solid var(--line-2);background:var(--surface-2);color:var(--muted)}
  .vbtn.up.on{color:var(--ok);border-color:rgba(61,214,140,.5);background:rgba(61,214,140,.08)}
  .vbtn.down.on{color:var(--drums);border-color:rgba(242,84,91,.5);background:rgba(242,84,91,.08)}
  .prop-act{display:flex;gap:8px;margin-top:11px}
  .prop-act .btn{flex:1;padding:9px 12px;font-size:13px}
  .propform{margin-top:11px;display:flex;flex-direction:column;gap:9px}
  .propform .row2{display:flex;gap:9px}
  .propform .row2 .inp{flex:1}
  .topmeta{display:flex;justify-content:space-between;align-items:center;margin-top:11px;gap:12px}
  .topleft{display:flex;align-items:center;gap:12px;min-width:0}
  .band{font-family:var(--heb);font-weight:700;font-size:22px;line-height:1.1}
  .concert-sub{font-size:12px;color:var(--muted);margin-top:3px}
  .countchip{font-family:var(--mono);text-align:right;flex-shrink:0}
  .countchip .num{font-size:22px;font-weight:700;line-height:1}
  .countchip .lbl{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:3px}
  .bandart{cursor:pointer;position:relative;flex-shrink:0;line-height:0}
  .bandart .edithint{position:absolute;right:-3px;bottom:-3px;width:18px;height:18px;border-radius:50%;background:var(--keys);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;border:2px solid var(--bg)}
  .page{padding:6px 18px 110px;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .section-h{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-2);margin:22px 2px 10px;display:flex;align-items:center;gap:8px}
  .section-h::after{content:"";flex:1;height:1px;background:var(--line)}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px}
  .card+.card{margin-top:10px}
  .master{background:linear-gradient(160deg,var(--surface-2),var(--surface));border:1px solid var(--line);border-radius:16px;padding:16px}
  .master .row{display:flex;justify-content:space-between;align-items:baseline}
  .master .pct{font-family:var(--mono);font-size:34px;font-weight:700;line-height:1}
  .master .cap{font-size:12px;color:var(--muted)}
  .ticks{display:flex;gap:3px;margin-top:14px;height:30px;align-items:flex-end}
  .tick{flex:1;border-radius:2px;background:var(--surface-3);transition:background .5s ease,height .5s ease}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 12px}
  .stat .v{font-family:var(--mono);font-size:19px;font-weight:700}
  .stat .k{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);margin-top:2px}
  .strip{display:flex;align-items:center;gap:11px;padding:9px 0}
  .strip+.strip{border-top:1px solid var(--line)}
  .strip .name{font-family:var(--display);font-weight:600;font-size:13px;width:64px;flex-shrink:0}
  .strip .track{flex:1;height:8px;border-radius:5px;background:var(--surface-3);overflow:hidden}
  .strip .fill{height:100%;border-radius:5px;transition:width .6s cubic-bezier(.2,.7,.2,1)}
  .strip .val{font-family:var(--mono);font-size:12px;color:var(--muted);width:38px;text-align:right;flex-shrink:0}
  .song{background:var(--surface);border:2px solid rgba(255,255,255,.18);border-radius:14px;overflow:hidden;scroll-margin-top:70px}
  .song+.song{margin-top:10px}
  .song-head{display:flex;align-items:center;gap:12px;padding:13px 14px;width:100%;text-align:left;cursor:pointer}
  .song-title{font-family:var(--display);font-weight:600;font-size:15px;line-height:1.2;direction:ltr}
  .song-meta{font-size:11.5px;color:var(--muted);margin-top:3px;direction:ltr}
  .cells{display:flex;gap:5px;margin-left:auto;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;max-width:170px}
  .cell{width:24px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:700;border:1.5px solid;transition:all .2s}
  .cell svg{display:block}
  .song-prog{height:5px;background:var(--surface-3)}
  .song-prog .pf{height:100%;transition:width .5s}
  .songnum{font-family:var(--mono);font-size:12.5px;font-weight:700;color:var(--muted);min-width:22px;text-align:center;flex-shrink:0;font-variant-numeric:tabular-nums}
  .songnum.enc{color:var(--guitar)}
  .enc-pill{display:inline-flex;align-items:center;font-family:var(--mono);font-size:8.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--guitar);border:1px solid rgba(244,169,60,.5);border-radius:5px;padding:2px 5px;flex-shrink:0}
  .setlist-ctrl{background:var(--surface);border:2px solid rgba(255,255,255,.18);border-radius:14px;padding:12px 14px;margin-bottom:10px}
  .setlist-tools{display:flex;align-items:center;gap:9px;margin:2px 0;flex-wrap:wrap}
  .reorder-btn{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:var(--surface-2);border:1px solid var(--line-2);border-radius:8px;padding:8px 12px;display:inline-flex;align-items:center;gap:6px}
  .reorder-btn.on{color:#15141B;background:var(--text);border-color:transparent;font-weight:700}
  .ro-hint{font-size:11.5px;color:var(--muted);line-height:1.4}
  .ro-row{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:9px 11px;margin-bottom:8px;transition:opacity .15s}
  .ro-row[draggable]{cursor:grab}
  .ro-row.dragging{opacity:.3}
  .ro-row.drop-above{box-shadow:0 -3px 0 0 var(--keys);border-top-color:var(--keys)}
  .ro-row.drop-below{box-shadow:0 3px 0 0 var(--keys);border-bottom-color:var(--keys)}
  .ro-grip{color:var(--muted-2);font-size:18px;flex-shrink:0;line-height:1;user-select:none}
  .ro-num{font-family:var(--mono);font-size:12.5px;font-weight:700;color:var(--muted);min-width:20px;text-align:center;font-variant-numeric:tabular-nums;flex-shrink:0}
  .ro-num.enc{color:var(--guitar)}
  .ro-title{flex:1;min-width:0;font-family:var(--display);font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;direction:ltr}
  .ro-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--line-2);background:var(--surface-2);color:var(--text);font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .ro-btn:disabled{opacity:.28}
  .ro-btn.enc{color:var(--muted-2)}
  .ro-btn.enc.on{color:var(--guitar);border-color:rgba(244,169,60,.55)}
  .ro-btn.excl{color:var(--muted)}
  .excl-h{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted-2);margin:26px 2px 11px;display:flex;align-items:center;gap:8px}
  .excl-h::after{content:"";flex:1;height:1px;background:var(--line)}
  .excl-row{display:flex;align-items:center;gap:11px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:9px 12px;margin-bottom:8px}
  .excl-row .cover-thumb{opacity:.6}
  .ex-title{flex:1;min-width:0;font-family:var(--display);font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted);direction:ltr}
  .incl-btn{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--ok);background:rgba(61,214,140,.08);border:1px solid rgba(61,214,140,.4);border-radius:8px;padding:8px 13px;flex-shrink:0}
  .songact{display:flex;gap:9px;margin-top:14px}
  .songact .btn{flex:1}
  .cover-thumb{object-fit:cover;border:1px solid var(--line);flex-shrink:0;background:var(--surface-3)}
  .cover-thumb.ph{display:flex;align-items:center;justify-content:center;color:var(--muted-2)}
  .cover-edit{display:flex;gap:13px;align-items:center;padding:2px 0 14px;border-bottom:1px solid var(--line);margin-bottom:4px}
  .cover-btns{display:flex;flex-direction:column;gap:8px;align-items:flex-start}
  .cover-btns .btn{width:auto}
  .cropwrap,.modalwrap{position:fixed;inset:0;z-index:60;background:rgba(10,9,14,.8);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .2s ease}
  .cropcard{background:var(--surface);border:1px solid var(--line-2);border-radius:18px;padding:18px;width:100%;max-width:340px}
  .croptitle{font-family:var(--display);font-weight:600;font-size:15px;text-align:center;margin-bottom:14px}
  .cropview{position:relative;margin:0 auto;overflow:hidden;border-radius:12px;background:#000;touch-action:none;cursor:grab;user-select:none;-webkit-user-select:none}
  .cropview:active{cursor:grabbing}
  .cropview img{pointer-events:none;user-select:none;-webkit-user-drag:none;max-width:none}
  .cropframe{position:absolute;inset:0;pointer-events:none;border-radius:12px;box-shadow:inset 0 0 0 2px rgba(255,255,255,.9)}
  .cropzoom{width:100%;margin:16px 0 4px;accent-color:var(--keys)}
  .crophint{font-size:11.5px;color:var(--muted);text-align:center;margin-bottom:4px}
  .btn:disabled{opacity:.45;cursor:default}
  .modalcard{background:var(--surface);border:1px solid var(--line-2);border-radius:18px;padding:16px;width:100%;max-width:360px;max-height:80vh;display:flex;flex-direction:column}
  .modaltitle{font-family:var(--display);font-weight:600;font-size:15px;margin-bottom:8px}
  .checklist{overflow-y:auto;flex:1;margin:0 -4px}
  .checkrow{display:flex;align-items:center;gap:11px;padding:11px 4px;border-top:1px solid var(--line);font-size:14px;cursor:pointer}
  .checkrow:first-child{border-top:none}
  .checkrow input{width:20px;height:20px;accent-color:var(--keys);flex-shrink:0}
  .song-body{padding:8px 14px 16px;border-top:1px solid var(--line)}
  .editrow{display:flex;align-items:center;gap:10px;padding:9px 0}
  .editrow+.editrow{border-top:1px solid var(--line)}
  .editrow .ename{font-family:var(--display);font-weight:600;font-size:13px}
  .status-pills{display:flex;gap:5px;width:100%}
  .status-pills .pill{flex:1;text-align:center}
  .pill{font-family:var(--mono);font-size:9px;letter-spacing:.03em;text-transform:uppercase;padding:7px 3px;border-radius:7px;border:1px solid var(--line-2);color:var(--muted);white-space:nowrap}
  .pill.on{color:#15141B;font-weight:700;border-color:transparent}
  .guest-edit{padding:11px 0;border-top:1px dashed rgba(201,166,255,.28)}
  .guest-top{display:flex;gap:8px;align-items:center}
  .guest-edit .status-pills{margin-top:9px}
  .xbtn{width:36px;height:40px;border-radius:9px;border:1px solid var(--line);color:var(--muted);flex-shrink:0;font-size:18px}
  .addguest{margin-top:11px;font-size:12.5px;color:var(--guest);background:rgba(201,166,255,.08);border:1px dashed rgba(201,166,255,.4);border-radius:9px;padding:10px;width:100%}
  .fileitem{display:flex;align-items:center;gap:9px;padding:9px 0;border-top:1px solid var(--line)}
  .ftype{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.02em;color:#15141B;padding:5px 0;border-radius:6px;flex-shrink:0;width:38px;text-align:center}
  .fname{flex:1;min-width:0;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fsize{color:var(--muted-2);font-size:11px}
  .fbtn{font-size:12px;color:var(--text);background:var(--surface-2);border:1px solid var(--line);border-radius:7px;padding:6px 11px;flex-shrink:0}
  .xmini{width:30px;height:32px;border-radius:7px;border:1px solid var(--line);color:var(--muted);flex-shrink:0;font-size:16px}
  .fileempty{font-size:12.5px;color:var(--muted-2);padding:9px 0;border-top:1px solid var(--line)}
  .filebtns{display:flex;gap:9px;margin-top:11px}
  .addfile{flex:1;text-align:center;font-size:13px;color:var(--keys);background:rgba(139,124,246,.08);border:1px dashed rgba(139,124,246,.4);border-radius:9px;padding:11px;cursor:pointer;display:block}
  .linkadd{margin-top:11px}
  .filemsg{font-size:11.5px;color:var(--warn);margin-top:10px;line-height:1.45}
  .fieldgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px}
  label.fl{display:block;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0 0 5px 2px}
  .inp{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:10px 11px;color:var(--text);font-size:14px}
  .inp:focus{outline:none;border-color:var(--keys)}
  textarea.inp{resize:vertical;min-height:60px;font-size:13px}
  .full{grid-column:1/-1}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;background:var(--text);color:#15141B;font-weight:600;font-size:14px;padding:12px 16px;border-radius:10px;width:100%}
  .btn.ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--line)}
  .btn.danger{background:none;color:var(--drums);border:1px solid rgba(242,84,91,.4)}
  .btn.sm{padding:9px 13px;font-size:13px;width:auto}
  .btnrow{display:flex;gap:9px;margin-top:14px}
  .add-bar{margin:14px 0 4px}
  .stepper{display:flex;align-items:center;gap:12px;margin-top:11px}
  .stepper .lbl{font-size:13px;color:var(--muted)}
  .stepper .cnt{font-family:var(--mono);font-size:17px;font-weight:700;min-width:22px;text-align:center}
  .reh{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px}
  .reh+.reh{margin-top:10px}
  .reh.done{opacity:.62}
  .reh.live{border-color:var(--drums);box-shadow:0 0 12px rgba(242,84,91,.2)}
  .reh-live-dot{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--drums);margin-top:6px}
  .reh-live-dot i{width:8px;height:8px;border-radius:50%;background:var(--drums);animation:pulse 1.5s ease-in-out infinite}
  .rec-overlay{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;background:rgba(8,7,12,.7)}
  .rec-panel{background:var(--surface);border:2px solid var(--drums);border-radius:20px;width:90%;max-width:400px;padding:36px 24px;text-align:center}
  .rec-dot{width:28px;height:28px;border-radius:50%;background:var(--drums);margin:0 auto 18px;animation:pulse 1.2s ease-in-out infinite}
  .rec-label{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--drums);margin-bottom:8px}
  .rec-timer{font-family:var(--mono);font-size:42px;font-weight:700;color:var(--text);margin-bottom:24px}
  .rec-btns{display:flex;gap:12px;justify-content:center}
  .rec-btn{padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600}
  .rec-btn.stop{background:var(--drums);color:#fff}
  .rec-btn.pause{background:var(--surface-2);color:var(--text);border:1px solid var(--line)}
  .rec-confirm{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;background:rgba(8,7,12,.7)}
  .rec-confirm-panel{background:var(--surface);border:1px solid var(--line-2);border-radius:18px;width:90%;max-width:340px;padding:28px 22px;text-align:center}
  .done-modal{position:fixed;inset:0;z-index:50;display:flex;align-items:flex-end;justify-content:center;background:rgba(8,7,12,.66)}

/* ---------- Firebase layer ---------- */
function configReady(){ return firebaseConfig.apiKey && firebaseConfig.apiKey.indexOf('PASTE')!==0; }
function urlBoard(){
  try{
    const p=new URLSearchParams(location.search);
    let b=p.get('board');
    if(!b && /staging/i.test(location.pathname)) b='staging';
    if(!b) return null;
    b=b.replace(/[^a-zA-Z0-9_-]/g,'');
    return b||null;
  }catch(_){ return null; }
}
let BOARD='main';
let auth=null, db=null, storage=null, boardRef=null, fbOk=false;
function initFirebase(){
  if(fbOk) return true;
  try{
    firebase.initializeApp(firebaseConfig);
    auth=firebase.auth(); db=firebase.firestore(); storage=firebase.storage();
    fbOk=true;
  }catch(e){ fbOk=false; }
  return fbOk;
}
function selectBoard(id){
  BOARD=id||'main';
  boardRef=db.collection('boards').doc(BOARD);
  try{ localStorage.setItem('sc_board',BOARD); }catch(_){}
}
function isStaging(){ return BOARD==='staging'; }
async function queryMyBands(email){
  const snap=await db.collection('boards').where('memberEmails','array-contains',email).get();
  return snap.docs.map(d=>({id:d.id,...d.data()}));
}
async function createBandDoc(name,ownerEmail){
  const id=name.trim().toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'')||uid();
  const s=defaultState();
  s.band=name.trim();
  s.access={[ownerEmail]:'owner'};
  s.memberEmails=[ownerEmail];
  s._updatedAt=new Date().toISOString();
  await db.collection('boards').doc(id).set(s);
  return id;
}
async function cloneLiveToStaging(){
  const snap=await db.collection('boards').doc('main').get();
  const data=snap.exists?snap.data():defaultState();
  data._updatedAt=new Date().toISOString();
  await db.collection('boards').doc('staging').set(JSON.parse(JSON.stringify(data)));
}
function actionSettings(){ return { url: location.href.split('#')[0].split('?')[0], handleCodeInApp:true }; }
function sendLink(email){
  return auth.sendSignInLinkToEmail(email, actionSettings()).then(()=>{ try{ localStorage.setItem('sc_email', email); }catch(_){} });
}
async function completeLinkIfPresent(){
  if(!auth.isSignInWithEmailLink(location.href)) return;
  let email=null; try{ email=localStorage.getItem('sc_email'); }catch(_){}
  if(!email) email=window.prompt('Confirm your email to finish signing in');
  if(!email){ history.replaceState(null,'',location.pathname); return; }
  await auth.signInWithEmailLink(email, location.href);
  try{ localStorage.removeItem('sc_email'); }catch(_){}
  history.replaceState(null,'',location.pathname);
}
let latestStamp=null, saveT=null, pendingDoc=null;
function saveState(s){
  const activeSongs=s.songs.filter(x=>!x.excluded);
  if(activeSongs.length>0){
    const overall=activeSongs.reduce((a,x)=>a+songReadiness(x),0)/activeSongs.length;
    const today=new Date().toISOString().slice(0,10);
    if(!Array.isArray(s.readinessHistory)) s.readinessHistory=[];
    const last=s.readinessHistory[s.readinessHistory.length-1];
    if(!last||last.d!==today) s.readinessHistory.push({d:today,v:Math.round(overall*100)});
    else last.v=Math.round(overall*100);
    if(s.readinessHistory.length>365) s.readinessHistory=s.readinessHistory.slice(-365);
  }
  pendingDoc=s;
  clearTimeout(saveT);
  saveT=setTimeout(()=>{ if(pendingDoc && boardRef){ try{ boardRef.set(JSON.parse(JSON.stringify(pendingDoc))); }catch(e){} } }, 400);
}
function subscribeBoard(onData, onDenied){
  return boardRef.onSnapshot((snap)=>{
    if(snap.metadata.hasPendingWrites) return;
    onData(snap.exists ? snap.data() : null);
  }, (err)=>{ onDenied(err); });
}
function coverPath(songId){ return 'covers/'+BOARD+'/'+songId+'.jpg'; }
function bandArtPath(){ return 'bandart/'+BOARD+'.jpg'; }
async function uploadImage(path, dataUrl){
  const blob = await (await fetch(dataUrl)).blob();
  const ref = storage.ref().child(path);
  await ref.put(blob, {contentType:'image/jpeg'});
  return await ref.getDownloadURL();
}
const uploadCover = (songId,dataUrl)=> uploadImage(coverPath(songId), dataUrl);
const uploadBandArt = (dataUrl)=> uploadImage(bandArtPath(), dataUrl);
async function uploadFileToStorage(id, file){
  const path = 'files/'+BOARD+'/'+id+'-'+file.name.replace(/[^\w.\-]+/g,'_');
  const ref = storage.ref().child(path);
  await ref.put(file);
  const url = await ref.getDownloadURL();
  return {url, path};
}
function deleteStoragePath(path){ try{ if(storage && path) storage.ref().child(path).delete().catch(()=>{}); }catch(_){} }
async function deleteBandDoc(){ if(boardRef) await boardRef.delete(); }

  const members={}; INSTR.forEach(i=>members[i.id]={name:i.label});
  return {band:'', bandArt:'', concert:{name:'',date:'',venue:''}, members, songs:[], rehearsals:[], activity:[], access:{}, memberEmails:[], readinessHistory:[], album:[], _rev:0, _updatedAt:null};
}
function freshParts(){ const p={}; INSTR.forEach(i=>p[i.id]='todo'); return p; }
function deriveFromStatus(st){ return st==='ready'?'ready' : (st==='practicing')?'practicing' : (st==='rehearsing'||st==='learning')?'learning' : 'todo'; }
function migrate(s){
  if(typeof s._rev!=='number') s._rev=0;
  if(s.band===undefined) s.band='';
  if(s.bandArt===undefined) s.bandArt='';
  if(!s.concert) s.concert={name:'',date:'',venue:''};

  if(!Array.isArray(s.songs)) s.songs=[];
  s.songs.forEach(song=>{
    if(!song.parts || typeof song.parts!=='object') song.parts={};
    INSTR.forEach(i=>{ if(!VALID(song.parts[i.id])) song.parts[i.id]=deriveFromStatus(song.status); });
    delete song.status;
    if(song.cover===undefined) song.cover='';
    if(!Array.isArray(song.guests)) song.guests=[];
    song.guests = song.guests.slice(0,MAX_GUESTS).map(g=>({ id:g.id||uid(), name:g.name||'', status:VALID(g.status)?g.status:'todo' }));
    if(!Array.isArray(song.files)) song.files=[];
    if(typeof song.excluded!=='boolean') song.excluded=false;
    if(typeof song.encore!=='boolean') song.encore=false;
    if(song.excluded) song.encore=false;
  });
  { const act=s.songs.filter(x=>!x.excluded), exc=s.songs.filter(x=>x.excluded); s.songs=[...act,...exc]; }
  if(!Array.isArray(s.rehearsals)) s.rehearsals=[];
  s.rehearsals.forEach(r=>{
    if(!Array.isArray(r.focusLearn)) r.focusLearn=[];
    if(!Array.isArray(r.focusPractice)) r.focusPractice = Array.isArray(r.focus)? r.focus.slice() : [];
    delete r.focus;
    if(r.proposal!==undefined && r.proposal!==null && typeof r.proposal==='object'){
      if(!r.proposal.votes || typeof r.proposal.votes!=='object') r.proposal.votes={};
    } else { r.proposal=null; }
    if(!Array.isArray(r.coveredSongs)) r.coveredSongs=[];
    if(r.duration===undefined) r.duration='';
  });
  if(!Array.isArray(s.activity)) s.activity=[];
  if(!Array.isArray(s.readinessHistory)) s.readinessHistory=[];
  if(s.readinessHistory.length===0 && s.songs.length>0){
    const act=s.songs.filter(x=>!x.excluded);
    if(act.length>0){ const v=Math.round(act.reduce((a,x)=>a+songReadiness(x),0)/act.length*100); s.readinessHistory.push({d:new Date().toISOString().slice(0,10),v}); }
  }
  if(!Array.isArray(s.album)) s.album=[];
  if(!s.access||typeof s.access!=='object') s.access={};
  if(!Array.isArray(s.memberEmails)) s.memberEmails=[];
  return s;
}
function toggleFocus(learn,practice,group,id){
  const inL=learn.includes(id), inP=practice.includes(id);
  let L=learn.filter(x=>x!==id), P=practice.filter(x=>x!==id);
  if(group==='learn' && !inL) L=[...L,id];
  if(group==='practice' && !inP) P=[...P,id];
  return {learn:L,practice:P};
}
function isOther(x){ return String(x).indexOf('other:')===0; }
function getOther(arr){ const e=(arr||[]).find(isOther); return e? e.slice(6):''; }
function setOtherInArr(arr,text){ const cleaned=(arr||[]).filter(x=>!isOther(x)); return text? [...cleaned,'other:'+text] : cleaned; }
function focusName(id,songs){ if(isOther(id)) return id.slice(6)||'Other'; const s=songs.find(y=>y.id===id); return s?s.title:null; }
function fmtDate(iso){ if(!iso) return ''; const d=new Date(iso); return d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'}); }
function fmtTime(iso){ if(!iso) return ''; const d=new Date(iso); return d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'}); }
function daysUntil(iso){ if(!iso) return null; const ms=new Date(iso).setHours(23,59,59)-Date.now(); return Math.ceil(ms/86400000); }
function meterColor(p){ return p>=0.8?'var(--ok)' : p>=0.45?'var(--warn)' : p>0?'var(--drums)':'var(--muted-2)'; }
function timeAgo(iso){ if(!iso) return ''; const s=Math.floor((Date.now()-new Date(iso))/1000);
  if(s<10) return 'just now'; if(s<60) return s+'s ago'; const m=Math.floor(s/60);
  if(m<60) return m+'m ago'; const h=Math.floor(m/60); if(h<24) return h+'h ago'; return Math.floor(h/24)+'d ago'; }

function logAct(s,text){

function addDaysLocal(localStr, days){
  const d=new Date(localStr); d.setDate(d.getDate()+days);
  const p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
}
function performers(song){ return [ ...INSTR.map(i=>({status:song.parts[i.id]})), ...song.guests.map(g=>({status:g.status})) ]; }
const songReadiness = song => { const p=performers(song); return p.length? p.reduce((a,x)=>a+score(x.status),0)/p.length : 0; };
function allGuests(songs){ const seen=[]; songs.forEach(s=>s.guests.forEach(g=>{ const n=(g.name||'').trim(); if(n && !seen.includes(n)) seen.push(n); })); return seen; }
function songRehCount(songId,rehearsals){ return rehearsals.filter(r=>r.done && r.coveredSongs && r.coveredSongs.includes(songId)).length; }
function isRehLive(r){ if(!r||!r.date||r.done) return false; const start=new Date(r.date).getTime(); const dur=parseFloat(r.duration)||2; const end=start+dur*3600000; const now=Date.now(); return now>=start && now<=end; }
function fmtDuration(d){ if(!d) return ''; const h=Math.floor(d); const m=Math.round((d-h)*60); return h+'h'+(m?(' '+m+'m'):''); }
function fmtTimeRange(iso,dur){ if(!iso) return ''; const s=new Date(iso); const st=fmtTime(iso); if(!dur) return st; const e=new Date(s.getTime()+dur*3600000); const et=e.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'}); return st+'–'+et; }
const KIND_COLOR={audio:'#EC6FA9',pdf:'#F2545B',slides:'#F4A93C',doc:'#5B9DF9',image:'#2DD4BF',sheet:'#3DD68C',file:'#948FA6',link:'#C9A6FF'};

function fileKind(name){
  const e=((name||'').split('.').pop()||'').toLowerCase();
  if(['mp3','wav','m4a','aac','ogg','flac','aif','aiff'].includes(e)) return 'audio';
  if(e==='pdf') return 'pdf';

/* ============================== MAIN APP ============================== */
function App(){
  const [phase,setPhase]=useState('loading');
  const [user,setUser]=useState(null);
  const [state,setState]=useState(null);
  const [tab,setTab]=useState('stage');
  const [goSongId,setGoSongId]=useState(null);
  const [authMsg,setAuthMsg]=useState('');
  const [sending,setSending]=useState(false);
  const [sentTo,setSentTo]=useState('');
  const [bands,setBands]=useState(null);
  const [showChangelog,setShowChangelog]=useState(()=>{try{const seen=localStorage.getItem('sc_seen_ver');return seen!==VERSION;}catch(_){return false;}});
  const [showInstrPrompt,setShowInstrPrompt]=useState(false);
  const inited=useRef(false);
  const startBoardFn=useRef(null);

  useEffect(()=>{
    if(!configReady()){ setPhase('config'); return; }
    if(!initFirebase()){ setPhase('config'); return; }
    let unsubBoard=null;
    let linkHandled=false;
    function startBoard(id){
      if(unsubBoard){ unsubBoard(); unsubBoard=null; }
      inited.current=false; latestStamp=null;
      selectBoard(id);
      setPhase('loading'); setState(null);
      unsubBoard=subscribeBoard(
        (data)=>{
          if(!data){ if(!inited.current){ inited.current=true; setState(migrate(defaultState())); } setPhase('ready'); return; }
          const stamp=data._updatedAt||null;
          if(!inited.current){ inited.current=true; latestStamp=stamp; setState(migrate(data)); setPhase('ready'); return; }
          if(stamp && (!latestStamp || stamp>latestStamp)){ latestStamp=stamp; setState(migrate(data)); }
          setPhase('ready');
        },
        ()=>{ setPhase('denied'); setState(null); }
      );
    }
    startBoardFn.current=startBoard;
    const unsubAuth=auth.onAuthStateChanged(async(u)=>{
      if(!linkHandled){
        linkHandled=true;
        if(!u && auth.isSignInWithEmailLink(location.href)){
          try{ await completeLinkIfPresent(); }catch(e){ setAuthMsg(prettyErr(e)); }
          return;
        }
        if(u && auth.isSignInWithEmailLink(location.href)){
          history.replaceState(null,'',location.pathname);
        }
      }
      if(unsubBoard){ unsubBoard(); unsubBoard=null; }
      inited.current=false; latestStamp=null;
      setUser(u||null); setState(null); setBands(null);
      if(!u){ setPhase(p=> p==='sent'?'sent':'signin'); return; }
      const forced=urlBoard();
      if(forced){ startBoard(forced); return; }
      setPhase('loading');
      queryMyBands(u.email).then(list=>{
        setBands(list);
        if(list.length===1){ startBoard(list[0].id); return; }
        let last=null; try{ last=localStorage.getItem('sc_board'); }catch(_){}
        if(last && list.find(b=>b.id===last)){ startBoard(last); return; }
        setPhase('pickband');
      }).catch(()=>{ setBands([]); setPhase('pickband'); });
    });
    return ()=>{ unsubAuth&&unsubAuth(); unsubBoard&&unsubBoard(); };
  },[]);

  const pickBoard=(id)=>{ if(startBoardFn.current) startBoardFn.current(id); };
  const switchBoard=()=>{
    inited.current=false; latestStamp=null; setState(null);
    if(user){
      setPhase('loading');
      queryMyBands(user.email).then(list=>{ setBands(list); setPhase('pickband'); })
        .catch(()=>{ setBands([]); setPhase('pickband'); });
    }
  };
  const update=(fn)=> setState(prev=>{
    const next=fn(structuredClone(prev));
    next._updatedAt=new Date().toISOString();
    next._rev=(prev&&prev._rev?prev._rev:0)+1;
    latestStamp=next._updatedAt;
    saveState(next);
    return next;
  });
  const doSend=(email)=>{ setSending(true); setAuthMsg(''); sendLink(email).then(()=>{ setSentTo(email); setPhase('sent'); }).catch(e=>setAuthMsg(prettyErr(e))).finally(()=>setSending(false)); };
  const signOut=()=>{ inited.current=false; latestStamp=null; try{ auth.signOut(); }catch(_){} setPhase('signin'); setUser(null); setState(null); setBands(null); };

  if(phase==='config') return <AuthShell><ConfigScreen/></AuthShell>;
  if(phase==='signin') return <AuthShell><LoginScreen onSend={doSend} msg={authMsg} busy={sending}/></AuthShell>;
  if(phase==='sent')   return <AuthShell><SentScreen email={sentTo||(user&&user.email)} onBack={signOut}/></AuthShell>;
  if(phase==='denied') return <AuthShell><DeniedScreen email={user&&user.email} onSignOut={signOut} onBack={switchBoard}/></AuthShell>;
  if(phase==='pickband') return <AuthShell><BandPicker bands={bands} onPick={pickBoard} user={user} onSignOut={signOut}/></AuthShell>;
  if(phase==='loading'|| !state) return <AuthShell><Loading label={user?'Loading board…':'Starting…'}/></AuthShell>;

  const dismissChangelog=()=>{try{localStorage.setItem('sc_seen_ver',VERSION);}catch(_){} setShowChangelog(false); if(!MY_INSTR) setShowInstrPrompt(true);};
  const pickInstrPrompt=(id)=>{setMyInstr(id); setShowInstrPrompt(false);};

  return (
    <React.Fragment>
      <Header state={state} update={update} onSwitch={switchBoard} />
      {isStaging() && <div className="stagingbar">STAGING COPY · changes here don't touch the live board</div>}
      {showChangelog && <div className="files-modal" onClick={e=>{if(e.target===e.currentTarget) dismissChangelog();}}>
        <div className="files-panel" style={{maxWidth:380,textAlign:'center'}}>
          <div style={{fontSize:40,marginBottom:8}}>🎵</div>
          <div className="modaltitle" style={{margin:'0 0 4px'}}>Soundcheck v{VERSION}</div>
          <div style={{fontSize:13,color:'var(--muted)',marginBottom:14}}>What's new</div>
          <ul style={{textAlign:'left',fontSize:13,lineHeight:1.7,color:'var(--text)',paddingLeft:20,margin:'0 0 18px'}}>
            {(CHANGELOG[VERSION]||[]).map((c,i)=><li key={i}>{c}</li>)}
          </ul>
          <button className="btn" onClick={dismissChangelog}>Got it</button>
        </div>
      </div>}
      {showInstrPrompt && <div className="files-modal" onClick={e=>{if(e.target===e.currentTarget) setShowInstrPrompt(false);}}>
        <div className="files-panel" style={{maxWidth:340,textAlign:'center'}}>
          <div className="modaltitle" style={{margin:'0 0 6px'}}>What do you play?</div>
          <div style={{fontSize:13,color:'var(--muted)',marginBottom:16}}>Pick your instrument so we can personalize your view.</div>
          <div style={{display:'flex',justifyContent:'center',gap:8,flexWrap:'wrap'}}>
            {INSTR.map(i=>(
              <button key={i.id} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:'10px 12px',borderRadius:12,border:'1.5px solid var(--line-2)',background:'transparent',cursor:'pointer',minWidth:56}} onClick={()=>pickInstrPrompt(i.id)}>
                <InstrBadge id={i.id} size={32}/>
                <span style={{fontSize:11,color:'var(--text)'}}>{i.label}</span>
              </button>
            ))}
          </div>

function prettyErr(e){
  if(!e) return '';
  const c=e.code||'';
  if(c.indexOf('unauthorized-domain')>=0 || (e.message||'').indexOf('domain')>=0) return 'This site\u2019s domain isn\u2019t authorized in Firebase yet. Add it under Authentication → Settings → Authorized domains.';
  if(c.indexOf('invalid-email')>=0) return 'That email doesn\u2019t look right.';
  if(c.indexOf('quota')>=0) return 'Too many requests right now — try again shortly.';
  return e.message || 'Something went wrong. Try again.';
}

// Shared time-change proposal UI — used in Rehearsals and on Stage for the next rehearsal.
function RehearsalProposal({r,update}){
  const [proposing,setProposing]=useState(false);
  const init=r.date?r.date.slice(0,16):'';
  const [day,setDay]=useState(init?init.slice(0,10):'');
  const [time,setTime]=useState(init?init.slice(11,16):'');
  const p=r.proposal;

  const submit=()=>{
    if(!day||!time) return;
    const newDate=day+'T'+time;
    update(s=>{ const rr=s.rehearsals.find(x=>x.id===r.id); if(!rr) return s;
      rr.proposal={ id:uid(), by:actorName(), date:newDate, votes:{[actorName()]:'up'}, ts:new Date().toISOString() };
      logAct(s,'proposed moving the '+(r.date?fmtDate(r.date)+' ':'')+'rehearsal to '+fmtDate(newDate)+' '+fmtTime(newDate));
      return s; });
    setProposing(false);
  };
  const vote=(dir)=>update(s=>{ const rr=s.rehearsals.find(x=>x.id===r.id); if(!rr||!rr.proposal) return s;
    if(rr.proposal.votes[actorName()]===dir) delete rr.proposal.votes[actorName()];
    else rr.proposal.votes[actorName()]=dir; return s; });
  const apply=()=>update(s=>{ const rr=s.rehearsals.find(x=>x.id===r.id); if(!rr||!rr.proposal) return s;
    const nd=rr.proposal.date; rr.date=nd; rr.proposal=null;
    logAct(s,'moved the rehearsal to '+fmtDate(nd)+' '+fmtTime(nd)); return s; });
  const dismiss=()=>update(s=>{ const rr=s.rehearsals.find(x=>x.id===r.id); if(rr) rr.proposal=null; return s; });

  if(p){
    const vals=Object.values(p.votes||{});
    const ups=vals.filter(v=>v==='up').length, downs=vals.filter(v=>v==='down').length;
    const mine=p.votes?p.votes[actorName()]:null;
    return (
      <div className="prop">
        <div className="prop-h">Proposed time change</div>
        <div className="prop-new">{fmtDate(p.date)} · {fmtTime(p.date)}</div>
        <div className="prop-by">by {p.by} · was {fmtDate(r.date)} {fmtTime(r.date)}</div>
        <div className="prop-votes">
          <button className={'vbtn up'+(mine==='up'?' on':'')} onClick={()=>vote('up')}>👍 {ups}</button>
          <button className={'vbtn down'+(mine==='down'?' on':'')} onClick={()=>vote('down')}>👎 {downs}</button>
        </div>
        <div className="prop-act">
          <button className="btn" onClick={apply}>Apply change</button>
          <button className="btn ghost" onClick={dismiss}>Dismiss</button>
        </div>
      </div>
    );
  }
  return (
    <div className="prop">
      {!proposing
        ? <button className="btn ghost" style={{width:'auto'}} onClick={()=>setProposing(true)}>Propose new time</button>
        : <div className="propform">
            <div className="prop-h">New day & time</div>
            <div className="row2">
              <input className="inp" type="date" value={day} onChange={e=>setDay(e.target.value)}/>
              <input className="inp" type="time" value={time} onChange={e=>setTime(e.target.value)}/>
            </div>
            <div className="prop-act">
              <button className="btn" disabled={!day||!time} onClick={submit}>Propose</button>
              <button className="btn ghost" onClick={()=>setProposing(false)}>Cancel</button>
            </div>
          </div>}
    </div>
  );
}
