function ReadinessGraph({history}){
  const W=500,H=160,PAD=30,PADR=10,PADT=10,PADB=28;
  const now=new Date(); const yearAgo=new Date(now); yearAgo.setDate(yearAgo.getDate()-365);
  const pts=history.filter(p=>new Date(p.d)>=yearAgo).sort((a,b)=>a.d.localeCompare(b.d));
  if(pts.length===0) return null;
  const minD=yearAgo.getTime(), maxD=now.getTime(), rangeD=maxD-minD;
  const toX=d=>PAD+(new Date(d).getTime()-minD)/rangeD*(W-PAD-PADR);
  const toY=v=>PADT+(100-v)/100*(H-PADT-PADB);
  const line=pts.length>1?pts.map((p,i)=>(i===0?'M':'L')+toX(p.d).toFixed(1)+','+toY(p.v).toFixed(1)).join(' '):'';
  const area=pts.length>1?line+' L'+toX(pts[pts.length-1].d).toFixed(1)+','+(H-PADB)+' L'+toX(pts[0].d).toFixed(1)+','+(H-PADB)+' Z':'';
  const months=[]; for(let m=0;m<12;m++){ const d=new Date(now); d.setMonth(d.getMonth()-11+m); d.setDate(1); if(d>=yearAgo) months.push(d); }
  return (
    <div className="card" style={{padding:'14px 8px 8px'}}>
      <svg viewBox={'0 0 '+W+' '+H} style={{width:'100%',height:'auto'}}>
        <defs><linearGradient id="rg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="var(--ok)" stopOpacity=".25"/><stop offset="100%" stopColor="var(--ok)" stopOpacity="0"/></linearGradient></defs>
        {[0,25,50,75,100].map(v=><g key={v}>
          <line x1={PAD} x2={W-PADR} y1={toY(v)} y2={toY(v)} stroke="var(--line)" strokeWidth=".7"/>
          <text x={PAD-5} y={toY(v)+3.5} textAnchor="end" fill="var(--muted-2)" fontSize="9" fontFamily="var(--mono)">{v}%</text>
        </g>)}
        {months.map((d,i)=><text key={i} x={toX(d.toISOString().slice(0,10))} y={H-8} textAnchor="middle" fill="var(--muted-2)" fontSize="8" fontFamily="var(--mono)">{d.toLocaleDateString(undefined,{month:'short'})}</text>)}
        {area && <path d={area} fill="url(#rg)"/>}
        {line && <path d={line} fill="none" stroke="var(--ok)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>}
        <circle cx={toX(pts[pts.length-1].d)} cy={toY(pts[pts.length-1].v)} r="4" fill="var(--ok)"/>
      </svg>
    </div>
  );
}

function Setlist({state,update,goSongId,clearGoSong}){
  const wide=useWide();
  const [open,setOpen]=useState(null);
  const [adding,setAdding]=useState(false);
  const [roleFilter,setRoleFilter]=useState(null);
  const [reorder,setReorder]=useState(false);
  const [dragId,setDragId]=useState(null);
  const [dropPos,setDropPos]=useState(null);
  const songs=state.songs;
  const active=songs.filter(x=>!x.excluded);
  const excluded=songs.filter(x=>x.excluded);
  const numberOf={}; active.forEach((s,i)=>{ numberOf[s.id]=i+1; });
  useEffect(()=>{ if(goSongId){ setOpen(goSongId); if(clearGoSong) clearGoSong(); } },[goSongId]);

  const addSong=(data)=>{ update(s=>{
    const song={id:uid(),parts:freshParts(),guests:[],files:[],cover:'',notes:'',excluded:false,encore:false,...data};
    const act=s.songs.filter(x=>!x.excluded), exc=s.songs.filter(x=>x.excluded);
    s.songs=[...act,song,...exc]; logAct(s,'added "'+(song.title||'a song')+'"'); return s; }); setAdding(false); };

  const moveActive=(id,dir)=>update(s=>{
    const act=s.songs.filter(x=>!x.excluded), exc=s.songs.filter(x=>x.excluded);
    const i=act.findIndex(x=>x.id===id), j=i+dir;
    if(i<0||j<0||j>=act.length) return s;
    const t=act[i]; act[i]=act[j]; act[j]=t;
    s.songs=[...act,...exc]; return s; });

  const moveTo=(fromId,targetId,before)=>update(s=>{
    const act=s.songs.filter(x=>!x.excluded), exc=s.songs.filter(x=>x.excluded);
    const fi=act.findIndex(x=>x.id===fromId); if(fi<0) return s;
    const [item]=act.splice(fi,1);
    let ti=act.findIndex(x=>x.id===targetId); if(ti<0) return s;
    if(!before) ti++;
    act.splice(ti,0,item);
    s.songs=[...act,...exc]; return s; });
  const onDragStart=(e,id)=>{ e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain',id); setDragId(id); };
  const onDragOver=(e,id)=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; const r=e.currentTarget.getBoundingClientRect(); const half=(e.clientY-r.top)<r.height/2?'top':'bottom'; setDropPos({id,half}); };
  const onDrop=(e)=>{ e.preventDefault(); if(dragId&&dropPos&&dragId!==dropPos.id) moveTo(dragId,dropPos.id,dropPos.half==='top'); setDragId(null); setDropPos(null); };
  const onDragEnd=()=>{ setDragId(null); setDropPos(null); };

  const excludeSong=(id)=>update(s=>{
    const so=s.songs.find(x=>x.id===id); if(so){ so.excluded=true; so.encore=false; logAct(s,'took "'+so.title+'" out of the set'); }
    const act=s.songs.filter(x=>!x.excluded), exc=s.songs.filter(x=>x.excluded);
    s.songs=[...act,...exc]; return s; });

  const includeSong=(id)=>update(s=>{
    const so=s.songs.find(x=>x.id===id); if(!so) return s; so.excluded=false; logAct(s,'put "'+so.title+'" back in the set');
    const others=s.songs.filter(x=>x.id!==id);
    const act=others.filter(x=>!x.excluded), exc=others.filter(x=>x.excluded);
    s.songs=[...act,so,...exc]; return s; });

  const toggleEncore=(id)=>update(s=>{ const so=s.songs.find(x=>x.id===id); if(so&&!so.excluded){ so.encore=!so.encore; logAct(s,(so.encore?'marked':'unmarked')+' "'+so.title+'" as encore'); } return s; });

  const shown = roleFilter ? active.filter(s=>s.parts[roleFilter]!=='ready') : active;
  const roleLabel = roleFilter ? state.members[roleFilter].name : null;
  const selSong = open ? songs.find(x=>x.id===open) : null;

  const toolbar = (active.length>0 && !adding) ? (
    <div className="setlist-ctrl">
      {active.length>1 &&
        <div className="setlist-tools">
          <button className={'reorder-btn'+(reorder?' on':'')} onClick={()=>{ setReorder(v=>!v); setRoleFilter(null); setOpen(null); }}>
            {reorder?'✓ Done':'⇅ Reorder'}
          </button>
          {reorder && <span className="ro-hint">↑ ↓ set play order · ★ marks an encore · ⊘ moves a song out</span>}
        </div>}
      {!reorder &&
        <div className="filterbar">
          <button className={'chip'+(roleFilter===null?' on':'')} onClick={()=>setRoleFilter(null)}>All songs</button>
          {INSTR.map(i=>(
            <button key={i.id} className="chip" title={i.label} aria-label={i.label}
              style={{padding:4,border:'none',background:'transparent',borderRadius:999,boxShadow:roleFilter===i.id?'0 0 0 2px var(--text)':'none',opacity:roleFilter===i.id?1:0.62}}
              onClick={()=>setRoleFilter(i.id)}><InstrBadge id={i.id} size={26}/></button>
          ))}
        </div>}
      {!reorder && roleFilter && <div className="filterhint">Songs where {roleLabel} still needs work · {shown.length}</div>}
    </div>
  ) : null;

  const emptyStates = (
    <React.Fragment>
      {active.length===0 && excluded.length===0 && !adding &&
        <div className="empty"><div className="big">No songs yet</div><div className="sm">Add the first track you're working up for the show.</div></div>}
      {active.length>0 && roleFilter && shown.length===0 &&
        <div className="empty"><div className="big">{roleLabel} is all set</div><div className="sm">Every song on the list is marked ready for this part.</div></div>}
    </React.Fragment>
  );

  const reorderList = active.map(s=>(
    <div className={'ro-row'+(dragId===s.id?' dragging':'')+(dropPos&&dropPos.id===s.id&&dragId!==s.id?(dropPos.half==='top'?' drop-above':' drop-below'):'')}
      key={s.id} draggable
      onDragStart={e=>onDragStart(e,s.id)} onDragOver={e=>onDragOver(e,s.id)}
      onDrop={onDrop} onDragEnd={onDragEnd}>
      <span className="ro-grip">⠿</span>
      <span className={'ro-num'+(s.encore?' enc':'')}>{numberOf[s.id]}</span>
      <span className="ro-title">{s.title}</span>
      <button className={'ro-btn enc'+(s.encore?' on':'')} onClick={()=>toggleEncore(s.id)} aria-label="Toggle encore">★</button>
      <button className="ro-btn excl" onClick={()=>excludeSong(s.id)} aria-label="Exclude from set">⊘</button>
      <button className="ro-btn" disabled={numberOf[s.id]===1} onClick={()=>moveActive(s.id,-1)} aria-label="Move up">↑</button>
      <button className="ro-btn" disabled={numberOf[s.id]===active.length} onClick={()=>moveActive(s.id,1)} aria-label="Move down">↓</button>
    </div>
  ));

  const excludedSection = (!reorder && excluded.length>0 &&
    <React.Fragment>
      <div className="excl-h">Excluded · {excluded.length}</div>
      {excluded.map(s=>(
        <div className="excl-row" key={s.id}>
          <CoverThumb src={s.cover} size={38} radius={9}/>
          <span className="ex-title">{s.title}</span>
          <button className="incl-btn" onClick={()=>includeSong(s.id)}>＋ Include</button>
        </div>
      ))}
    </React.Fragment>);

  const addBar = (!reorder && !adding && <div className="add-bar"><button className="btn ghost" onClick={()=>{setAdding(true);window.scrollTo({top:0,behavior:'smooth'});}}>+ Add song</button></div>);

  if(wide && !reorder){
    return (
      <div className="page">
        <div className="section-h">Setlist · {active.length}{excluded.length?(' · '+excluded.length+' out'):''}</div>
        {adding && <SongForm onSave={addSong} onCancel={()=>setAdding(false)}/>}
        {toolbar}
        {emptyStates}
        <div className="md">
          <div className="md-list">
            {shown.map(s=>(
              <SongRow key={s.id} s={s} num={numberOf[s.id]} members={state.members} rehearsals={state.rehearsals}
                open={false} compact selected={open===s.id}
                toggle={()=>setOpen(s.id)} update={update}
                onExclude={()=>excludeSong(s.id)} onToggleEncore={()=>toggleEncore(s.id)}/>
            ))}
            {excludedSection}
            {addBar}
          </div>
          <div className="md-detail">
            {selSong
              ? <SongRow key={'detail-'+selSong.id} s={selSong} num={numberOf[selSong.id]} members={state.members} rehearsals={state.rehearsals}
                  open={true} toggle={()=>{}} update={update}
                  onExclude={()=>{excludeSong(selSong.id);setOpen(null);}} onToggleEncore={()=>toggleEncore(selSong.id)}/>
              : <div className="md-empty">Select a song to view details</div>}
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="page">
      <div className="section-h">Setlist · {active.length}{excluded.length?(' · '+excluded.length+' out'):''}</div>
      {adding && <SongForm onSave={addSong} onCancel={()=>setAdding(false)}/>}
      {toolbar}
      {emptyStates}

      {reorder
        ? reorderList
        : shown.map(s=>(
            <SongRow key={s.id} s={s} num={numberOf[s.id]} members={state.members} rehearsals={state.rehearsals}
              open={open===s.id} scrollInto={open===s.id} toggle={()=>setOpen(open===s.id?null:s.id)} update={update}
              onExclude={()=>excludeSong(s.id)} onToggleEncore={()=>toggleEncore(s.id)}/>
          ))}

      {excludedSection}
      {addBar}
      {active.length>0 && !reorder &&
        <div className="legend">
          <span><i className="lg" style={{borderColor:'var(--line-2)'}}></i>to do</span>
          <span><i className="lg" style={{borderColor:'var(--keys)'}}></i>learning</span>
          <span><i className="lg" style={{background:'rgba(139,124,246,.28)',borderColor:'var(--keys)'}}></i>practicing</span>
          <span><i className="lg" style={{background:'var(--keys)',borderColor:'var(--keys)'}}></i>ready</span>
        </div>}
    </div>
  );
}

function SongRow({s,num,members,open,toggle,update,onExclude,onToggleEncore,compact,selected,scrollInto,rehearsals}){
  const r=songReadiness(s);
  const [linkMode,setLinkMode]=useState(false);
  const [linkUrl,setLinkUrl]=useState('');
  const [linkName,setLinkName]=useState('');
  const [fileMsg,setFileMsg]=useState('');
  const [cropSrc,setCropSrc]=useState(null);
  const [busy,setBusy]=useState('');
  const [confirmDel,setConfirmDel]=useState(null);
  const [renameId,setRenameId]=useState(null);
  const [renameTxt,setRenameTxt]=useState('');
  const [recState,setRecState]=useState(null);
  const [recTime,setRecTime]=useState(0);
  const [showCover,setShowCover]=useState(false);
  const [filesOpen,setFilesOpen]=useState(false);
  const [pickCat,setPickCat]=useState(null);
  const [dropCat,setDropCat]=useState(null);
  const [pracPick,setPracPick]=useState(false);
  const [pracAudioChoice,setPracAudioChoice]=useState(null);
  const [pracVisualChoice,setPracVisualChoice]=useState(null);
  const [pracMode,setPracMode]=useState(null);
  const [pracPlaying,setPracPlaying]=useState(false);
  const [pracTime,setPracTime]=useState(0);
  const [pracDur,setPracDur]=useState(0);
  const [pracVol,setPracVol]=useState(1);
  const pracAudioRef=useRef(null);
  const pracTimerRef=useRef(null);
  const rowRef=useRef(null);
  const recorderRef=useRef(null);
  const chunksRef=useRef([]);
  const timerRef=useRef(null);
  const audioRef=useRef(null);
  useEffect(()=>()=>{
    if(recorderRef.current&&recorderRef.current.state!=='inactive') try{recorderRef.current.stream.getTracks().forEach(t=>t.stop());}catch(_){}
    clearInterval(timerRef.current);
    if(audioRef.current) audioRef.current.pause();
  },[]);
  useEffect(()=>{ if(scrollInto&&rowRef.current){ const tb=document.querySelector('.topbar'); const off=tb?tb.getBoundingClientRect().height+6:80; const y=rowRef.current.getBoundingClientRect().top+window.scrollY-off; window.scrollTo({top:y,behavior:'smooth'}); } },[scrollInto]);
  const setField=(k,v)=>update(st=>{const so=st.songs.find(x=>x.id===s.id);so[k]=v;return st;});
  const setRole=(iid,v)=>update(st=>{const so=st.songs.find(x=>x.id===s.id);so.parts[iid]=v;return st;});
  const addGuest=()=>update(st=>{const so=st.songs.find(x=>x.id===s.id);if(so.guests.length<MAX_GUESTS)so.guests.push({id:uid(),name:'',status:'todo'});return st;});
  const setGuestName=(gid,v)=>update(st=>{const so=st.songs.find(x=>x.id===s.id);const g=so.guests.find(x=>x.id===gid);if(g)g.name=v;return st;});
  const setGuestStatus=(gid,v)=>update(st=>{const so=st.songs.find(x=>x.id===s.id);const g=so.guests.find(x=>x.id===gid);if(g)g.status=v;return st;});
  const delGuest=(gid)=>update(st=>{const so=st.songs.find(x=>x.id===s.id);so.guests=so.guests.filter(x=>x.id!==gid);return st;});
  const del=()=>{ deleteStoragePath(coverPath(s.id)); (s.files||[]).forEach(f=>{ if(f.kind==='upload'&&f.path) deleteStoragePath(f.path); }); update(st=>{st.songs=st.songs.filter(x=>x.id!==s.id); logAct(st,'removed "'+s.title+'"'); return st;}); };

  const onCoverPick=(e)=>{ setFileMsg(''); const file=e.target.files&&e.target.files[0]; e.target.value=''; if(!file) return;
    const rd=new FileReader(); rd.onload=()=>setCropSrc(rd.result); rd.onerror=()=>setFileMsg('Couldn’t read that image.'); rd.readAsDataURL(file); };
  const onCropDone=async(data)=>{ setCropSrc(null); if(!data){ setFileMsg('Couldn’t process that image.'); return; }
    setBusy('cover'); try{ const url=await uploadCover(s.id,data); setField('cover',url); }catch(err){ setFileMsg('Cover upload failed — '+prettyErr(err)); } setBusy(''); };
  const clearCover=()=>{ deleteStoragePath(coverPath(s.id)); setField('cover',''); };

  const onDropFiles=(files,cat)=>{ if(!files||!files.length) return;
    Array.from(files).forEach(file=>{
      if(file.size>FILE_CAP){ setFileMsg('File "'+file.name+'" is over 25 MB.'); return; }
      setBusy('file'); const id=uid();
      uploadFileToStorage(id,file).then(({url,path})=>{
        update(st=>{const so=st.songs.find(x=>x.id===s.id);so.files.push({id,name:file.name,kind:'upload',url,path,size:file.size,type:fileKind(file.name),cat:cat||'original'});logAct(st,'uploaded "'+file.name+'" to "'+so.title+'"');return st;});
      }).catch(err=>setFileMsg('Upload failed — '+prettyErr(err))).finally(()=>setBusy(''));
    });
  };
  const onUpload=(e,cat)=>{ setFileMsg(''); const file=e.target.files&&e.target.files[0]; e.target.value=''; if(!file) return;
    if(file.size>FILE_CAP){ setFileMsg('That file is over 25 MB — add it as a link instead.'); return; }
    setBusy('file'); const id=uid();
    uploadFileToStorage(id,file).then(({url,path})=>{
      update(st=>{const so=st.songs.find(x=>x.id===s.id);so.files.push({id,name:file.name,kind:'upload',url,path,size:file.size,type:fileKind(file.name),cat:cat||'original'});logAct(st,'uploaded "'+file.name+'" to "'+so.title+'"');return st;});
    }).catch(err=>setFileMsg('Upload failed — '+prettyErr(err))).finally(()=>setBusy(''));
  };
  const saveLink=(cat)=>{ const u=linkUrl.trim(); if(!u) return;
    const name=linkName.trim() || u.replace(/^https?:\/\//,'').replace(/\/$/,'').slice(0,42);
    update(st=>{const so=st.songs.find(x=>x.id===s.id);so.files.push({id:uid(),name,kind:'link',url:u,type:fileKind(name),cat:cat||'original'});logAct(st,'added link "'+name+'" to "'+so.title+'"');return st;});
    setLinkUrl('');setLinkName('');setLinkMode(false);
  };
  const openFile=(f)=>{ if(f.url) window.open(f.url,'_blank','noopener'); };
  const [pendingPhoto,setPendingPhoto]=useState(null);
  const [photoPreview,setPhotoPreview]=useState(null);
  const onCamera=(e)=>{ const file=e.target.files&&e.target.files[0]; e.target.value=''; if(!file) return;
    setPendingPhoto(file);
    const rd=new FileReader(); rd.onload=()=>setPhotoPreview(rd.result); rd.readAsDataURL(file);
  };
  const uploadPhotoAsFile=()=>{ if(!pendingPhoto) return; const f=pendingPhoto; setPendingPhoto(null); setPhotoPreview(null);
    const ext=(f.name||'').split('.').pop()||'jpg';
    const named=new File([f],autoName('image')+'.'+ext,{type:f.type});
    onUpload({target:{files:[named]}},pickCat||'original');
  };
  const uploadPhotoToAlbum=async()=>{ if(!pendingPhoto) return; const file=pendingPhoto; setPendingPhoto(null); setPhotoPreview(null);
    setBusy('file'); const id=uid();
    try{
      const path='album/'+BOARD+'/'+id+'-'+file.name.replace(/[^\w.\-]+/g,'_');
      const ref=storage.ref().child(path); await ref.put(file);
      const url=await ref.getDownloadURL();
      update(st=>{st.album.push({id,url,path,ts:new Date().toISOString(),name:file.name,by:actorName()}); logAct(st,'added a photo to the album'); return st;});
    }catch(err){ setFileMsg('Album upload failed — '+prettyErr(err)); }
    setBusy('');
  };
  const discardPhoto=()=>{ setPendingPhoto(null); setPhotoPreview(null); };
  const removeFile=(f)=>{ if(f.kind==='upload'&&f.path) deleteStoragePath(f.path); update(st=>{const so=st.songs.find(x=>x.id===s.id);so.files=so.files.filter(x=>x.id!==f.id);logAct(st,'removed "'+f.name+'" from "'+so.title+'"');return st;}); };
  const renameFile=(fid,newName)=>{ if(!newName.trim()) return; update(st=>{const so=st.songs.find(x=>x.id===s.id);const f=so.files.find(x=>x.id===fid);if(f) f.name=newName.trim();return st;}); setRenameId(null); };
  const downloadFile=(f)=>{ const a=document.createElement('a'); a.href=f.url; a.download=f.name||'file'; a.target='_blank'; a.rel='noopener'; document.body.appendChild(a); a.click(); a.remove(); };
  const autoName=(prefix)=>{ const d=new Date(); const dd=String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getFullYear()).slice(-2); const files=s.files||[]; let maxN=0; files.forEach(f=>{ const m=(f.name||'').match(new RegExp(prefix+'-(\\d+)','i')); if(m) maxN=Math.max(maxN,parseInt(m[1],10)); }); return dd+' '+prefix+'-'+(maxN+1); };
  const pendingBlobRef=useRef(null);
  const pendingMimeRef=useRef('');
  const [recConfirm,setRecConfirm]=useState(false);
  const startRec=async()=>{ setFileMsg('');
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false,sampleRate:48000}});
      const mr=new MediaRecorder(stream,{audioBitsPerSecond:256000});
      chunksRef.current=[];
      mr.ondataavailable=(e)=>{ if(e.data.size>0) chunksRef.current.push(e.data); };
      mr.onstop=()=>{
        stream.getTracks().forEach(t=>t.stop());
        clearInterval(timerRef.current);
        const blob=new Blob(chunksRef.current,{type:mr.mimeType||'audio/webm'});
        if(blob.size<100){ setRecState(null); setRecTime(0); return; }
        pendingBlobRef.current=blob;
        pendingMimeRef.current=mr.mimeType||'audio/webm';
        setRecState(null); setRecConfirm(true);
      };
      mr.start(1000);
      recorderRef.current=mr;
      setRecState('recording');
      setRecTime(0);
      timerRef.current=setInterval(()=>setRecTime(t=>t+1),1000);
    }catch(e){ setFileMsg('Microphone not available — check browser permissions.'); }
  };
  const pauseRec=()=>{ if(recorderRef.current&&recorderRef.current.state==='recording'){ recorderRef.current.pause(); clearInterval(timerRef.current); setRecState('paused'); } };
  const resumeRec=()=>{ if(recorderRef.current&&recorderRef.current.state==='paused'){ recorderRef.current.resume(); timerRef.current=setInterval(()=>setRecTime(t=>t+1),1000); setRecState('recording'); } };
  const stopRec=()=>{ if(recorderRef.current&&recorderRef.current.state!=='inactive') recorderRef.current.stop(); };
  const uploadRec=async()=>{
    const blob=pendingBlobRef.current; const mime=pendingMimeRef.current;
    if(!blob){ setRecConfirm(false); setRecTime(0); return; }
    setBusy('rec'); setRecConfirm(false);
    const fid=uid();
    const ext=mime.includes('mp4')?'m4a':mime.includes('ogg')?'ogg':'webm';
    const name=autoName('recording')+'.'+ext;
    try{
      const path='files/'+BOARD+'/'+fid+'-recording.'+ext;
      const sRef=storage.ref().child(path);
      await sRef.put(blob,{contentType:mime});
      const url=await sRef.getDownloadURL();
      update(st=>{const so=st.songs.find(x=>x.id===s.id);so.files.push({id:fid,name,kind:'upload',url,path,size:blob.size,type:'audio',cat:pickCat||'original'});logAct(st,'saved a recording to "'+so.title+'"');return st;});
    }catch(err){ setFileMsg('Recording upload failed — '+prettyErr(err)); }
    pendingBlobRef.current=null; setBusy(''); setRecTime(0);
  };
  const abandonRec=()=>{ pendingBlobRef.current=null; setRecConfirm(false); setRecTime(0); };
  const [playerFile,setPlayerFile]=useState(null);
  const [playerPlaying,setPlayerPlaying]=useState(false);
  const [playerTime,setPlayerTime]=useState(0);
  const [playerDur,setPlayerDur]=useState(0);
  const [playerVol,setPlayerVol]=useState(1);
  const playerTimerRef=useRef(null);
  const openPlayer=(f)=>{
    if(audioRef.current){ audioRef.current.pause(); clearInterval(playerTimerRef.current); }
    const a=new Audio(f.url);
    a.volume=playerVol;
    a.onloadedmetadata=()=>setPlayerDur(isFinite(a.duration)?a.duration:0);
    a.ondurationchange=()=>{if(isFinite(a.duration)) setPlayerDur(a.duration);};
    a.onended=()=>{ setPlayerPlaying(false); setPlayerTime(a.duration||0); clearInterval(playerTimerRef.current); };
    a.onerror=()=>{ setPlayerFile(null); setPlayerPlaying(false); clearInterval(playerTimerRef.current); setFileMsg('Could not play this file.'); };
    a.play().catch(()=>setFileMsg('Playback failed.'));
    audioRef.current=a;
    setPlayerFile(f);
    setPlayerPlaying(true);
    setPlayerTime(0);
    setPlayerDur(0);
    clearInterval(playerTimerRef.current);
    playerTimerRef.current=setInterval(()=>{ if(a&&!a.paused) setPlayerTime(a.currentTime); },250);
  };
  const togglePlay=()=>{
    if(!audioRef.current) return;
    if(audioRef.current.paused){ audioRef.current.play(); setPlayerPlaying(true); playerTimerRef.current=setInterval(()=>setPlayerTime(audioRef.current.currentTime),250); }
    else{ audioRef.current.pause(); setPlayerPlaying(false); clearInterval(playerTimerRef.current); }
  };
  const seekTo=(v)=>{ if(audioRef.current){ audioRef.current.currentTime=v; setPlayerTime(v); } };
  const setVol=(v)=>{ setPlayerVol(v); if(audioRef.current) audioRef.current.volume=v; };
  const closePlayer=()=>{ if(audioRef.current){ audioRef.current.pause(); audioRef.current=null; } clearInterval(playerTimerRef.current); setPlayerFile(null); setPlayerPlaying(false); setPlayerTime(0); };

  const myInstr=MY_INSTR||'keys';
  const filesArr=s.files||[];
  const pracOrigAudio=filesArr.filter(f=>(f.cat||'original')==='original'&&(f.type==='audio'||f.kind==='link'));
  const pracInstrAudio=filesArr.filter(f=>f.cat===myInstr&&(f.type==='audio'||f.kind==='link'));
  const pracSlideFiles=filesArr.filter(f=>f.cat==='slide');
  const pracPartFiles=filesArr.filter(f=>f.cat===myInstr&&f.type!=='audio');
  const openPracPick=()=>{ setPracAudioChoice(null); setPracVisualChoice(null); setPracPick(true); };
  const startPractice=()=>{
    if(!pracAudioChoice&&!pracVisualChoice) return;
    setPracPick(false);
    const audioId=pracAudioChoice?pracAudioChoice.split('__')[0]:null;
    const af=audioId? filesArr.find(f=>f.id===audioId):null;
    const vf=pracVisualChoice? filesArr.find(f=>f.id===pracVisualChoice):null;
    if(af){
      const a=new Audio(af.url); a.volume=pracVol;
      a.onloadedmetadata=()=>setPracDur(a.duration||0);
      a.onended=()=>{ setPracPlaying(false); clearInterval(pracTimerRef.current); };
      pracAudioRef.current=a;
      clearInterval(pracTimerRef.current);
      setPracPlaying(false); setPracTime(0); setPracDur(0);
    }
    setPracMode({audio:af,visual:vf});
  };
  const pracToggle=()=>{
    if(!pracAudioRef.current) return;
    if(pracAudioRef.current.paused){ pracAudioRef.current.play(); setPracPlaying(true); pracTimerRef.current=setInterval(()=>setPracTime(pracAudioRef.current.currentTime),250); }
    else{ pracAudioRef.current.pause(); setPracPlaying(false); clearInterval(pracTimerRef.current); }
  };
  const pracSeek=(v)=>{ if(pracAudioRef.current){ pracAudioRef.current.currentTime=v; setPracTime(v); } };
  const pracSetVol=(v)=>{ setPracVol(v); if(pracAudioRef.current) pracAudioRef.current.volume=v; };
  const exitPractice=()=>{ if(pracAudioRef.current){ pracAudioRef.current.pause(); pracAudioRef.current=null; } clearInterval(pracTimerRef.current); setPracMode(null); setPracPlaying(false); setPracTime(0); };

  const fileCount=s.files?s.files.length:0;
  const rehCount=rehearsals?songRehCount(s.id,rehearsals):0;
  const meta=[s.artist, s.songKey&&('Key '+s.songKey), s.tempo&&(s.tempo+' bpm'), s.duration&&(s.duration+'m')].filter(Boolean);

  return (
    <div className={'song'+(selected?' song-sel':'')} ref={rowRef}>
      <div className="song-head" onClick={toggle}>
        {num!=null && <span className={'songnum'+(s.encore?' enc':'')}>{num}</span>}
        <span style={{position:'relative'}} onClick={e=>{if(open&&!compact){e.stopPropagation();setShowCover(v=>!v);}}}>
          <CoverThumb src={s.cover} size={46} radius={10}/>
          <span className="song-reh-count" style={{position:'absolute',bottom:-2,left:-2,fontSize:8,padding:'1px 4px',opacity:rehCount===0?.3:1,color:'#fff',background:'rgba(0,0,0,.55)'}} title={rehCount+' rehearsal'+(rehCount>1?'s':'')}>{rehCount}×</span>
        </span>
        <div style={{minWidth:0,flex:1}}>
          <div style={{display:'flex',alignItems:'center',gap:7,minWidth:0,flexWrap:'wrap'}}>
            <span className="song-title" style={{minWidth:0}}>{s.title}</span>
            {s.encore && <span className="enc-pill">★ Enc</span>}
          </div>
          <div className="song-meta">{meta.join(' · ')||'—'}</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
          <button className="song-icon-btn" onClick={e=>{e.stopPropagation();if(!open) toggle(); setFilesOpen(true);}} title="Files">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            {fileCount>0 && <span className="song-icon-badge">{fileCount}</span>}
          </button>
          <button className="song-icon-btn" onClick={e=>{e.stopPropagation();if(!open) toggle(); openPracPick();}} title="Practice">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
          </button>
          <button className="song-icon-btn" onClick={e=>{e.stopPropagation();if(!open) toggle(); startRec();}} title="Record" style={{color:'var(--drums)'}}>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
        </div>
      </div>
      <div className="song-prog"><div className="pf" style={{width:(r*100)+'%',background:meterColor(r)}}/></div>
      {open && !compact &&
        <div className="song-body">
          {showCover && <div className="cover-edit">
            <CoverThumb src={s.cover} size={88} radius={12}/>
            <div className="cover-btns">
              <label className="btn ghost sm" style={{cursor:'pointer',opacity:busy==='cover'?0.5:1}}><input type="file" accept="image/*" hidden disabled={busy==='cover'} onChange={onCoverPick}/>{busy==='cover'?'Uploading…':(s.cover?'Replace cover':'Add cover art')}</label>
              {s.cover && busy!=='cover' && <button className="btn danger sm" onClick={clearCover}>Remove cover</button>}
            </div>
          </div>}
          {filesOpen && <div className="files-modal" onClick={e=>{if(e.target===e.currentTarget){setFilesOpen(false);setPickCat(null);setLinkMode(false);}}}>
            <div className="files-panel">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
                <div className="modaltitle" style={{margin:0}}>Files — {s.title}</div>
                <button className="xbtn" onClick={()=>{setFilesOpen(false);setPickCat(null);setLinkMode(false);}}>×</button>
              </div>
              {FILE_CATS.map(cat=>{
                const catFiles=(s.files||[]).filter(f=>(f.cat||'original')===cat.id);
                return (
                  <div className={'files-cat'+(dropCat===cat.id?' drop-over':'')} key={cat.id}
                    onDragOver={e=>{e.preventDefault();e.dataTransfer.dropEffect='copy';setDropCat(cat.id);}}
                    onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget)) setDropCat(null);}}
                    onDrop={e=>{e.preventDefault();setDropCat(null);onDropFiles(e.dataTransfer.files,cat.id);}}>
                    <div className="files-cat-h">
                      {cat.icon==='note' && <svg width="16" height="16" viewBox="0 0 24 24" fill={cat.color} stroke="none"><path d="M12 3v12.26A4.5 4.5 0 1 0 14 19V7h4V3h-6z"/></svg>}
                      {cat.icon==='slide' && <span style={{fontFamily:'var(--mono)',fontWeight:700,fontSize:14,color:cat.color}}>S</span>}
                      {cat.instr && <InstrBadge id={cat.instr} size={20}/>}
                      {cat.label}
                    </div>
                    {catFiles.length===0 && <div className="files-na">N/A — drop files here or use buttons below</div>}
                    {catFiles.map(f=>(
                      <div className="fileitem" key={f.id}>
                        <span className="ftype" style={{background:KIND_COLOR[f.type]||'var(--muted)'}}>{badgeText(f)}</span>
                        {renameId===f.id
                          ? <div style={{flex:1,display:'flex',gap:4,minWidth:0}}>
                              <input className="inp" style={{flex:1,fontSize:12,padding:'4px 6px'}} value={renameTxt} onChange={e=>setRenameTxt(e.target.value)} autoFocus onKeyDown={e=>{if(e.key==='Enter') renameFile(f.id,renameTxt);if(e.key==='Escape') setRenameId(null);}}/>
                              <button className="fbtn" onClick={()=>renameFile(f.id,renameTxt)}>OK</button>
                              <button className="fbtn" onClick={()=>setRenameId(null)}>✕</button>
                            </div>
                          : <div className="fname" dir="auto">{f.name}{f.size?<span className="fsize"> · {fmtSize(f.size)}</span>:null}</div>}
                        {renameId!==f.id && <React.Fragment>
                          {f.type==='audio'
                            ? <button className="fbtn" style={playerFile&&playerFile.id===f.id?{color:'var(--keys)'}:null} onClick={()=>openPlayer(f)}>{playerFile&&playerFile.id===f.id?'Playing…':'Play'}</button>
                            : <button className="fbtn" onClick={()=>openFile(f)}>Open</button>}
                          {f.kind==='upload' && <button className="fbtn" onClick={()=>downloadFile(f)}>↓</button>}
                          <button className="fbtn" onClick={()=>{setRenameId(f.id);setRenameTxt(f.name||'');}}>✎</button>
                          {confirmDel===f.id
                            ? <React.Fragment>
                                <button className="fbtn" style={{color:'var(--drums)'}} onClick={()=>{removeFile(f);setConfirmDel(null);}}>Delete</button>
                                <button className="fbtn" onClick={()=>setConfirmDel(null)}>Cancel</button>
                              </React.Fragment>
                            : <button className="xmini" onClick={()=>setConfirmDel(f.id)} aria-label="Remove file">×</button>}
                        </React.Fragment>}
                      </div>
                    ))}
                  </div>
                );
              })}
              {pickCat
                ? <div style={{marginTop:8}}>
                    <div style={{fontSize:12,color:'var(--muted)',marginBottom:8}}>Adding to: <strong>{FILE_CATS.find(c=>c.id===pickCat)?.label}</strong></div>
                    {linkMode
                      ? <div className="linkadd">
                          <input className="inp" value={linkUrl} onChange={e=>setLinkUrl(e.target.value)} placeholder="Paste a share link (https://…)" autoFocus/>
                          <input className="inp" dir="auto" style={{marginTop:7}} value={linkName} onChange={e=>setLinkName(e.target.value)} placeholder="Label (optional)"/>
                          <div className="btnrow" style={{marginTop:9}}>
                            <button className="btn ghost" onClick={()=>{setLinkMode(false);setLinkUrl('');setLinkName('');}}>Cancel</button>
                            <button className="btn" onClick={()=>{saveLink(pickCat);setLinkMode(false);setLinkUrl('');setLinkName('');}} disabled={!linkUrl.trim()}>Add link</button>
                          </div>
                        </div>
                      : <div className="filebtns" style={{flexWrap:'wrap'}}>
                          <label className="addfile" style={{opacity:busy==='file'?0.5:1}}><input type="file" hidden disabled={busy==='file'} onChange={e=>onUpload(e,pickCat)}/>{busy==='file'?'Uploading…':'Upload file'}</label>
                          <label className="addfile" style={{opacity:busy==='file'?0.5:1,cursor:'pointer'}}><input type="file" accept="image/*" capture="environment" hidden disabled={busy==='file'} onChange={onCamera}/>📷 Camera</label>
                          <button className="addfile" onClick={()=>setLinkMode(true)}>Add link</button>
                          {!recState && <button className="addfile" style={{color:'var(--drums)',borderColor:'rgba(242,84,91,.4)'}} onClick={startRec}>● Record</button>}
                        </div>}
                    <button className="btn ghost sm" style={{marginTop:6}} onClick={()=>{setPickCat(null);setLinkMode(false);}}>← Back</button>
                  </div>
                : <div>
                    <div style={{fontSize:12,color:'var(--muted)',marginBottom:8}}>Add file to category:</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                      {FILE_CATS.map(cat=>(
                        <button key={cat.id} className="btn ghost sm" style={{borderColor:cat.color,color:cat.color,display:'inline-flex',alignItems:'center',gap:5}} onClick={()=>setPickCat(cat.id)}>
                          {cat.instr && <InstrIcon id={cat.instr} size={13}/>}{cat.label}
                        </button>
                      ))}
                    </div>
                  </div>}
              {fileMsg && <div className="filemsg">{fileMsg}</div>}
            </div>
          </div>}
          {recState && <div className="rec-overlay">
            <div className="rec-panel">
              <div className="rec-dot"></div>
              <div className="rec-label">{recState==='recording'?'Recording':'Paused'}</div>
              <div className="rec-timer">{fmtSecs(recTime)}</div>
              <div style={{fontSize:13,color:'var(--muted)',marginBottom:20}} dir="auto">{s.title}</div>
              <div className="rec-btns">
                {recState==='recording'
                  ? <button className="rec-btn pause" onClick={pauseRec}>Pause</button>
                  : <button className="rec-btn pause" onClick={resumeRec}>Resume</button>}
                <button className="rec-btn stop" onClick={stopRec}>Stop</button>
              </div>
            </div>
          </div>}
          {recConfirm && <div className="rec-confirm">
            <div className="rec-confirm-panel">
              <div className="modaltitle">Save recording?</div>
              <div style={{fontSize:13,color:'var(--muted)',marginBottom:18}}>{fmtSecs(recTime)} recorded for "{s.title}"</div>
              <div className="btnrow">
                <button className="btn danger" onClick={abandonRec}>Discard</button>
                <button className="btn" onClick={uploadRec}>Save</button>
              </div>
            </div>
          </div>}
          {playerFile && <div className="player-overlay" onClick={e=>{if(e.target===e.currentTarget) closePlayer();}}>
            <div className="player-panel">
              <div className="player-title" dir="auto">{playerFile.name}</div>
              <input type="range" className="player-seek" min="0" max={playerDur||1} step="0.1" value={playerTime} onChange={e=>seekTo(+e.target.value)}/>
              <div className="player-time"><span>{fmtSecs(Math.floor(playerTime))}</span><span>{playerDur&&isFinite(playerDur)?fmtSecs(Math.floor(playerDur)):'-:--'}</span></div>
              <div className="player-controls">
                <button className="player-play" onClick={togglePlay}>{playerPlaying?'❚❚':'▶'}</button>
              </div>
              <div className="player-vol">
                <span style={{fontSize:12,color:'var(--muted-2)'}}>Vol</span>
                <input type="range" min="0" max="1" step="0.05" value={playerVol} onChange={e=>setVol(+e.target.value)}/>
              </div>
              <div className="btnrow" style={{justifyContent:'center',marginTop:14}}><button className="btn ghost sm" onClick={closePlayer}>Close</button></div>
            </div>
          </div>}
          {pendingPhoto && <div className="rec-confirm">
            <div className="rec-confirm-panel">
              {photoPreview && <img src={photoPreview} style={{width:'100%',maxHeight:200,objectFit:'contain',borderRadius:10,marginBottom:14}} alt="Preview"/>}
              <div className="modaltitle">What to do with this photo?</div>
              <div style={{display:'flex',flexDirection:'column',gap:9}}>
                <button className="btn" onClick={uploadPhotoAsFile}>Save to this song</button>
                <button className="btn ghost" onClick={uploadPhotoToAlbum}>Save to band album</button>
                <button className="btn danger" onClick={discardPhoto}>Discard</button>
              </div>
            </div>
          </div>}
          {busy==='rec' && <div style={{fontSize:12,color:'var(--muted)',padding:'8px 0'}}>Saving recording…</div>}
          {INSTR.map(i=>(
            <div className="editrow" key={i.id} style={MY_INSTR&&i.id!==MY_INSTR?{opacity:.5}:null}>
              <InstrBadge id={i.id} size={26}/>
              <StatusPills value={s.parts[i.id]} color={i.color} onPick={(!MY_INSTR||i.id===MY_INSTR)?v=>setRole(i.id,v):null}/>
            </div>
          ))}
          <label className="fl" style={{marginTop:15}}>Guests ({s.guests.length}/{MAX_GUESTS})</label>
          {s.guests.map(g=>(
            <div className="guest-edit" key={g.id}>
              <div className="guest-top">
                <input className="inp" dir="auto" value={g.name} onChange={e=>setGuestName(g.id,e.target.value)} placeholder="Sax — Yossi"/>
                <button className="xbtn" onClick={()=>delGuest(g.id)} aria-label="Remove guest">×</button>
              </div>
              <StatusPills value={g.status} color={GUEST_COLOR} onPick={v=>setGuestStatus(g.id,v)}/>
            </div>
          ))}
          {s.guests.length<MAX_GUESTS && <button className="addguest" onClick={addGuest}>+ Add guest player</button>}
          <label className="fl" style={{marginTop:16}}>Details</label>
          <div className="fieldgrid" style={{marginTop:0}}>
            <div className="full"><label className="fl">Artist</label><input className="inp" dir="auto" value={s.artist||''} onChange={e=>setField('artist',e.target.value)} placeholder="Original artist"/></div>
            <div><label className="fl">Key</label><input className="inp" value={s.songKey||''} onChange={e=>setField('songKey',e.target.value)} placeholder="Am"/></div>
            <div><label className="fl">Tempo</label><input className="inp" inputMode="numeric" value={s.tempo||''} onChange={e=>setField('tempo',e.target.value)} placeholder="bpm"/></div>
            <div className="full"><label className="fl">Length (min)</label><input className="inp" inputMode="numeric" value={s.duration||''} onChange={e=>setField('duration',e.target.value)} placeholder="4"/></div>
            <div className="full"><label className="fl">Notes / arrangement</label>
              <textarea className="inp" dir="auto" value={s.notes||''} onChange={e=>setField('notes',e.target.value)} placeholder="Intro repeats x2, key change before last chorus, who solos…"/></div>
          </div>
          <div className="songact">
            <button className="btn ghost" onClick={onToggleEncore} style={s.encore?{color:'var(--guitar)',borderColor:'rgba(244,169,60,.5)'}:null}>{s.encore?'★ Encore on':'Mark as encore'}</button>
            <button className="btn ghost" onClick={onExclude}>Exclude from set</button>
          </div>
          <div className="btnrow"><button className="btn danger" onClick={del}>Remove song</button></div>
        </div>}
      {pracPick && <div className="files-modal" onClick={e=>{if(e.target===e.currentTarget) setPracPick(false);}}>
        <div className="files-panel" style={{maxWidth:380}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <div className="modaltitle" style={{margin:0}}>Practice — {s.title}</div>
            <button className="xbtn" onClick={()=>setPracPick(false)}>×</button>
          </div>
          <div className="prac-pick">
            <div className="prac-pick-h">Audio source</div>
            {[{id:'original',label:'Original',files:pracOrigAudio},{id:'isolated',label:'Isolated ('+((FILE_CATS.find(c=>c.id===myInstr)||{}).label||myInstr)+')',files:pracInstrAudio},{id:'minus',label:'Minus ('+((FILE_CATS.find(c=>c.id===myInstr)||{}).label||myInstr)+')',files:pracInstrAudio}].map(opt=>{
              const audioFiles=opt.files.filter(f=>f.type==='audio'||(f.kind==='link'&&f.url));
              const avail=audioFiles.length>0;
              return <div key={opt.id} className={'prac-opt'+(pracAudioChoice&&pracAudioChoice===((audioFiles[0]||{}).id+'__'+opt.id)?' sel':'')+(avail?'':' dis')} onClick={()=>{if(avail) setPracAudioChoice(audioFiles[0].id+'__'+opt.id);}}>
                <div className="prac-opt-label">{opt.label}</div>
                {!avail && <div className="prac-opt-na">no file</div>}
              </div>;
            })}
          </div>
          <div className="prac-pick">
            <div className="prac-pick-h">Visual</div>
            {[{id:'slide',label:'Slide',files:pracSlideFiles},{id:'part',label:'Part ('+((FILE_CATS.find(c=>c.id===myInstr)||{}).label||myInstr)+')',files:pracPartFiles}].map(opt=>{
              const vizFiles=opt.files.filter(f=>f.type!=='audio');
              const avail=vizFiles.length>0;
              return <div key={opt.id} className={'prac-opt'+(pracVisualChoice===((vizFiles[0]||{}).id)?' sel':'')+(avail?'':' dis')} onClick={()=>{if(avail) setPracVisualChoice(vizFiles[0].id);}}>
                <div className="prac-opt-label">{opt.label}</div>
                {!avail && <div className="prac-opt-na">no file</div>}
              </div>;
            })}
          </div>
          <div className="btnrow" style={{justifyContent:'center',gap:10,marginTop:8}}>
            <button className="btn ghost sm" onClick={()=>setPracPick(false)}>Cancel</button>
            <button className="btn sm" disabled={!pracAudioChoice&&!pracVisualChoice} onClick={startPractice}>Start Practice</button>
          </div>
        </div>
      </div>}
      {pracMode && <div className="practice-overlay">
        <div className="practice-title">{s.title}{pracMode.visual?' — '+(pracMode.visual.name||''):''}
        </div>
        <button className="practice-exit" onClick={exitPractice}>×</button>
        <div className="practice-visual">
          {pracMode.visual && (pracMode.visual.type==='pdf'||fileKind(pracMode.visual.name)==='pdf'
            ? <iframe src={pracMode.visual.url+'#toolbar=0'} title="Part"/>
            : <img src={pracMode.visual.url} alt={pracMode.visual.name||'Visual'}/>)}
          {!pracMode.visual && <div style={{color:'var(--muted)',fontStyle:'italic'}}>No visual selected</div>}
        </div>
        {pracMode.audio && <div className="practice-audio">
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <button style={{background:'none',border:'none',color:'var(--text)',fontSize:22,cursor:'pointer',padding:0,lineHeight:1}} onClick={pracToggle}>{pracPlaying?'❚❚':'▶'}</button>
            <input type="range" style={{flex:1}} min="0" max={pracDur||1} step="0.1" value={pracTime} onChange={e=>pracSeek(+e.target.value)}/>
            <span style={{fontSize:11,color:'var(--muted)',minWidth:70,textAlign:'right'}}>{fmtSecs(Math.floor(pracTime))}/{pracDur?fmtSecs(Math.floor(pracDur)):'-:--'}</span>
          </div>
        </div>}
      </div>}
      {cropSrc && <CropModal src={cropSrc} onCancel={()=>setCropSrc(null)} onDone={onCropDone}/>}
    </div>
  );
}

function SongForm({onSave,onCancel}){
  const [f,setF]=useState({title:'',artist:'',songKey:'',tempo:'',duration:''});
  const set=(k,v)=>setF({...f,[k]:v});
  return (
    <div className="card" style={{marginTop:14,borderColor:'var(--line-2)'}}>
      <div className="fieldgrid">
        <div className="full"><label className="fl">Song title</label>
          <input className="inp" dir="auto" autoFocus value={f.title} onChange={e=>set('title',e.target.value)} placeholder="Song name"/></div>
        <div className="full"><label className="fl">Artist</label>
          <input className="inp" dir="auto" value={f.artist} onChange={e=>set('artist',e.target.value)} placeholder="Original artist"/></div>
        <div><label className="fl">Key</label><input className="inp" value={f.songKey} onChange={e=>set('songKey',e.target.value)} placeholder="Am"/></div>
        <div><label className="fl">Tempo</label><input className="inp" inputMode="numeric" value={f.tempo} onChange={e=>set('tempo',e.target.value)} placeholder="bpm"/></div>
        <div className="full"><label className="fl">Length (min)</label><input className="inp" inputMode="numeric" value={f.duration} onChange={e=>set('duration',e.target.value)} placeholder="4"/></div>
      </div>
      <div className="banner" style={{marginTop:12}}>You can edit any of these later, and add the album cover, by tapping the song open. </div>
      <div className="btnrow">
        <button className="btn ghost" onClick={onCancel}>Cancel</button>
        <button className="btn" onClick={()=> f.title.trim() && onSave({...f,title:f.title.trim()})}>Add to setlist</button>
      </div>
    </div>
  );
}

function FocusTags({songs,learn,practice,onGoSong}){
  const row=(ids,color,label)=> ids && ids.length? (
    <div className="focus-tags" style={{marginTop:8}}>
      <span className="ftag" style={{borderColor:color,color,background:'transparent'}}>{label}</span>
      {ids.map(id=>{ const n=focusName(id,songs); return n?<span className="ftag" key={id} dir="auto" style={onGoSong?{cursor:'pointer'}:null} onClick={onGoSong?()=>onGoSong(id):undefined}>{n}</span>:null;})}
    </div>
  ):null;
  if((!learn||!learn.length) && (!practice||!practice.length)) return null;
  return <React.Fragment>{row(practice,'var(--warn)','Practice')}{row(learn,'var(--learn)','Learn')}</React.Fragment>;
}
function focusSummary(arr,songs){
  const a=arr||[]; if(!a.length) return 'Choose songs…';
  const names=a.map(x=>focusName(x,songs)).filter(Boolean);
  return names.length<=2 ? names.join(', ') : (names.length+' selected');
}
function FocusModal({group,songs,selected,onToggleSong,onSetOther,onClose}){
  const [other,setOther]=useState(getOther(selected));
  const [otherOn,setOtherOn]=useState(!!getOther(selected));
  const isOn=(id)=> (selected||[]).includes(id);
  const done=()=>{ onSetOther(otherOn? other.trim():''); onClose(); };
  return (
    <div className="modalwrap" onClick={done}>
      <div className="modalcard" onClick={e=>e.stopPropagation()}>
        <div className="modaltitle">{group==='practice'?'Practice — polish & run':'Learn — new songs'}</div>
        <div className="checklist">
          {songs.map(s=>(
            <label className="checkrow" key={s.id}>
              <input type="checkbox" checked={isOn(s.id)} onChange={()=>onToggleSong(s.id)}/>
              <span dir="auto">{s.title}</span>
            </label>
          ))}
          {songs.length===0 && <div style={{fontSize:12.5,color:'var(--muted-2)',padding:'10px 4px'}}>No songs in the setlist yet.</div>}
          <label className="checkrow">
            <input type="checkbox" checked={otherOn} onChange={()=>setOtherOn(v=>!v)}/>
            <span>Other</span>
          </label>
          {otherOn && <input className="inp" dir="auto" style={{marginTop:8}} value={other} onChange={e=>setOther(e.target.value)} placeholder="e.g. encore, new intro, warm-up…" autoFocus/>}
        </div>
        <div className="btnrow"><button className="btn" onClick={done}>Done</button></div>
      </div>
    </div>
  );
}
function FocusPicker({songs,learn,practice,onToggle,onSetOther}){
  const [modal,setModal]=useState(null);
  return (
    <React.Fragment>

function Rehearsals({state,update}){
  const [adding,setAdding]=useState(false);
  const list=[...state.rehearsals].sort((a,b)=>new Date(a.date||0)-new Date(b.date||0));
  const upcoming=list.filter(r=>!r.done);
  const past=list.filter(r=>r.done);
  const add=(items)=>{ update(s=>{ (Array.isArray(items)?items:[items]).forEach(data=>{ s.rehearsals.push({id:uid(),done:false,attendance:{},focusLearn:[],focusPractice:[],proposal:null,...data}); logAct(s,'scheduled a rehearsal'+(data.date?' for '+fmtDate(data.date):'')); }); return s;}); setAdding(false); };
  const patch=(id,fn)=> update(s=>{ const r=s.rehearsals.find(x=>x.id===id); fn(r); return s;});
  const del=(id)=> update(s=>{ const r=s.rehearsals.find(x=>x.id===id); logAct(s,'removed the '+(r&&r.date?fmtDate(r.date)+' ':'')+'rehearsal'); s.rehearsals=s.rehearsals.filter(x=>x.id!==id); return s;});
  return (
    <div className="page">
      <div className="section-h">Upcoming · {upcoming.length}</div>
      {adding && <RehForm songs={state.songs} members={state.members} onSave={add} onCancel={()=>setAdding(false)}/>}
      {upcoming.length===0 && !adding &&
        <div className="empty"><div className="big">No rehearsals booked</div><div className="sm">Schedule a session and pick which songs to focus on.</div></div>}
      {upcoming.map(r=><RehCard key={r.id} r={r} state={state} patch={patch} del={del} update={update}/>)}
      {!adding && <div className="add-bar"><button className="btn ghost" onClick={()=>{setAdding(true);window.scrollTo({top:0,behavior:'smooth'});}}>+ Schedule rehearsal</button></div>}
      {past.length>0 && <React.Fragment>
        <div className="section-h">Done · {past.length}</div>
        {past.map(r=><RehCard key={r.id} r={r} state={state} patch={patch} del={del} update={update}/>)}
      </React.Fragment>}
    </div>
  );
}
function RehCard({r,state,patch,del,update}){
  const songs=state.songs;
  const guestList=allGuests(songs);
  const [editFocus,setEditFocus]=useState(false);
  const [markingDone,setMarkingDone]=useState(false);
  const [covered,setCovered]=useState([]);
  const [editing,setEditing]=useState(false);
  const [editDate,setEditDate]=useState('');
  const [editDur,setEditDur]=useState('');
  const [editLoc,setEditLoc]=useState('');
  const openEdit=()=>{ setEditDate(r.date||''); setEditDur(r.duration||'2'); setEditLoc(r.location||''); setEditing(true); };
  const saveEdit=()=>{ patch(r.id,x=>{x.date=editDate;x.duration=editDur;x.location=editLoc;}); setEditing(false); };
  const onToggle=(group,id)=>patch(r.id,x=>{ const res=toggleFocus(x.focusLearn||[],x.focusPractice||[],group,id); x.focusLearn=res.learn; x.focusPractice=res.practice; });
  const onSetOther=(group,text)=>patch(r.id,x=>{ const key=group==='practice'?'focusPractice':'focusLearn'; x[key]=setOtherInArr(x[key]||[],text); });
  const startMarkDone=()=>{ const focus=[...(r.focusPractice||[]),...(r.focusLearn||[])].filter(x=>!isOther(x)); setCovered([...focus]); setMarkingDone(true); };
  const confirmDone=()=>{ update(s=>{const x=s.rehearsals.find(v=>v.id===r.id);x.done=true;x.coveredSongs=[...covered];logAct(s,'marked the '+(r.date?fmtDate(r.date)+' ':'')+'rehearsal done'+(covered.length?' ('+covered.length+' songs covered)':''));return s;}); setMarkingDone(false); };

/* ---------- crop modal ---------- */
let cropDrag=null;
function CropModal({src,onCancel,onDone}){
  const V=Math.min(280,(window.innerWidth||360)-64), OUT=220;
  const [nat,setNat]=useState(null);
  const [zoom,setZoom]=useState(1);
  const [off,setOff]=useState({x:0,y:0});
  useEffect(()=>{ const img=new Image(); img.onload=()=>setNat({w:img.naturalWidth,h:img.naturalHeight}); img.src=src; },[src]);
  const base = nat ? V/Math.min(nat.w,nat.h) : 1;
  const s = base*zoom;
  const dispW = nat? nat.w*s : V;
  const dispH = nat? nat.h*s : V;
  const clamp=(o,zz)=>{ if(!nat) return o; const ss=base*zz, w=nat.w*ss, h=nat.h*ss; return { x:Math.min(0,Math.max(V-w,o.x)), y:Math.min(0,Math.max(V-h,o.y)) }; };
  useEffect(()=>{ if(nat){ const w=nat.w*base, h=nat.h*base; setZoom(1); setOff({x:(V-w)/2,y:(V-h)/2}); } },[nat]);
  const onZoom=(z)=>{ if(!nat){ setZoom(z); return; } const sOld=base*zoom, sNew=base*z; const cx=(-off.x+V/2)/sOld, cy=(-off.y+V/2)/sOld; setZoom(z); setOff(clamp({x:V/2-cx*sNew,y:V/2-cy*sNew},z)); };
  const pt=(e)=>{ const t=e.touches?e.touches[0]:e; return {x:t.clientX,y:t.clientY}; };
  const down=(e)=>{ const p=pt(e); cropDrag={px:p.x,py:p.y,ox:off.x,oy:off.y}; try{ e.currentTarget.setPointerCapture && e.currentTarget.setPointerCapture(e.pointerId); }catch(_){} };
  const moveH=(e)=>{ if(!cropDrag)return; const p=pt(e); setOff(clamp({x:cropDrag.ox+(p.x-cropDrag.px),y:cropDrag.oy+(p.y-cropDrag.py)},zoom)); };
  const up=()=>{ cropDrag=null; };
  const done=()=>{ const img=new Image(); img.onload=()=>{ try{ const c=document.createElement('canvas'); c.width=OUT; c.height=OUT; const ctx=c.getContext('2d'); ctx.drawImage(img,(-off.x)/s,(-off.y)/s,V/s,V/s,0,0,OUT,OUT); onDone(c.toDataURL('image/jpeg',0.85)); }catch(err){ onDone(null); } }; img.onerror=()=>onDone(null); img.src=src; };
  return (
    <div className="cropwrap" onPointerUp={up}>
      <div className="cropcard">
        <div className="croptitle">Position the image</div>
        <div className="cropview" style={{width:V,height:V}} onPointerDown={down} onPointerMove={moveH} onPointerUp={up}>
          <img src={src} draggable="false" style={{position:'absolute',left:off.x,top:off.y,width:dispW,height:dispH}}/>
          <div className="cropframe"></div>
        </div>
        <input className="cropzoom" type="range" min="1" max="4" step="0.01" value={zoom} onChange={e=>onZoom(+e.target.value)}/>
        <div className="crophint">Drag to reposition · slide to zoom</div>
        <div className="btnrow">
          <button className="btn ghost" onClick={onCancel}>Cancel</button>
          <button className="btn" onClick={done} disabled={!nat}>Use image</button>
        </div>
      </div>
    </div>
  );
}

function Album({state,update}){
  const [viewing,setViewing]=useState(null);
  const photos=[...(state.album||[])].sort((a,b)=>(b.ts||'').localeCompare(a.ts||''));

  const [pendingPhoto,setPendingPhoto]=useState(null);

  const [busy,setBusy]=useState(false);
  const onCapture=(e)=>{ const file=e.target.files&&e.target.files[0]; e.target.value=''; if(!file) return;
    setPendingPhoto(file); const rd=new FileReader(); rd.onload=()=>setPhotoPreview(rd.result); rd.readAsDataURL(file);
  };
  const uploadToAlbum=async()=>{ if(!pendingPhoto) return; const file=pendingPhoto; setPendingPhoto(null); setPhotoPreview(null);
    setBusy(true); const id=uid();
    try{
      const path='album/'+BOARD+'/'+id+'-'+file.name.replace(/[^\w.\-]+/g,'_');
      const ref=storage.ref().child(path); await ref.put(file);
      const url=await ref.getDownloadURL();
      update(st=>{st.album.push({id,url,path,ts:new Date().toISOString(),name:file.name,by:actorName()}); logAct(st,'added a photo to the album'); return st;});
    }catch(e){}
    setBusy(false);
  };
  const discard=()=>{ setPendingPhoto(null); setPhotoPreview(null); };
  const del=(photo)=>{ if(photo.path) deleteStoragePath(photo.path); update(st=>{st.album=st.album.filter(x=>x.id!==photo.id); return st;}); setViewing(null); };
  const [confirmDel,setConfirmDel]=useState(null);
  return (
    <div className="page">
      <div className="section-h">Band Album · {photos.length}</div>
      <div className="add-bar"><label className="btn ghost" style={{cursor:'pointer'}}><input type="file" accept="image/*" capture="environment" hidden onChange={onCapture}/>{busy?'Uploading…':'📷 Take photo'}</label></div>
      <div className="add-bar" style={{marginTop:6}}><label className="btn ghost" style={{cursor:'pointer'}}><input type="file" accept="image/*" hidden onChange={onCapture}/>Upload from gallery</label></div>
      {pendingPhoto && <div className="rec-confirm">
        <div className="rec-confirm-panel">
          {photoPreview && <img src={photoPreview} style={{width:'100%',maxHeight:200,objectFit:'contain',borderRadius:10,marginBottom:14}} alt="Preview"/>}
          <div className="modaltitle">Save to album?</div>
          <div style={{display:'flex',flexDirection:'column',gap:9}}>
            <button className="btn" onClick={uploadToAlbum}>Save</button>
            <button className="btn danger" onClick={discard}>Discard</button>
          </div>
        </div>
      </div>}
      {photos.length===0 && !busy &&
        <div className="empty"><div className="big">No photos yet</div><div className="sm">Capture rehearsal moments, stage setups, or chord sheets with the camera.</div></div>}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6,marginTop:14}}>
        {photos.map(p=>(
          <div key={p.id} style={{aspectRatio:'1',borderRadius:10,overflow:'hidden',cursor:'pointer',background:'var(--surface-2)'}} onClick={()=>setViewing(p)}>
            <img src={p.url} style={{width:'100%',height:'100%',objectFit:'cover'}} alt={p.name||''} loading="lazy"/>
          </div>
        ))}
      </div>
      {viewing && <div className="modalwrap" onClick={e=>{if(e.target===e.currentTarget) setViewing(null);}}>
        <div className="modalcard" style={{borderRadius:18,padding:0,maxHeight:'92vh',display:'flex',flexDirection:'column'}}>
          <img src={viewing.url} style={{width:'100%',maxHeight:'70vh',objectFit:'contain',borderRadius:'18px 18px 0 0'}} alt={viewing.name||''}/>
          <div style={{padding:'14px 18px'}}>
            <div style={{fontSize:12,color:'var(--muted)'}}>
              {viewing.by && <span>{viewing.by} · </span>}
              {viewing.ts && fmtDate(viewing.ts)}
            </div>
            <div className="btnrow" style={{marginTop:10}}>
              {confirmDel===viewing.id
                ? <React.Fragment>
                    <button className="btn danger sm" onClick={()=>del(viewing)}>Confirm delete</button>
                    <button className="btn ghost sm" onClick={()=>setConfirmDel(null)}>Cancel</button>
                  </React.Fragment>
                : <button className="btn danger sm" onClick={()=>setConfirmDel(viewing.id)}>Delete</button>}
              <button className="btn ghost sm" onClick={()=>{setViewing(null);setConfirmDel(null);}}>Close</button>
            </div>
          </div>
        </div>
      </div>}
    </div>
  );
}
const ICONS={
  stage:'M3 13h2l1.5-6 2.5 12 2-6h2l1.5 4 1.5-4h3',
  setlist:'M4 6h12M4 12h12M4 18h8 M19 5v9 M19 14a2 2 0 1 0 0 4 2 2 0 0 0 0-4z',
  rehearse:'M5 4h14v16l-7-4-7 4z',
  album:'M4 5a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5z M9 10a2 2 0 1 0 0-4 2 2 0 0 0 0 4z M4 16l4-4 3 3 4-4 5 5',
  setup:'M10 3h4l.5 3 2 1 3-1.5 2 3.5-2.5 2v2l2.5 2-2 3.5-3-1.5-2 1L14 21h-4l-.5-3-2-1-3 1.5-2-3.5 2.5-2v-2L0 9'
};
function TabBar({tab,setTab}){
  const items=[['stage','Stage'],['setlist','Setlist'],['rehearse','Rehearsals'],['album','Gallery'],['setup','Setup']];
  return (
    <nav className="tabbar">
      {items.map(([id,label])=>(
        <button key={id} className={'tab'+(tab===id?' on':'')} onClick={()=>setTab(id)}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d={ICONS[id]}/></svg>
          {label}<span className="ind"></span>
        </button>
      ))}
    </nav>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
